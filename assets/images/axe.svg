<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Hunting/Camping Axe -->
  <g transform="translate(32,32) rotate(30) translate(-32,-32)">
    <!-- Handle -->
    <rect x="29" y="18" width="6" height="36" rx="3" fill="#8d6e63"/>
    <!-- Handle grip rings -->
    <rect x="28" y="22" width="8" height="2" rx="1" fill="#6d4c41"/>
    <rect x="28" y="30" width="8" height="2" rx="1" fill="#6d4c41"/>
    <rect x="28" y="38" width="8" height="2" rx="1" fill="#6d4c41"/>
    <rect x="28" y="46" width="8" height="2" rx="1" fill="#6d4c41"/>
    <!-- Axe head (offset to right) -->
    <path d="M34,10 Q50,10 50,20 Q50,30 34,28 L30,28 L30,10 Z" fill="#b0bec5"/>
    <path d="M34,10 Q50,10 50,20 Q50,30 34,28 L35,28 L35,10 Z" fill="#eceff1"/>
    <!-- Blade edge (sharp) -->
    <path d="M34,10 L30,10 L30,28 L34,28 Q42,28 44,24 Q46,20 44,16 Q42,12 34,10 Z" fill="#cfd8dc"/>
    <!-- Eye hole in axe head -->
    <ellipse cx="41" cy="19" rx="5" ry="4" fill="#546e7a"/>
    <ellipse cx="41" cy="19" rx="3.5" ry="2.5" fill="#37474f"/>
    <!-- Blade shine -->
    <line x1="32" y1="12" x2="32" y2="26" stroke="#fff" stroke-width="1.5" opacity="0.5"/>
  </g>
</svg>
