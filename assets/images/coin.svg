<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Gold coin -->
  <!-- Outer rim -->
  <circle cx="32" cy="32" r="28" fill="#f9a825"/>
  <!-- Inner face -->
  <circle cx="32" cy="32" r="23" fill="#fdd835"/>
  <!-- Rim detail lines -->
  <circle cx="32" cy="32" r="25" fill="none" stroke="#f57f17" stroke-width="1.5" stroke-dasharray="4,2"/>
