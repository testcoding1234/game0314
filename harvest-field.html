<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ハーベストフィールド</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none;}
html,body{width:100%;height:100%;background:#000;display:flex;align-items:center;justify-content:center;overflow:hidden;touch-action:none;font-family:system-ui,-apple-system,sans-serif;}
#wrap{position:relative;width:375px;height:667px;max-height:100svh;overflow:hidden;background:#07131b;}
canvas{display:block;width:100%;height:100%;touch-action:none;}
#shop{display:none;position:absolute;inset:0;z-index:20;background:rgba(2,10,18,.76);backdrop-filter:blur(10px);align-items:center;justify-content:center;padding:18px;}
#shop.open{display:flex;}
#shop-panel{width:100%;border-radius:22px;padding:18px 16px 14px;background:linear-gradient(180deg,rgba(8,30,40,.96),rgba(6,17,27,.96));border:1.5px solid rgba(125,211,252,.28);box-shadow:0 24px 44px rgba(0,0,0,.45);color:#e2e8f0;}
#shop-panel h2{text-align:center;font-size:22px;font-weight:900;color:#7dd3fc;letter-spacing:.08em;margin-bottom:4px;}
#shop-panel p{text-align:center;font-size:11px;color:#94a3b8;line-height:1.5;margin-bottom:14px;}
#shop-items{display:flex;flex-direction:column;gap:10px;}
.shop-item{display:flex;gap:10px;align-items:center;padding:12px;border-radius:16px;background:rgba(15,23,42,.78);border:1px solid rgba(148,163,184,.18);}
.shop-item.done{opacity:.5;}
.shop-icon{width:44px;height:44px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:24px;background:rgba(14,165,233,.12);border:1px solid rgba(125,211,252,.22);flex-shrink:0;}
.shop-copy{flex:1;min-width:0;}
.shop-name{font-size:14px;font-weight:800;color:#f8fafc;}
.shop-desc{font-size:11px;color:#94a3b8;line-height:1.45;margin-top:2px;}
.shop-meta{font-size:10px;color:#38bdf8;margin-top:4px;}
.shop-btn{border:none;border-radius:12px;padding:9px 12px;font-size:12px;font-weight:800;color:#fff;background:linear-gradient(135deg,#f97316,#ea580c);min-width:78px;cursor:pointer;}
.shop-btn:disabled{opacity:.4;cursor:default;}
#shop-gold{margin-top:14px;font-size:14px;font-weight:900;color:#fde68a;text-align:center;}
#shop-close{margin-top:14px;width:100%;border:none;border-radius:14px;padding:11px 0;background:rgba(125,211,252,.16);color:#7dd3fc;font-size:13px;font-weight:800;cursor:pointer;}
</style>
</head>
<body>
<div id="wrap">
  <canvas id="c" width="375" height="667"></canvas>
  <div id="shop">
    <div id="shop-panel">
      <h2>⚙️ 自動化</h2>
      <p>売った料理のお金で、討伐 → 調理 → 販売を順番に自動化できます。</p>
      <div id="shop-items"></div>
      <div id="shop-gold"></div>
      <button id="shop-close">とじる</button>
    </div>
  </div>
</div>

<script>
(() => {
'use strict';

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = 375;
const H = 667;
const HEADER_H = 64;
const PLAY = { left: 42, right: W - 42, top: 150, bottom: 506 };
const HUNT = { left: 54, right: W - 54, top: 232, bottom: 496 };
const COOKER = { x: 110, y: 158 };
const SELLER = { x: 265, y: 158 };
const SHOP_BTN = { x: 324, y: 610, r: 32 };
const HOME_BTN = { x: 28, y: 30, w: 36, h: 36 };
const PLAYER_SPEED = 182;
const TOUCH_DEAD = 16;
const TOUCH_MAX = 96;
const PICKUP_R = 36;
const ATTACK_R = 52;
const STATION_R = 62;
const MAX_MONSTERS = 7;
const MEAT_SELL_PRICE = 18;
const COOK_TIME = 1.8;
const POINTER_CANCEL_DIST = 10;

const AUTO_SHOP = [
  { key: 'hunt', icon: '⚔️', name: '討伐係', desc: 'モンスター討伐と肉回収を徐々に自動化', costs: [55, 120, 240] },
  { key: 'cook', icon: '🍳', name: '料理係', desc: '肉を運び込み、料理完成まで自動化', costs: [70, 150, 280] },
  { key: 'sell', icon: '💰', name: '販売係', desc: '料理を販売してお金回収まで自動化', costs: [90, 180, 320] },
];

const MONSTER_TYPES = [
  { emoji: '🐗', name: 'ボア', speed: 36, tint: '#b45309' },
  { emoji: '👾', name: 'スライム', speed: 44, tint: '#8b5cf6' },
  { emoji: '🐺', name: 'ウルフ', speed: 52, tint: '#64748b' },
];

const G = {};
let lastT = 0;

if (!('roundRect' in CanvasRenderingContext2D.prototype)) {
  CanvasRenderingContext2D.prototype.roundRect = function(x,y,w,h,r){
    r = Math.min(r, w/2, h/2);
    this.moveTo(x+r,y);
    this.lineTo(x+w-r,y);
    this.quadraticCurveTo(x+w,y,x+w,y+r);
    this.lineTo(x+w,y+h-r);
    this.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
    this.lineTo(x+r,y+h);
    this.quadraticCurveTo(x,y+h,x,y+h-r);
    this.lineTo(x,y+r);
    this.quadraticCurveTo(x,y,x+r,y);
    this.closePath();
  };
}

function dist2(ax, ay, bx, by) { return (ax - bx) ** 2 + (ay - by) ** 2; }
function clamp(v, mn, mx) { return v < mn ? mn : (v > mx ? mx : v); }
function lerp(a, b, t) { return a + (b - a) * t; }
function easeInOut(t) { return t < 0.5 ? 4 * t * t * t : 1 - ((-2 * t + 2) ** 3) / 2; }
function fmt(n) { return n >= 1000 ? `${Math.floor(n / 100) / 10}k` : `${n}`; }

function showMessage(text, t = 2.4) {
  G.message = { text, t };
}

function pushPop(x, y, text, color = '#fff7ed', vy = -36) {
  G.pops.push({ x, y, text, color, alpha: 1, vy });
}

function emitFlow({ kind, label, fromX, fromY, toX, toY, duration = 0.42, color = '#fff', onDone }) {
  G.flows.push({ kind, label, fromX, fromY, toX, toY, duration, t: 0, color, onDone });
}

function emitSpark(x, y, color, count = 7) {
  for (let i = 0; i < count; i++) {
    const ang = Math.random() * Math.PI * 2;
    const spd = 14 + Math.random() * 28;
    G.sparkles.push({ x, y, vx: Math.cos(ang) * spd, vy: Math.sin(ang) * spd, alpha: 1, color, r: 2 + Math.random() * 2.8 });
  }
}

function getPlayerBackAnchor() {
  return { x: G.player.x + (G.player.dir === 1 ? -16 : 16), y: G.player.y - 26 };
}

function resetGame() {
  G.time = 0;
  G.coins = 35;
  G.raw = 0;
  G.cooked = 0;
  G.player = {
    x: W / 2,
    y: 340,
    vx: 0,
    vy: 0,
    dir: 1,
    step: 0,
    stepT: 0,
    touchGlow: 0,
    attackCD: 0,
    cookSendCD: 0,
    sellSendCD: 0,
  };
  G.pointer = { active: false, x: W / 2, y: 340, id: null };
  G.monsters = [];
  G.drops = [];
  G.flows = [];
  G.pops = [];
  G.slashes = [];
  G.sparkles = [];
  G.autoTrails = [];
  G.spawnT = 0;
  G.message = { text: '討伐 → 調理 → 販売 → 自動化', t: 3.2 };
  G.shopOpen = false;
  G.automation = { hunt: 0, cook: 0, sell: 0 };
  G.autoTimers = { hunt: 0, cook: 0, sell: 0 };
  G.cooker = { queue: 0, progress: 0, steam: 0, flash: 0 };
  G.seller = { glow: 0 };
  G.stationPulse = 0;
  G.summaryFlash = 0;
  for (let i = 0; i < 4; i++) spawnMonster(true);
}

function spawnMonster(force) {
  if (!force && G.monsters.length >= MAX_MONSTERS) return;
  const type = MONSTER_TYPES[Math.floor(Math.random() * MONSTER_TYPES.length)];
  const x = HUNT.left + Math.random() * (HUNT.right - HUNT.left);
  const y = HUNT.top + Math.random() * (HUNT.bottom - HUNT.top);
  G.monsters.push({
    x, y,
    dir: Math.random() < 0.5 ? -1 : 1,
    speed: type.speed,
    bob: Math.random() * Math.PI * 2,
    turnT: 0.8 + Math.random() * 1.8,
    alive: true,
    type,
  });
}

function killMonster(monster, automated) {
  monster.alive = false;
  emitSpark(monster.x, monster.y - 10, automated ? '#fde68a' : '#ffffff', automated ? 9 : 7);
  pushPop(monster.x, monster.y - 30, `${monster.type.name}討伐`, '#fde68a', -22);
  G.slashes.push({ x: monster.x, y: monster.y - 4, t: 1, automated });
  G.drops.push({ x: monster.x, y: monster.y, bob: Math.random() * Math.PI * 2, picked: false });
}

function addRawAt(x, y) {
  const to = getPlayerBackAnchor();
  emitFlow({
    kind: 'raw',
    label: '🥩',
    fromX: x,
    fromY: y,
    toX: to.x,
    toY: to.y,
    color: '#fecaca',
    onDone: () => {
      G.raw += 1;
      G.player.touchGlow = 0.55;
      G.summaryFlash = 0.4;
    },
  });
}

function sendRawToCooker() {
  if (G.raw <= 0) return false;
  G.raw -= 1;
  const from = getPlayerBackAnchor();
  emitFlow({
    kind: 'raw',
    label: '🥩',
    fromX: from.x,
    fromY: from.y,
    toX: COOKER.x,
    toY: COOKER.y + 12,
    color: '#f87171',
    onDone: () => {
      G.cooker.queue += 1;
      G.cooker.flash = 0.7;
      G.summaryFlash = 0.45;
    },
  });
  return true;
}

function addCookedDish() {
  emitFlow({
    kind: 'dish',
    label: '🍖',
    fromX: COOKER.x,
    fromY: COOKER.y - 6,
    toX: getPlayerBackAnchor().x,
    toY: getPlayerBackAnchor().y - 10,
    color: '#fdba74',
    duration: 0.5,
    onDone: () => {
      G.cooked += 1;
      G.player.touchGlow = 0.5;
      G.summaryFlash = 0.45;
      pushPop(COOKER.x, COOKER.y - 48, '料理完成', '#fde68a', -20);
    },
  });
}

function sellOneDish() {
  if (G.cooked <= 0) return false;
  G.cooked -= 1;
  const from = getPlayerBackAnchor();
  emitFlow({
    kind: 'dish',
    label: '🍖',
    fromX: from.x,
    fromY: from.y - 6,
    toX: SELLER.x,
    toY: SELLER.y + 4,
    color: '#fb923c',
    onDone: () => {
      G.seller.glow = 0.8;
      emitFlow({
        kind: 'coin',
        label: `💰${MEAT_SELL_PRICE}`,
        fromX: SELLER.x,
        fromY: SELLER.y - 8,
        toX: getPlayerBackAnchor().x,
        toY: getPlayerBackAnchor().y - 18,
        color: '#fde047',
        duration: 0.54,
        onDone: () => {
          G.coins += MEAT_SELL_PRICE;
          G.summaryFlash = 0.5;
          pushPop(SELLER.x, SELLER.y - 46, `+${MEAT_SELL_PRICE}G`, '#fde68a', -22);
        },
      });
    },
  });
  return true;
}

function levelText(level) {
  return level >= 3 ? 'MAX' : `LV ${level}`;
}

function openShop() {
  G.shopOpen = true;
  renderShop();
  document.getElementById('shop').classList.add('open');
}

function closeShop() {
  G.shopOpen = false;
  document.getElementById('shop').classList.remove('open');
}

function renderShop() {
  const container = document.getElementById('shop-items');
  container.innerHTML = '';
  AUTO_SHOP.forEach((item) => {
    const lv = G.automation[item.key];
    const done = lv >= item.costs.length;
    const cost = done ? null : item.costs[lv];
    const row = document.createElement('div');
    row.className = `shop-item${done ? ' done' : ''}`;
    row.innerHTML = `
      <div class="shop-icon">${item.icon}</div>
      <div class="shop-copy">
        <div class="shop-name">${item.name}</div>
        <div class="shop-desc">${item.desc}</div>
        <div class="shop-meta">現在: ${levelText(lv)}${done ? ' / 完了' : ` → 次: ${levelText(lv + 1)}`}</div>
      </div>
      <button class="shop-btn" ${done ? 'disabled' : ''}>${done ? '完了' : `💰${cost}`}</button>`;
    if (!done) row.querySelector('.shop-btn').addEventListener('click', () => buyAutomation(item.key));
    container.appendChild(row);
  });
  document.getElementById('shop-gold').textContent = `所持金: 💰${fmt(G.coins)}`;
}

function buyAutomation(key) {
  const item = AUTO_SHOP.find((row) => row.key === key);
  const lv = G.automation[key];
  if (!item || lv >= item.costs.length) return;
  const cost = item.costs[lv];
  if (G.coins < cost) {
    showMessage('💰 お金が足りません');
    return;
  }
  G.coins -= cost;
  G.automation[key] += 1;
  const names = { hunt: '討伐係', cook: '料理係', sell: '販売係' };
  showMessage(`✨ ${names[key]} LV${G.automation[key]} 解放！`);
  renderShop();
}

document.getElementById('shop-close').addEventListener('click', closeShop);
document.getElementById('shop').addEventListener('pointerdown', (e) => e.stopPropagation());

function toCanvasPoint(e) {
  const r = canvas.getBoundingClientRect();
  return {
    x: (e.clientX - r.left) * (W / r.width),
    y: (e.clientY - r.top) * (H / r.height),
  };
}

canvas.addEventListener('pointerdown', (e) => {
  e.preventDefault();
  if (G.shopOpen) return;
  const p = toCanvasPoint(e);
  if (p.x >= HOME_BTN.x - HOME_BTN.w / 2 && p.x <= HOME_BTN.x + HOME_BTN.w / 2 && p.y >= HOME_BTN.y - HOME_BTN.h / 2 && p.y <= HOME_BTN.y + HOME_BTN.h / 2) {
    window.location.href = 'index.html';
    return;
  }
  if (Math.sqrt(dist2(p.x, p.y, SHOP_BTN.x, SHOP_BTN.y)) <= SHOP_BTN.r + 8) {
    openShop();
    return;
  }
  G.pointer.active = true;
  G.pointer.x = p.x;
  G.pointer.y = p.y;
  G.pointer.id = e.pointerId;
  canvas.setPointerCapture(e.pointerId);
}, { passive: false });

canvas.addEventListener('pointermove', (e) => {
  if (!G.pointer.active || G.pointer.id !== e.pointerId) return;
  const p = toCanvasPoint(e);
  G.pointer.x = p.x;
  G.pointer.y = p.y;
}, { passive: false });

function releasePointer(e) {
  if (G.pointer.id !== null && G.pointer.id !== e.pointerId) return;
  G.pointer.active = false;
  G.pointer.id = null;
}

canvas.addEventListener('pointerup', releasePointer, { passive: false });
canvas.addEventListener('pointercancel', releasePointer, { passive: false });

function updatePlayer(dt) {
  const p = G.player;
  p.touchGlow = Math.max(0, p.touchGlow - dt * 2.5);
  p.attackCD = Math.max(0, p.attackCD - dt);
  p.cookSendCD = Math.max(0, p.cookSendCD - dt);
  p.sellSendCD = Math.max(0, p.sellSendCD - dt);

  let vx = 0;
  let vy = 0;
  if (G.pointer.active) {
    const dx = G.pointer.x - p.x;
    const dy = G.pointer.y - p.y;
    const d = Math.sqrt(dx * dx + dy * dy);
    if (d > TOUCH_DEAD) {
      const strength = Math.min(1, d / TOUCH_MAX);
      vx = (dx / d) * PLAYER_SPEED * strength;
      vy = (dy / d) * PLAYER_SPEED * strength;
    } else if (d < POINTER_CANCEL_DIST) {
      vx = 0;
      vy = 0;
    }
  }
  p.vx = vx;
  p.vy = vy;
  p.x = clamp(p.x + vx * dt, PLAY.left, PLAY.right);
  p.y = clamp(p.y + vy * dt, PLAY.top, PLAY.bottom);
  if (Math.abs(vx) > 5) p.dir = vx > 0 ? 1 : -1;
  if (Math.abs(vx) > 4 || Math.abs(vy) > 4) {
    p.stepT += dt;
    if (p.stepT > 0.16) {
      p.stepT = 0;
      p.step = (p.step + 1) % 4;
    }
  } else {
    p.step = 0;
  }
}

function updateMonsters(dt) {
  G.spawnT += dt;
  if (G.spawnT > 1.4) {
    G.spawnT = 0;
    if (G.monsters.length < MAX_MONSTERS) spawnMonster(false);
  }
  G.monsters.forEach((monster) => {
    monster.bob += dt * 4;
    monster.turnT -= dt;
    if (monster.turnT <= 0) {
      monster.turnT = 0.9 + Math.random() * 1.7;
      monster.dir = Math.random() < 0.5 ? -1 : 1;
    }
    monster.x = clamp(monster.x + monster.dir * monster.speed * dt, HUNT.left, HUNT.right);
    if (monster.x <= HUNT.left + 3 || monster.x >= HUNT.right - 3) monster.dir *= -1;
    monster.y += Math.sin(monster.bob) * dt * 8;
    monster.y = clamp(monster.y, HUNT.top, HUNT.bottom);
  });

  let target = null;
  let best = ATTACK_R * ATTACK_R;
  G.monsters.forEach((monster) => {
    const d = dist2(monster.x, monster.y, G.player.x, G.player.y);
    if (d < best) { best = d; target = monster; }
  });
  if (target && G.player.attackCD <= 0) {
    G.player.attackCD = 0.62;
    killMonster(target, false);
  }
  G.monsters = G.monsters.filter((monster) => monster.alive);
}

function updateDrops() {
  G.drops.forEach((drop) => {
    if (drop.picked) return;
    if (dist2(drop.x, drop.y, G.player.x, G.player.y) <= PICKUP_R * PICKUP_R) {
      drop.picked = true;
      addRawAt(drop.x, drop.y);
      pushPop(drop.x, drop.y - 20, '肉ゲット', '#fecaca', -26);
    }
  });
  G.drops = G.drops.filter((drop) => !drop.picked);
}

function autoHuntInterval() { return [0, 3.7, 2.7, 1.9][G.automation.hunt] || 1.9; }
function autoCookInterval() { return [0, 1.1, 0.72, 0.4][G.automation.cook] || 0.4; }
function autoSellInterval() { return [0, 1.2, 0.78, 0.44][G.automation.sell] || 0.44; }
function cookDuration() { return COOK_TIME * ([1, 0.88, 0.72, 0.55][G.automation.cook] || 1); }

function updateAutomation(dt) {
  if (G.automation.hunt > 0) {
    G.autoTimers.hunt += dt;
    if (G.autoTimers.hunt >= autoHuntInterval()) {
      G.autoTimers.hunt = 0;
      let target = null;
      let best = Infinity;
      G.monsters.forEach((monster) => {
        const d = dist2(monster.x, monster.y, 58, 238);
        if (d < best) { best = d; target = monster; }
      });
      if (target) {
        G.autoTrails.push({ x1: 58, y1: 238, x2: target.x, y2: target.y, t: 1 });
        killMonster(target, true);
        addRawAt(target.x, target.y);
      }
    }
  }
  if (G.automation.cook > 0) {
    G.autoTimers.cook += dt;
    if (G.raw > 0 && G.autoTimers.cook >= autoCookInterval()) {
      G.autoTimers.cook = 0;
      sendRawToCooker();
    }
  }
  if (G.automation.sell > 0) {
    G.autoTimers.sell += dt;
    if (G.cooked > 0 && G.autoTimers.sell >= autoSellInterval()) {
      G.autoTimers.sell = 0;
      sellOneDish();
    }
  }
  G.autoTrails.forEach((trail) => { trail.t -= dt * 2.6; });
  G.autoTrails = G.autoTrails.filter((trail) => trail.t > 0);
}

function updateCooking(dt) {
  const nearCooker = dist2(G.player.x, G.player.y, COOKER.x, COOKER.y) <= STATION_R * STATION_R;
  if (nearCooker && G.raw > 0 && G.player.cookSendCD <= 0) {
    if (sendRawToCooker()) G.player.cookSendCD = 0.18;
  }
  if (G.cooker.queue > 0) {
    G.cooker.progress += dt / cookDuration();
    G.cooker.steam += dt * 8;
    if (G.cooker.progress >= 1) {
      G.cooker.queue -= 1;
      G.cooker.progress = 0;
      addCookedDish();
    }
  } else {
    G.cooker.progress = 0;
  }
  G.cooker.flash = Math.max(0, G.cooker.flash - dt * 2.4);
}

function updateSelling(dt) {
  const nearSeller = dist2(G.player.x, G.player.y, SELLER.x, SELLER.y) <= STATION_R * STATION_R;
  if (nearSeller && G.cooked > 0 && G.player.sellSendCD <= 0) {
    if (sellOneDish()) G.player.sellSendCD = 0.18;
  }
  G.seller.glow = Math.max(0, G.seller.glow - dt * 2.2);
}

function updateFlows(dt) {
  G.flows.forEach((flow) => {
    flow.t += dt / flow.duration;
    if (flow.t >= 1) {
      flow.t = 1;
      if (flow.onDone) flow.onDone();
      flow.done = true;
    }
  });
  G.flows = G.flows.filter((flow) => !flow.done);
}

function updateFx(dt) {
  G.stationPulse = Math.sin(G.time * 2.4) * 0.5 + 0.5;
  G.summaryFlash = Math.max(0, G.summaryFlash - dt * 2.2);
  G.slashes.forEach((slash) => { slash.t -= dt * 3; });
  G.slashes = G.slashes.filter((slash) => slash.t > 0);
  G.sparkles.forEach((spark) => {
    spark.x += spark.vx * dt;
    spark.y += spark.vy * dt;
    spark.vx *= 0.97;
    spark.vy = spark.vy * 0.97 + 12 * dt;
    spark.alpha -= dt * 1.8;
  });
  G.sparkles = G.sparkles.filter((spark) => spark.alpha > 0);
  G.pops.forEach((pop) => {
    pop.y += pop.vy * dt;
    pop.alpha -= dt * 1.35;
  });
  G.pops = G.pops.filter((pop) => pop.alpha > 0);
  if (G.message) {
    G.message.t -= dt;
    if (G.message.t <= 0) G.message = null;
  }
}

function update(dt) {
  G.time += dt;
  updatePlayer(dt);
  updateMonsters(dt);
  updateDrops();
  updateAutomation(dt);
  updateCooking(dt);
  updateSelling(dt);
  updateFlows(dt);
  updateFx(dt);
}

function drawBackground() {
  const sky = ctx.createLinearGradient(0, 0, 0, H);
  sky.addColorStop(0, '#04131d');
  sky.addColorStop(0.26, '#0b2532');
  sky.addColorStop(0.62, '#17374a');
  sky.addColorStop(1, '#2e5332');
  ctx.fillStyle = sky;
  ctx.fillRect(0, 0, W, H);

  const playGrad = ctx.createLinearGradient(0, PLAY.top - 20, 0, PLAY.bottom + 20);
  playGrad.addColorStop(0, 'rgba(125,211,252,.12)');
  playGrad.addColorStop(1, 'rgba(34,197,94,.12)');
  ctx.fillStyle = playGrad;
  ctx.beginPath();
  ctx.roundRect(PLAY.left - 16, PLAY.top - 16, PLAY.right - PLAY.left + 32, PLAY.bottom - PLAY.top + 32, 28);
  ctx.fill();

  ctx.strokeStyle = 'rgba(125,211,252,.28)';
  ctx.lineWidth = 2;
  ctx.setLineDash([8, 8]);
  ctx.beginPath();
  ctx.roundRect(PLAY.left, PLAY.top, PLAY.right - PLAY.left, PLAY.bottom - PLAY.top, 24);
  ctx.stroke();
  ctx.setLineDash([]);

  ctx.fillStyle = 'rgba(255,255,255,.04)';
  for (let y = PLAY.top + 14; y < PLAY.bottom; y += 34) {
    ctx.fillRect(PLAY.left + 10, y, PLAY.right - PLAY.left - 20, 10);
  }

  ctx.fillStyle = 'rgba(4,10,24,.84)';
  ctx.fillRect(0, 0, W, HEADER_H);
  ctx.fillStyle = 'rgba(125,211,252,.14)';
  ctx.fillRect(0, HEADER_H, W, 2);

  const footer = ctx.createLinearGradient(0, H - 88, 0, H);
  footer.addColorStop(0, 'rgba(6,12,18,0)');
  footer.addColorStop(1, 'rgba(6,12,18,.75)');
  ctx.fillStyle = footer;
  ctx.fillRect(0, H - 92, W, 92);
}

function drawHeader() {
  ctx.fillStyle = 'rgba(255,255,255,.08)';
  ctx.beginPath();
  ctx.roundRect(HOME_BTN.x - 18, HOME_BTN.y - 18, 36, 36, 10);
  ctx.fill();
  ctx.font = '18px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillStyle = '#7dd3fc';
  ctx.fillText('🏠', HOME_BTN.x, HOME_BTN.y + 6);

  ctx.fillStyle = 'rgba(251,191,36,.16)';
  ctx.beginPath();
  ctx.roundRect(58, 14, 104, 34, 14);
  ctx.fill();
  ctx.fillStyle = '#fde68a';
  ctx.font = 'bold 18px sans-serif';
  ctx.textAlign = 'left';
  ctx.fillText(`💰 ${fmt(G.coins)}`, 68, 37);

  ctx.fillStyle = 'rgba(125,211,252,.12)';
  ctx.beginPath();
  ctx.roundRect(172, 14, 194, 34, 14);
  ctx.fill();
  ctx.fillStyle = '#cbd5e1';
  ctx.font = 'bold 10px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('①討伐', 206, 35);
  ctx.fillText('②調理', 248, 35);
  ctx.fillText('③販売', 290, 35);
  ctx.fillText('④自動化', 336, 35);
}

function drawStation(x, y, title, sub, accent, active) {
  ctx.save();
  const glow = active ? 0.18 + G.stationPulse * 0.14 : 0.08;
  ctx.fillStyle = 'rgba(8,15,28,.88)';
  ctx.beginPath();
  ctx.roundRect(x - 54, y - 44, 108, 82, 20);
  ctx.fill();
  ctx.strokeStyle = accent;
  ctx.lineWidth = 2.4;
  ctx.globalAlpha = 0.6 + glow;
  ctx.beginPath();
  ctx.roundRect(x - 54, y - 44, 108, 82, 20);
  ctx.stroke();
  ctx.globalAlpha = 1;
  ctx.fillStyle = '#e2e8f0';
  ctx.font = 'bold 12px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText(title, x, y - 26);
  ctx.fillStyle = '#94a3b8';
  ctx.font = '10px sans-serif';
  ctx.fillText(sub, x, y + 28);
  ctx.restore();
}

function drawCooker() {
  const active = dist2(G.player.x, G.player.y, COOKER.x, COOKER.y) <= STATION_R * STATION_R || G.cooker.queue > 0;
  drawStation(COOKER.x, COOKER.y, '🍳 調理場', '肉を吸い込んで料理化', '#fb923c', active);
  ctx.save();
  ctx.translate(COOKER.x, COOKER.y + 2);
  const wobble = Math.sin(G.time * 8) * 1.8;
  ctx.fillStyle = '#334155';
  ctx.beginPath(); ctx.ellipse(0, 14, 26, 10, 0, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#111827';
  ctx.beginPath(); ctx.roundRect(-28, -2, 56, 22, 12); ctx.fill();
  ctx.fillStyle = '#f97316';
  ctx.beginPath(); ctx.arc(0, 8 + wobble * 0.1, 15, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#fdba74';
  ctx.beginPath(); ctx.arc(-6, 5 + wobble * 0.15, 5, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(8, 10 - wobble * 0.1, 4, 0, Math.PI * 2); ctx.fill();
  ctx.strokeStyle = '#94a3b8'; ctx.lineWidth = 4;
  ctx.beginPath();
  ctx.moveTo(-23, 3); ctx.lineTo(-36, -6);
  ctx.moveTo(23, 3); ctx.lineTo(36, -6);
  ctx.stroke();
  if (G.cooker.queue > 0) {
    ctx.fillStyle = 'rgba(255,255,255,.12)';
    ctx.beginPath(); ctx.roundRect(-24, 28, 48, 7, 4); ctx.fill();
    ctx.fillStyle = '#fbbf24';
    ctx.beginPath(); ctx.roundRect(-24, 28, 48 * G.cooker.progress, 7, 4); ctx.fill();
  }
  ctx.fillStyle = '#fde68a'; ctx.font = 'bold 10px sans-serif'; ctx.textAlign = 'center';
  ctx.fillText(`待ち ${G.cooker.queue}`, 0, 48);
  for (let i = 0; i < 3; i++) {
    const sy = -18 - i * 10 - ((G.cooker.steam * 18 + i * 6) % 18);
    ctx.globalAlpha = 0.32 - i * 0.07 + G.cooker.flash * 0.12;
    ctx.fillStyle = '#ffffff';
    ctx.beginPath(); ctx.ellipse(-8 + i * 8, sy, 5, 7, 0, 0, Math.PI * 2); ctx.fill();
  }
  ctx.restore();
}

function drawSeller() {
  const active = dist2(G.player.x, G.player.y, SELLER.x, SELLER.y) <= STATION_R * STATION_R || G.seller.glow > 0;
  drawStation(SELLER.x, SELLER.y, '🏪 販売所', '料理が吸い込まれて換金', '#fde047', active);
  ctx.save();
  ctx.translate(SELLER.x, SELLER.y + 2);
  ctx.fillStyle = '#7c2d12';
  ctx.beginPath(); ctx.roundRect(-28, -2, 56, 22, 12); ctx.fill();
  ctx.fillStyle = '#dc2626';
  ctx.beginPath();
  ctx.moveTo(-34, -2); ctx.lineTo(0, -28); ctx.lineTo(34, -2); ctx.closePath();
  ctx.fill();
  ctx.fillStyle = '#fee2e2';
  for (let i = -2; i <= 2; i++) ctx.fillRect(i * 12 - 4, -10, 8, 8);
  ctx.fillStyle = '#fed7aa'; ctx.font = '18px sans-serif'; ctx.textAlign = 'center';
  ctx.fillText('🍖', -10, 12);
  ctx.fillText('💰', 12, 12);
  if (G.seller.glow > 0) {
    ctx.globalAlpha = G.seller.glow * 0.6;
    ctx.strokeStyle = '#fde68a'; ctx.lineWidth = 4;
    ctx.beginPath(); ctx.arc(0, 0, 38 - G.seller.glow * 8, 0, Math.PI * 2); ctx.stroke();
  }
  ctx.fillStyle = '#fde68a'; ctx.font = 'bold 10px sans-serif';
  ctx.fillText(`1皿 = ${MEAT_SELL_PRICE}G`, 0, 48);
  ctx.restore();
}

function drawMonster(monster) {
  const bounce = Math.sin(monster.bob) * 3;
  ctx.save();
  ctx.translate(monster.x, monster.y + bounce);
  ctx.fillStyle = 'rgba(0,0,0,.25)';
  ctx.beginPath(); ctx.ellipse(0, 18, 16, 6, 0, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = monster.type.tint;
  ctx.globalAlpha = 0.2;
  ctx.beginPath(); ctx.arc(0, 0, 22, 0, Math.PI * 2); ctx.fill();
  ctx.globalAlpha = 1;
  ctx.font = '30px sans-serif'; ctx.textAlign = 'center';
  ctx.fillText(monster.type.emoji, 0, 9);
  ctx.fillStyle = '#ffffff'; ctx.font = 'bold 10px sans-serif';
  ctx.fillText(monster.type.name, 0, -18);
  ctx.restore();
}

function drawDrops() {
  G.drops.forEach((drop) => {
    const bob = Math.sin(G.time * 3 + drop.bob) * 3;
    ctx.save();
    ctx.translate(drop.x, drop.y + bob);
    ctx.fillStyle = 'rgba(248,113,113,.24)';
    ctx.beginPath(); ctx.arc(0, 0, 16, 0, Math.PI * 2); ctx.fill();
    ctx.font = '20px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText('🥩', 0, 7);
    ctx.restore();
  });
}

function drawFlow(flow) {
  const t = easeInOut(flow.t);
  const arc = Math.sin(Math.PI * t) * 26;
  const x = lerp(flow.fromX, flow.toX, t);
  const y = lerp(flow.fromY, flow.toY, t) - arc;
  ctx.save();
  ctx.translate(x, y);
  ctx.globalAlpha = 1 - Math.max(0, flow.t - 0.82) / 0.18;
  ctx.fillStyle = flow.color;
  ctx.font = flow.kind === 'coin' ? 'bold 12px sans-serif' : '20px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText(flow.label, 0, 4);
  ctx.restore();
}

function drawSlash(slash) {
  ctx.save();
  ctx.translate(slash.x, slash.y);
  ctx.globalAlpha = slash.t;
  ctx.strokeStyle = slash.automated ? '#fde68a' : '#ffffff';
  ctx.lineWidth = 4;
  ctx.beginPath();
  ctx.arc(0, 0, 14 + (1 - slash.t) * 10, -Math.PI * 0.2, Math.PI * 0.6);
  ctx.stroke();
  ctx.restore();
}

function drawSparkles() {
  G.sparkles.forEach((spark) => {
    ctx.save();
    ctx.globalAlpha = spark.alpha;
    ctx.fillStyle = spark.color;
    ctx.beginPath(); ctx.arc(spark.x, spark.y, spark.r, 0, Math.PI * 2); ctx.fill();
    ctx.restore();
  });
}

function drawTouchGuide() {
  if (!G.pointer.active) return;
  const dx = G.pointer.x - G.player.x;
  const dy = G.pointer.y - G.player.y;
  const d = Math.sqrt(dx * dx + dy * dy);
  if (d < TOUCH_DEAD) return;
  const len = Math.min(d, TOUCH_MAX);
  const nx = dx / d;
  const ny = dy / d;
  ctx.save();
  ctx.strokeStyle = 'rgba(125,211,252,.45)';
  ctx.lineWidth = 3;
  ctx.setLineDash([8, 6]);
  ctx.beginPath();
  ctx.moveTo(G.player.x, G.player.y - 8);
  ctx.lineTo(G.player.x + nx * len, G.player.y + ny * len - 8);
  ctx.stroke();
  ctx.setLineDash([]);
  ctx.fillStyle = 'rgba(125,211,252,.22)';
  ctx.beginPath(); ctx.arc(G.pointer.x, G.pointer.y, 22, 0, Math.PI * 2); ctx.fill();
  ctx.strokeStyle = 'rgba(125,211,252,.8)'; ctx.lineWidth = 2.5;
  ctx.beginPath(); ctx.arc(G.pointer.x, G.pointer.y, 22, 0, Math.PI * 2); ctx.stroke();
  ctx.restore();
}

function drawStackColumn(x, baseY, color, label, count, emoji) {
  const visible = Math.min(count, 4);
  for (let i = 0; i < visible; i++) {
    ctx.save();
    ctx.translate(x + (i % 2 ? 2 : -2), baseY - i * 7);
    ctx.fillStyle = color;
    ctx.beginPath(); ctx.roundRect(-10, -8, 20, 16, 6); ctx.fill();
    ctx.globalAlpha = 0.16;
    ctx.fillStyle = '#ffffff';
    ctx.beginPath(); ctx.roundRect(-10, -8, 20, 6, 6); ctx.fill();
    ctx.globalAlpha = 1;
    ctx.font = '11px sans-serif'; ctx.textAlign = 'center'; ctx.fillStyle = '#fff';
    ctx.fillText(emoji, 0, 4);
    ctx.restore();
  }
  if (count > 0) {
    ctx.fillStyle = 'rgba(0,0,0,.56)';
    ctx.beginPath(); ctx.roundRect(x - 16, baseY - 42, 32, 16, 8); ctx.fill();
    ctx.fillStyle = '#fff'; ctx.font = 'bold 9px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText(`${label}${count}`, x, baseY - 30);
  }
}

function drawCharacter() {
  const p = G.player;
  const moving = Math.abs(p.vx) > 4 || Math.abs(p.vy) > 4;
  const swing = moving ? Math.sin(p.step * Math.PI * 0.5) * 6 : 0;
  const bob = moving ? Math.sin(p.step * Math.PI * 0.5) * 2 : 0;
  ctx.save();
  ctx.translate(p.x, p.y + bob);
  ctx.fillStyle = 'rgba(0,0,0,.24)';
  ctx.beginPath(); ctx.ellipse(0, 22, 16, 6, 0, 0, Math.PI * 2); ctx.fill();

  const packDir = p.dir === 1 ? -1 : 1;
  const packX = packDir * 18;
  if (G.raw || G.cooked || G.coins) {
    drawStackColumn(packX + packDir * 10, 2, '#7f1d1d', '肉', G.raw, '🥩');
    drawStackColumn(packX, -4, '#7c2d12', '皿', G.cooked, '🍖');
    drawStackColumn(packX - packDir * 10, -10, '#a16207', '金', Math.floor(G.coins / MEAT_SELL_PRICE), '💰');
  }

  ctx.fillStyle = '#2563eb';
  ctx.fillRect(-11, -4, 22, 24);
  ctx.fillStyle = '#1e40af';
  ctx.fillRect(-11, 6, 22, 6);
  ctx.fillStyle = '#1f2937';
  ctx.save(); ctx.translate(-5, 18); ctx.rotate(swing * 0.05); ctx.fillRect(-4, 0, 8, 16); ctx.restore();
  ctx.save(); ctx.translate(5, 18); ctx.rotate(-swing * 0.05); ctx.fillRect(-4, 0, 8, 16); ctx.restore();
  ctx.fillStyle = '#111827';
  ctx.fillRect(-6, 32, 10, 6);
  ctx.fillRect(0, 32, 10, 6);
  ctx.fillStyle = '#2563eb';
  ctx.save(); ctx.translate(-14, 0); ctx.rotate(swing * 0.05); ctx.fillRect(-3, 0, 6, 16); ctx.restore();
  ctx.save(); ctx.translate(14, 0); ctx.rotate(-swing * 0.05); ctx.fillRect(-3, 0, 6, 16); ctx.restore();
  ctx.fillStyle = '#fcd34d';
  ctx.beginPath(); ctx.arc(0, -18, 13, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#f59e0b';
  ctx.fillRect(-14, -36, 28, 8);
  ctx.fillRect(-10, -44, 20, 10);
  ctx.fillStyle = '#111827';
  ctx.beginPath(); ctx.arc(p.dir * 4, -20, 2.2, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(p.dir * 1, -24, 2, 0, Math.PI * 2); ctx.fill();
  ctx.strokeStyle = '#92400e'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.arc(0, -13, 4, 0.15 * Math.PI, 0.85 * Math.PI); ctx.stroke();

  if (p.touchGlow > 0) {
    ctx.globalAlpha = p.touchGlow * 0.5;
    ctx.fillStyle = '#fef3c7';
    ctx.beginPath(); ctx.arc(0, -2, 24, 0, Math.PI * 2); ctx.fill();
  }
  ctx.restore();
}

function drawAutomationHelpers() {
  if (G.automation.hunt > 0) {
    ctx.fillStyle = 'rgba(253,224,71,.16)';
    ctx.beginPath(); ctx.roundRect(18, 222, 52, 58, 16); ctx.fill();
    ctx.font = '20px sans-serif'; ctx.textAlign = 'center'; ctx.fillStyle = '#fde68a';
    ctx.fillText('⚔️', 44, 249);
    ctx.fillStyle = '#f8fafc'; ctx.font = 'bold 10px sans-serif';
    ctx.fillText(`LV${G.automation.hunt}`, 44, 266);
  }
  if (G.automation.cook > 0) {
    ctx.fillStyle = 'rgba(251,146,60,.14)';
    ctx.beginPath(); ctx.roundRect(COOKER.x - 24, 206, 48, 20, 10); ctx.fill();
    ctx.fillStyle = '#fdba74'; ctx.font = 'bold 10px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText(`AUTO LV${G.automation.cook}`, COOKER.x, 219);
  }
  if (G.automation.sell > 0) {
    ctx.fillStyle = 'rgba(253,224,71,.14)';
    ctx.beginPath(); ctx.roundRect(SELLER.x - 24, 206, 48, 20, 10); ctx.fill();
    ctx.fillStyle = '#fde68a'; ctx.font = 'bold 10px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText(`AUTO LV${G.automation.sell}`, SELLER.x, 219);
  }
  G.autoTrails.forEach((trail) => {
    ctx.save();
    ctx.globalAlpha = trail.t;
    ctx.strokeStyle = '#fde68a'; ctx.lineWidth = 2.5;
    ctx.setLineDash([6, 4]);
    ctx.beginPath();
    ctx.moveTo(trail.x1, trail.y1);
    ctx.lineTo(trail.x2, trail.y2);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.restore();
  });
}

function drawHudCards() {
  const flash = G.summaryFlash * 0.15;
  const cards = [
    { x: 44, y: H - 82, w: 88, title: '討伐肉', value: `${G.raw}`, sub: '背中で運搬', accent: '#f87171' },
    { x: 144, y: H - 82, w: 88, title: '料理', value: `${G.cooked}`, sub: '販売待ち', accent: '#fb923c' },
    { x: 244, y: H - 82, w: 88, title: '自動化', value: `${G.automation.hunt + G.automation.cook + G.automation.sell}/9`, sub: '強化進行', accent: '#38bdf8' },
  ];
  cards.forEach((card) => {
    ctx.fillStyle = `rgba(8,15,28,${0.78 + flash})`;
    ctx.beginPath(); ctx.roundRect(card.x, card.y, card.w, 54, 16); ctx.fill();
    ctx.strokeStyle = card.accent;
    ctx.globalAlpha = 0.42 + flash;
    ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.roundRect(card.x, card.y, card.w, 54, 16); ctx.stroke();
    ctx.globalAlpha = 1;
    ctx.fillStyle = '#94a3b8'; ctx.font = '10px sans-serif'; ctx.textAlign = 'left';
    ctx.fillText(card.title, card.x + 12, card.y + 16);
    ctx.fillStyle = '#f8fafc'; ctx.font = 'bold 18px sans-serif';
    ctx.fillText(card.value, card.x + 12, card.y + 36);
    ctx.fillStyle = card.accent; ctx.font = '10px sans-serif';
    ctx.fillText(card.sub, card.x + 12, card.y + 48);
  });

  ctx.save();
  ctx.translate(SHOP_BTN.x, SHOP_BTN.y);
  const pulse = 1 + Math.sin(G.time * 3.2) * 0.05;
  ctx.scale(pulse, pulse);
  const grad = ctx.createRadialGradient(-6, -6, 2, 0, 0, 34);
  grad.addColorStop(0, '#67e8f9');
  grad.addColorStop(0.65, '#0ea5e9');
  grad.addColorStop(1, '#0369a1');
  ctx.fillStyle = grad;
  ctx.beginPath(); ctx.arc(0, 0, SHOP_BTN.r, 0, Math.PI * 2); ctx.fill();
  ctx.strokeStyle = 'rgba(255,255,255,.8)'; ctx.lineWidth = 2.5;
  ctx.beginPath(); ctx.arc(0, 0, SHOP_BTN.r, 0, Math.PI * 2); ctx.stroke();
  ctx.fillStyle = '#fff'; ctx.font = 'bold 12px sans-serif'; ctx.textAlign = 'center';
  ctx.fillText('AUTO', 0, -1);
  ctx.font = '10px sans-serif';
  ctx.fillText('強化', 0, 12);
  ctx.restore();
}

function drawHints() {
  ctx.fillStyle = 'rgba(255,255,255,.42)';
  ctx.font = 'bold 11px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('キャラの周りを触ると、その向きへ移動', W / 2, 102);
  ctx.fillText('行動エリアは画面中央の帯に収まります', W / 2, 118);

  if (G.time < 10) {
    const alpha = G.time < 7 ? 1 : (10 - G.time) / 3;
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.fillStyle = 'rgba(2,10,18,.7)';
    ctx.beginPath(); ctx.roundRect(44, 544, 248, 44, 14); ctx.fill();
    ctx.fillStyle = '#fde68a'; ctx.font = 'bold 12px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText('🥩 倒した肉が背中に積まれる → 調理場へ', 168, 564);
    ctx.fillText('🍖 料理を背負って販売所へ行くと吸い込まれる', 168, 580);
    ctx.restore();
  }

  if (G.message) {
    ctx.save();
    ctx.globalAlpha = Math.min(1, G.message.t * 2.2);
    ctx.fillStyle = 'rgba(2,10,18,.82)';
    ctx.beginPath(); ctx.roundRect(W / 2 - 132, 84, 264, 32, 14); ctx.fill();
    ctx.fillStyle = '#e0f2fe'; ctx.font = 'bold 13px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText(G.message.text, W / 2, 105);
    ctx.restore();
  }
}

function drawPops() {
  G.pops.forEach((pop) => {
    ctx.save();
    ctx.globalAlpha = pop.alpha;
    ctx.fillStyle = pop.color;
    ctx.font = 'bold 13px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(pop.text, pop.x, pop.y);
    ctx.restore();
  });
}

function render() {
  ctx.clearRect(0, 0, W, H);
  drawBackground();
  drawHeader();
  drawHints();
  drawCooker();
  drawSeller();
  drawAutomationHelpers();
  drawDrops();
  G.monsters.forEach(drawMonster);
  drawTouchGuide();
  drawCharacter();
  G.slashes.forEach(drawSlash);
  G.flows.forEach(drawFlow);
  drawSparkles();
  drawHudCards();
  drawPops();
}

function loop(ts) {
  const dt = Math.min((ts - lastT) / 1000, 0.05);
  lastT = ts;
  if (!G.shopOpen) update(dt);
  render();
  requestAnimationFrame(loop);
}

resetGame();
lastT = performance.now();
requestAnimationFrame(loop);
})();
</script>
