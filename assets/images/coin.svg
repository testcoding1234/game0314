  <!-- Highlight arc -->
  <path d="M16,22 Q22,14 32,12" stroke="#fff9c4" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.7"/>
  <!-- Shadow arc -->
  <path d="M46,40 Q50,48 44,54" stroke="#e65100" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.4"/>
