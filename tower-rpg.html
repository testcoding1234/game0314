<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>勇者の塔</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none;}
html,body{width:100%;height:100%;background:#0a0010;display:flex;align-items:center;justify-content:center;overflow:hidden;touch-action:none;}
#app{position:relative;width:375px;height:667px;overflow:hidden;font-family:system-ui,-apple-system,sans-serif;color:#e2e8f0;}

/* ====== TITLE SCREEN ====== */
#titleScreen{position:absolute;inset:0;background:linear-gradient(180deg,#0a0020 0%,#1a0040 40%,#0a0020 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;gap:0;}
.title-bg-stars{position:absolute;inset:0;pointer-events:none;overflow:hidden;}
.star-p{position:absolute;border-radius:50%;background:#fff;animation:twinkle linear infinite;}
@keyframes twinkle{0%,100%{opacity:.2}50%{opacity:1}}
.title-logo{font-size:64px;margin-bottom:8px;animation:floatY 2.5s ease-in-out infinite;}
@keyframes floatY{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
.title-main{font-size:38px;font-weight:900;background:linear-gradient(135deg,#fde68a,#f59e0b,#fde68a);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:.08em;filter:drop-shadow(0 0 20px rgba(245,158,11,.6));}
.title-sub{font-size:13px;color:#a78bfa;letter-spacing:.12em;margin-top:4px;margin-bottom:24px;}
.title-hero{font-size:80px;margin:6px 0;animation:titleHeroFloat 1.4s ease-in-out infinite alternate;}
@keyframes titleHeroFloat{from{transform:translateY(0)}to{transform:translateY(-10px)}}
.title-desc{font-size:12px;color:#94a3b8;text-align:center;line-height:1.8;margin-bottom:28px;padding:0 24px;}
.title-start-btn{background:linear-gradient(135deg,#7c3aed,#9333ea,#c026d3);color:#fff;font-size:20px;font-weight:900;padding:16px 48px;border-radius:50px;border:none;cursor:pointer;box-shadow:0 0 30px rgba(147,51,234,.7),0 4px 16px rgba(0,0,0,.5);letter-spacing:.1em;animation:pulseShadow 1.5s ease-in-out infinite;}
@keyframes pulseShadow{0%,100%{box-shadow:0 0 20px rgba(147,51,234,.5),0 4px 16px rgba(0,0,0,.5)}50%{box-shadow:0 0 40px rgba(147,51,234,.9),0 4px 20px rgba(0,0,0,.6)}}
.title-start-btn:active{transform:scale(.95);}
.back-link{position:absolute;top:14px;left:14px;font-size:12px;color:#6b7280;cursor:pointer;padding:6px 10px;border-radius:8px;border:1px solid rgba(107,114,128,.3);}
.back-link:active{background:rgba(255,255,255,.05);}

/* ====== GAME SCREEN ====== */
#gameScreen{position:absolute;inset:0;background:linear-gradient(180deg,#05001a 0%,#0d0030 50%,#080015 100%);display:none;flex-direction:column;}

/* header */
#gameHeader{height:50px;flex-shrink:0;display:flex;align-items:center;justify-content:space-between;padding:0 12px;background:rgba(0,0,18,.88);border-bottom:1px solid rgba(139,92,246,.3);}
#powerDisplay{display:flex;align-items:center;gap:6px;background:rgba(245,158,11,.12);border:1.5px solid rgba(245,158,11,.5);border-radius:20px;padding:4px 12px;}
#powerIcon{font-size:17px;}
#powerValue{font-size:21px;font-weight:900;color:#fbbf24;min-width:52px;text-align:right;}
.power-up{animation:powerBump .4s ease;}
@keyframes powerBump{0%,100%{transform:scale(1);color:#fbbf24}40%{transform:scale(1.5);color:#fde68a}}
#progressLabel{font-size:11px;color:#a78bfa;font-weight:700;letter-spacing:.04em;}

/* ====== TOWER PANORAMA ====== */
#towerPanorama{
  flex:1;
  overflow-x:auto;
  overflow-y:hidden;
  position:relative;
  background:
    radial-gradient(ellipse at 50% 0%,rgba(80,0,160,.18) 0%,transparent 65%),
    linear-gradient(180deg,#06001e 0%,#0c0028 40%,#100030 75%,#090018 100%);
  scrollbar-width:none;
  touch-action:pan-x;
}
#towerPanorama::-webkit-scrollbar{display:none;}
#towerTrack{
  display:inline-flex;
  align-items:flex-end;
  height:100%;
  padding:0 20px 46px 56px;
  position:relative;
  gap:0;
  min-width:100%;
}
/* ground line */
#towerTrack::after{
  content:"";
  position:absolute;
  bottom:46px;
  left:0;right:0;
  height:2px;
  background:linear-gradient(90deg,transparent,rgba(139,92,246,.55) 8%,rgba(139,92,246,.55) 92%,transparent);
}
/* hero */
#heroEl{
  position:absolute;
  bottom:42px;
  left:8px;
  z-index:20;
  text-align:center;
  transition:left .55s cubic-bezier(.34,1.4,.64,1);
}
#heroChar{font-size:36px;display:block;animation:heroFloat 1.1s ease-in-out infinite alternate;}
@keyframes heroFloat{from{transform:translateY(0)}to{transform:translateY(-7px)}}
#heroLabel{font-size:8px;color:#a78bfa;font-weight:700;letter-spacing:.06em;margin-top:1px;}

/* ====== ROOMS ====== */
.room{
  position:relative;
  flex-shrink:0;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:space-between;
  padding:6px 4px 7px;
  border-radius:7px 7px 0 0;
  cursor:pointer;
  transition:transform .13s,box-shadow .2s;
  border:2px solid;
  border-bottom:none;
  overflow:hidden;
  margin:0 3px;
}
.room:active:not(.done):not(.locked){transform:scale(.93);}
/* battlements */
.room::before{
  content:"";
  position:absolute;
  top:0;left:0;right:0;
  height:7px;
  clip-path:polygon(0 100%,0 0,14.3% 0,14.3% 100%,28.6% 100%,28.6% 0,42.9% 0,42.9% 100%,57.1% 100%,57.1% 0,71.4% 0,71.4% 100%,85.7% 100%,85.7% 0,100% 0,100% 100%);
}
/* size classes */
.room.sz-xs  {width:52px; height:85px;}
.room.sz-sm  {width:64px; height:120px;}
.room.sz-md  {width:76px; height:165px;}
.room.sz-lg  {width:90px; height:215px;}
.room.sz-boss{width:108px;height:290px;}
.room.sz-item{width:62px; height:115px;}
/* emoji sizes per size-class */
.room.sz-xs  .room-char{font-size:26px;}
.room.sz-sm  .room-char{font-size:36px;}
.room.sz-md  .room-char{font-size:50px;}
.room.sz-lg  .room-char{font-size:64px;}
.room.sz-boss .room-char{font-size:80px;}
.room.sz-item .room-char{font-size:36px;}
/* enemy style */
.room.enemy{
  background:linear-gradient(180deg,rgba(55,5,18,.93) 0%,rgba(28,2,10,.97) 100%);
  border-color:rgba(239,68,68,.45);
}
.room.enemy::before{background:rgba(239,68,68,.55);}
/* item style */
.room.item-room{
  background:linear-gradient(180deg,rgba(8,22,58,.93) 0%,rgba(4,13,42,.97) 100%);
  border-color:rgba(96,165,250,.45);
}
.room.item-room::before{background:rgba(96,165,250,.55);}
/* boss */
.room.boss{
  background:linear-gradient(180deg,rgba(90,0,0,.96) 0%,rgba(50,0,0,1) 100%);
  border-color:rgba(239,68,68,.95)!important;
  box-shadow:0 0 28px rgba(239,68,68,.55),inset 0 0 18px rgba(239,68,68,.12);
}
.room.boss::before{background:rgba(239,68,68,.85);}
.room.boss::after{content:"👑";position:absolute;top:10px;right:5px;font-size:11px;}
/* done */
.room.done{opacity:.22;pointer-events:none;filter:grayscale(.85) brightness(.65);}
/* locked */
.room.locked{opacity:.38;pointer-events:none;filter:grayscale(.65) brightness(.55);}
/* room internals */
.room-char{flex:1;display:flex;align-items:center;justify-content:center;line-height:1;}
.room-val{font-size:13px;font-weight:900;color:#fbbf24;line-height:1.1;margin-bottom:1px;}
.room.item-room .room-val{color:#60a5fa;}
.room.boss .room-val{color:#f87171;}
.room-name{font-size:7.5px;color:#94a3b8;text-align:center;max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
/* tower dividers */
.tower-div{display:flex;flex-direction:column;align-items:center;width:22px;flex-shrink:0;padding-bottom:46px;align-self:stretch;position:relative;}
.tower-div-line{width:2px;flex:1;background:linear-gradient(180deg,transparent,rgba(139,92,246,.45) 20%,rgba(139,92,246,.6) 50%,rgba(139,92,246,.45) 80%,transparent);border-radius:2px;}
.tower-div-label{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) rotate(-90deg);font-size:7.5px;color:#5b21b6;white-space:nowrap;font-weight:700;letter-spacing:.07em;pointer-events:none;}

/* ====== BATTLE ANIMATION ====== */
@keyframes battleShake{
  0%  {transform:translateX(0) scale(1);}
  10% {transform:translateX(-9px) scale(1.08);box-shadow:0 0 22px rgba(255,40,40,.85);}
  22% {transform:translateX(9px) scale(1.08);}
  33% {transform:translateX(-6px);}
  44% {transform:translateX(6px);}
  55% {transform:translateX(-3px);box-shadow:0 0 10px rgba(255,40,40,.5);}
  66% {transform:translateX(3px);}
  78% {transform:translateX(0) scale(.9);opacity:.65;}
  100%{transform:translateX(0) scale(1);opacity:.22;filter:grayscale(.85) brightness(.65);}
}
.room.battle-anim{animation:battleShake .72s ease forwards;pointer-events:none;}

/* ====== ABSORB ANIMATION ====== */
@keyframes absorbGlow{
  0%  {transform:scale(1);box-shadow:0 0 0 0 rgba(96,165,250,0);}
  22% {transform:scale(1.22);box-shadow:0 0 32px 14px rgba(96,165,250,.85);}
  50% {transform:scale(1.1);box-shadow:0 0 20px 7px rgba(147,51,234,.65);}
  78% {transform:scale(.5) translateY(-14px);box-shadow:0 0 8px rgba(96,165,250,.3);opacity:.5;}
  100%{transform:scale(.08) translateY(-22px);opacity:.1;}
}
.room.absorb-anim{animation:absorbGlow .58s ease forwards;pointer-events:none;}

/* clash effect */
.clash-effect{position:absolute;pointer-events:none;z-index:60;font-size:34px;animation:clashPop .52s ease-out forwards;}
@keyframes clashPop{
  0%  {transform:scale(0) rotate(-35deg);opacity:1;}
  38% {transform:scale(1.6) rotate(18deg);opacity:1;}
  68% {transform:scale(1.1) rotate(0deg);opacity:.85;}
  100%{transform:scale(.15) rotate(8deg);opacity:0;}
}
/* floating text */
.float-text{position:absolute;pointer-events:none;z-index:300;font-size:24px;font-weight:900;text-shadow:2px 2px 0 rgba(0,0,0,.8);animation:floatUp .92s ease-out forwards;}
@keyframes floatUp{0%{opacity:1;transform:translateY(0) scale(1)}55%{opacity:1;transform:translateY(-48px) scale(1.25)}100%{opacity:0;transform:translateY(-88px) scale(.55)}}

/* ====== CALC LOG ====== */
#calcLog{height:36px;flex-shrink:0;background:rgba(0,0,18,.82);border-top:1px solid rgba(139,92,246,.2);display:flex;align-items:center;padding:0 12px;overflow-x:auto;scrollbar-width:none;gap:4px;white-space:nowrap;}
#calcLog::-webkit-scrollbar{display:none;}
.calc-token{font-size:11px;font-weight:700;border-radius:6px;padding:2px 7px;}
.calc-token.op{color:#a78bfa;background:rgba(139,92,246,.15);}
.calc-token.num{color:#fbbf24;background:rgba(245,158,11,.12);}
.calc-token.result{color:#4ade80;background:rgba(74,222,128,.12);}
.calc-token.lose{color:#f87171;background:rgba(239,68,68,.12);}

/* ====== INSTRUCTION ====== */
#instruction{height:30px;flex-shrink:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,18,.62);}
#instruction p{font-size:10px;color:#6b7280;letter-spacing:.03em;}

/* ====== RESULT SCREENS ====== */
#clearScreen,#gameoverScreen{position:absolute;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;z-index:200;gap:14px;}
#clearScreen{background:linear-gradient(180deg,#0f3020 0%,#1a4030 50%,#0f3020 100%);}
#gameoverScreen{background:linear-gradient(180deg,#300a0a 0%,#500d0d 50%,#300a0a 100%);}
.result-emoji{font-size:80px;animation:resultPop .6s cubic-bezier(.175,.885,.32,1.275) both;}
@keyframes resultPop{from{transform:scale(0) rotate(-20deg)}to{transform:scale(1) rotate(0deg)}}
.result-title{font-size:36px;font-weight:900;letter-spacing:.1em;}
.result-title.win{background:linear-gradient(135deg,#fde68a,#f59e0b);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.result-title.lose{color:#f87171;}
.result-desc{font-size:14px;color:#94a3b8;text-align:center;padding:0 24px;line-height:1.7;}
.result-stats{background:rgba(0,0,0,.3);border-radius:14px;padding:14px 24px;font-size:13px;color:#c4b5fd;text-align:center;line-height:2;}
.result-btn{background:linear-gradient(135deg,#7c3aed,#9333ea);color:#fff;font-size:16px;font-weight:900;padding:14px 40px;border-radius:40px;border:none;cursor:pointer;box-shadow:0 4px 20px rgba(147,51,234,.5);}
.result-btn:active{transform:scale(.95);}
.result-btn.retry{background:linear-gradient(135deg,#dc2626,#b91c1c);}
.result-home{font-size:12px;color:#6b7280;cursor:pointer;padding:6px;border-bottom:1px solid rgba(107,114,128,.3);}
/* transition overlay */
#transOverlay{position:absolute;inset:0;background:#000;z-index:150;pointer-events:none;opacity:0;transition:opacity .3s;}
</style>
</head>
<body>
<div id="app">

  <!-- ===== TITLE SCREEN ===== -->
  <div id="titleScreen">
    <div class="title-bg-stars" id="titleStars"></div>
    <div class="back-link" onclick="location.href='index.html'">← ホーム</div>
    <div class="title-logo">🏰</div>
    <div class="title-main">勇者の塔</div>
    <div class="title-sub">HERO'S TOWER</div>
    <div class="title-hero">⚔️</div>
    <div class="title-desc">塔の全貌を見渡しながら左から右へ進め！<br>敵を選んで戦い、アイテムを吸収しよう！<br>順番が勝敗を左右する！魔王を倒せ！</div>
    <button class="title-start-btn" id="startBtn">ゲームスタート</button>
  </div>

  <!-- ===== GAME SCREEN ===== -->
  <div id="gameScreen">
    <div id="gameHeader">
      <div id="powerDisplay">
        <span id="powerIcon">⚔️</span>
        <span id="powerValue">10</span>
      </div>
      <div id="progressLabel">0 / 0 撃破</div>
    </div>

    <!-- Tower panorama: ALL floors visible left to right, horizontally scrollable -->
    <div id="towerPanorama">
      <div id="towerTrack">
        <div id="heroEl">
          <div id="heroChar">🧙</div>
          <div id="heroLabel">YOU</div>
        </div>
      </div>
    </div>

    <div id="calcLog"><span class="calc-token num">10</span></div>
    <div id="instruction"><p>← → スクロールで全体を確認 ✦ タップして戦う・アイテムを使う</p></div>
  </div>

  <!-- ===== CLEAR SCREEN ===== -->
  <div id="clearScreen">
    <div class="result-emoji">🏆</div>
    <div class="result-title win">VICTORY!</div>
    <div class="result-desc">魔王を倒した！<br>勇者の伝説が始まる…</div>
    <div class="result-stats" id="clearStats"></div>
    <button class="result-btn" onclick="restartGame()">もう一度挑戦</button>
    <div class="result-home" onclick="location.href='index.html'">← ホームへ戻る</div>
  </div>

  <!-- ===== GAMEOVER SCREEN ===== -->
  <div id="gameoverScreen">
    <div class="result-emoji">💀</div>
    <div class="result-title lose">GAME OVER</div>
    <div class="result-desc" id="gameoverDesc">選ぶ順番が鍵だ…<br>もう一度戦略を考えよう！</div>
    <div class="result-stats" id="gameoverStats"></div>
    <button class="result-btn retry" onclick="restartGame()">リベンジ！</button>
    <div class="result-home" onclick="location.href='index.html'">← ホームへ戻る</div>
  </div>

  <div id="transOverlay"></div>
</div>

<script>
// ======================================================
// GAME DATA — 4 towers, 16 floors total
// ======================================================
const BOSS_POWER = 3000;
const TOWERS = [
  {
    id: 0, name: "エントランスの塔", emoji: "🌲",
    floors: [
      { id:0, type:"enemy", emoji:"🐺", name:"ウルフ",      value:8   },
      { id:1, type:"item",  emoji:"🍄", name:"魔法のキノコ", op:"×",  value:3   },
      { id:2, type:"enemy", emoji:"🦁", name:"ライオン",    value:25  },
    ]
  },
  {
    id: 1, name: "森の砦", emoji: "🏚️",
    floors: [
      { id:0, type:"enemy", emoji:"👺", name:"ゴブリンA",   value:50  },
      { id:1, type:"enemy", emoji:"👺", name:"ゴブリンB",   value:70  },
      { id:2, type:"item",  emoji:"💊", name:"回復薬",      op:"+",  value:100 },
      { id:3, type:"enemy", emoji:"🐉", name:"小ドラゴン",  value:180 },
    ]
  },
  {
    id: 2, name: "暗黒の塔", emoji: "🏰",
    floors: [
      { id:0, type:"enemy", emoji:"🗡️",  name:"闇の騎士",   value:250 },
      { id:1, type:"item",  emoji:"💎", name:"魔法の結晶", op:"×",  value:2   },
      { id:2, type:"enemy", emoji:"🧙", name:"大魔道士",   value:500 },
      { id:3, type:"item",  emoji:"💀", name:"呪いの偶像", op:"÷",  value:4   },
      { id:4, type:"enemy", emoji:"👿", name:"堕天使",     value:800 },
    ]
  },
  {
    id: 3, name: "魔王城", emoji: "👑",
    floors: [
      { id:0, type:"enemy", emoji:"👹", name:"魔王の番人", value:400  },
      { id:1, type:"item",  emoji:"⚡", name:"聖剣の力",  op:"×",  value:3    },
      { id:2, type:"enemy", emoji:"🦊", name:"九尾の狐",  value:1200 },
      { id:3, type:"enemy", emoji:"😈", name:"魔王",      value:BOSS_POWER, isBoss:true },
    ]
  }
];

const TOTAL_ENEMIES = TOWERS.reduce((s,t) => s + t.floors.filter(f => f.type==="enemy").length, 0);

// ======================================================
// GAME STATE
// ======================================================
let gs = {
  phase: "TITLE",
  power: 10,
  towerIndex: 0,
  floorsDone: [],
  calcTokens: [],
  turnsTotal: 0,
  defeatedEnemies: 0,
};

function $(id){ return document.getElementById(id); }

// ======================================================
// ROOM SIZE CLASS
// ======================================================
function sizeClass(floor){
  if(floor.isBoss)        return "sz-boss";
  if(floor.type==="item") return "sz-item";
  if(floor.value >= 500)  return "sz-lg";
  if(floor.value >= 100)  return "sz-md";
  if(floor.value >= 30)   return "sz-sm";
  return "sz-xs";
}

// ======================================================
// APPLY POWER
// ======================================================
function applyPower(floor){
  if(floor.type==="enemy"){
    if(gs.power > floor.value){
      gs.power = Math.floor(gs.power + floor.value);
      gs.defeatedEnemies++;
      return { ok:true, delta:"+"+floor.value };
    }
    return { ok:false };
  }
  if(floor.op==="×")      gs.power = Math.floor(gs.power * floor.value);
  else if(floor.op==="+") gs.power = Math.floor(gs.power + floor.value);
  else if(floor.op==="÷") gs.power = Math.floor(gs.power / floor.value);
  return { ok:true, delta:floor.op+floor.value };
}

// ======================================================
// BUILD PANORAMA
// ======================================================
function buildPanorama(){
  const track  = $("towerTrack");
  const heroEl = $("heroEl");
  track.innerHTML = "";
  track.appendChild(heroEl);

  TOWERS.forEach((tower, ti) => {
    if(ti > 0){
      const div  = document.createElement("div");
      div.className = "tower-div";
      const line = document.createElement("div");
      line.className = "tower-div-line";
      const lbl  = document.createElement("div");
      lbl.className = "tower-div-label";
      lbl.textContent = tower.name;
      div.appendChild(line);
      div.appendChild(lbl);
      track.appendChild(div);
    }

    tower.floors.forEach(floor => {
      const key      = ti+"-"+floor.id;
      const done     = gs.floorsDone.includes(key);
      const isFuture = (ti > gs.towerIndex);

      const room = document.createElement("div");
      room.id    = "room-"+ti+"-"+floor.id;
      room.className = [
        "room",
        floor.type==="enemy" ? "enemy" : "item-room",
        floor.isBoss ? "boss" : "",
        sizeClass(floor),
        done     ? "done"   : "",
        (!done && isFuture) ? "locked" : ""
      ].filter(Boolean).join(" ");
      room.dataset.ti = ti;
      room.dataset.fi = floor.id;

      const charEl = document.createElement("div");
      charEl.className  = "room-char";
      charEl.textContent = floor.emoji;
      room.appendChild(charEl);

      const valEl = document.createElement("div");
      valEl.className  = "room-val";
      valEl.textContent = floor.type==="enemy" ? String(floor.value) : (floor.op+floor.value);
      room.appendChild(valEl);

      const nameEl = document.createElement("div");
      nameEl.className  = "room-name";
      nameEl.textContent = floor.name;
      room.appendChild(nameEl);

      if(!done && !isFuture){
        room.addEventListener("click",    () => onRoomTap(ti, floor.id, room, floor));
        room.addEventListener("touchend", e  => { e.preventDefault(); onRoomTap(ti, floor.id, room, floor); });
      }
      track.appendChild(room);
    });
  });

  updateHeroPosition();
  updateProgress();
}

// ======================================================
// HERO POSITION
// ======================================================
function updateHeroPosition(){
  const hero  = $("heroEl");
  const track = $("towerTrack");
  if(!hero || !track) return;

  const allRooms  = Array.from(track.querySelectorAll(".room"));
  const trackRect = track.getBoundingClientRect();

  const nextRoom = allRooms.find(r =>
    !r.classList.contains("done") &&
    !r.classList.contains("locked") &&
    !r.classList.contains("battle-anim") &&
    !r.classList.contains("absorb-anim")
  );

  if(nextRoom){
    const rr = nextRoom.getBoundingClientRect();
    hero.style.left = Math.max(8, rr.left - trackRect.left - 46) + "px";
  } else {
    const last = [...allRooms].reverse().find(r => r.classList.contains("done"));
    if(last){
      const rr = last.getBoundingClientRect();
      hero.style.left = (rr.right - trackRect.left + 6) + "px";
    }
  }
}

// ======================================================
// SCROLL TO ACTIVE
// ======================================================
function scrollToActive(){
  const pan     = $("towerPanorama");
  const nxt     = pan.querySelector(".room:not(.done):not(.locked)");
  if(!nxt) return;
  const panRect = pan.getBoundingClientRect();
  const rRect   = nxt.getBoundingClientRect();
  pan.scrollTo({ left: Math.max(0, pan.scrollLeft + (rRect.left - panRect.left) - 80), behavior:"smooth" });
}

// ======================================================
// ROOM TAP
// ======================================================
function onRoomTap(ti, fi, el, floor){
  const key = ti+"-"+floor.id;
  if(gs.floorsDone.includes(key)) return;

  gs.turnsTotal++;
  const result = applyPower(floor);

  if(!result.ok){
    el.classList.add("battle-anim");
    spawnFloat(el, "❌ 力不足！", "#f87171");
    el.addEventListener("animationend", () => showGameover(floor), { once:true });
    return;
  }

  gs.floorsDone.push(key);

  if(floor.type==="enemy"){
    el.classList.add("battle-anim");
    spawnClash(el);
    spawnFloat(el, "+"+floor.value, "#4ade80");
  } else {
    el.classList.add("absorb-anim");
    spawnFloat(el, result.delta, "#60a5fa");
  }

  pushCalcToken(result.delta, floor.type==="item" ? "op" : "num");
  pushCalcToken("=", "op");
  pushCalcToken(String(gs.power), "result");
  updatePowerDisplay();
  updateProgress();

  el.addEventListener("animationend", () => {
    el.classList.add("done");
    el.classList.remove("battle-anim", "absorb-anim");

    if(floor.isBoss){ setTimeout(() => showClear(), 700); return; }

    checkTowerAdvance();
    updateHeroPosition();
    scrollToActive();
  }, { once:true });
}

// ======================================================
// CHECK TOWER ADVANCE
// ======================================================
function checkTowerAdvance(){
  const tower   = TOWERS[gs.towerIndex];
  const allDone = tower.floors.every(f => gs.floorsDone.includes(gs.towerIndex+"-"+f.id));
  if(allDone && gs.towerIndex < TOWERS.length - 1){
    gs.towerIndex++;
    TOWERS[gs.towerIndex].floors.forEach(f => {
      const roomEl = $("room-"+gs.towerIndex+"-"+f.id);
      if(roomEl){
        roomEl.classList.remove("locked");
        const fi = f.id;
        const floor = f;
        const ti = gs.towerIndex;
        roomEl.addEventListener("click",    () => onRoomTap(ti, fi, roomEl, floor));
        roomEl.addEventListener("touchend", e  => { e.preventDefault(); onRoomTap(ti, fi, roomEl, floor); });
      }
    });
    showTowerFlash(TOWERS[gs.towerIndex].name);
  }
  updateProgress();
}

// ======================================================
// POWER DISPLAY
// ======================================================
function updatePowerDisplay(){
  const el = $("powerValue");
  el.textContent = gs.power;
  el.classList.remove("power-up");
  void el.offsetWidth;
  el.classList.add("power-up");
}

function updateProgress(){
  $("progressLabel").textContent = gs.defeatedEnemies + " / " + TOTAL_ENEMIES + " 撃破";
}

// ======================================================
// FLOATING TEXT + CLASH
// ======================================================
function spawnFloat(anchorEl, text, color){
  const rect    = anchorEl.getBoundingClientRect();
  const appRect = $("app").getBoundingClientRect();
  const ft = document.createElement("div");
  ft.className   = "float-text";
  ft.textContent = text;
  ft.style.color = color;
  ft.style.left  = (rect.left - appRect.left + rect.width/2  - 20) + "px";
  ft.style.top   = (rect.top  - appRect.top  + rect.height/2 - 10) + "px";
  $("app").appendChild(ft);
  ft.addEventListener("animationend", () => ft.remove());
}

function spawnClash(anchorEl){
  const rect    = anchorEl.getBoundingClientRect();
  const appRect = $("app").getBoundingClientRect();
  const cl = document.createElement("div");
  cl.className   = "clash-effect";
  cl.textContent = "⚔️";
  cl.style.left  = (rect.left - appRect.left + rect.width/2  - 17) + "px";
  cl.style.top   = (rect.top  - appRect.top  + rect.height/2 - 17) + "px";
  $("app").appendChild(cl);
  cl.addEventListener("animationend", () => cl.remove());
}

// ======================================================
// CALC LOG
// ======================================================
function pushCalcToken(label, cls){
  gs.calcTokens.push({ label, cls });
  renderCalcLog();
}
function renderCalcLog(){
  const log = $("calcLog");
  log.innerHTML = "";
  gs.calcTokens.forEach(t => {
    const span = document.createElement("span");
    span.className   = "calc-token "+t.cls;
    span.textContent = t.label;
    log.appendChild(span);
  });
  log.scrollLeft = log.scrollWidth;
}

// ======================================================
// TOWER FLASH
// ======================================================
function showTowerFlash(name){
  const el = document.createElement("div");
  el.style.cssText = "position:absolute;inset:0;display:flex;align-items:center;justify-content:center;z-index:180;pointer-events:none;background:rgba(0,0,0,.32);flex-direction:column;gap:8px;";
  el.innerHTML = "<div style='font-size:13px;color:#a78bfa;letter-spacing:.14em;'>TOWER ADVANCE</div><div style='font-size:26px;font-weight:900;color:#fde68a;'>"+name+"</div>";
  $("app").appendChild(el);
  el.animate(
    [{opacity:0,transform:"scale(.8)"},{opacity:1,transform:"scale(1)"},{opacity:1,transform:"scale(1)"},{opacity:0,transform:"scale(1.1)"}],
    {duration:1800,easing:"ease"}
  ).onfinish = () => el.remove();
}

// ======================================================
// GAME OVER / CLEAR
// ======================================================
function showGameover(floor){
  $("gameoverDesc").innerHTML =
    "<strong>"+floor.name+"</strong>（力："+floor.value+"）に負けた！<br>"+
    "あなたの力 "+gs.power+" では届かなかった…<br>順番を変えれば勝てるかも！";
  $("gameoverStats").innerHTML =
    "現在の力："+gs.power+"<br>倒した敵："+gs.defeatedEnemies+"体<br>行動回数："+gs.turnsTotal+"回";
  const ov = $("transOverlay");
  ov.style.transition="opacity .4s"; ov.style.opacity="1"; ov.style.pointerEvents="all";
  setTimeout(() => {
    $("gameScreen").style.display="none";
    $("gameoverScreen").style.display="flex";
    ov.style.opacity="0"; ov.style.pointerEvents="none";
  }, 420);
}

function showClear(){
  $("clearStats").innerHTML =
    "最終パワー："+gs.power+"<br>倒した敵："+gs.defeatedEnemies+"体<br>行動回数："+gs.turnsTotal+"回<br>魔王の力："+BOSS_POWER+" → あなた："+gs.power+"（差："+(gs.power-BOSS_POWER > 0 ? "+" : "")+(gs.power-BOSS_POWER)+"）";
  const ov = $("transOverlay");
  ov.style.transition="opacity .4s"; ov.style.opacity="1"; ov.style.pointerEvents="all";
  setTimeout(() => {
    $("gameScreen").style.display="none";
    $("clearScreen").style.display="flex";
    ov.style.opacity="0"; ov.style.pointerEvents="none";
  }, 420);
}

// ======================================================
// START / RESTART
// ======================================================
function startGame(){
  gs = {
    phase:"PLAY", power:10, towerIndex:0, floorsDone:[],
    calcTokens:[{label:"10",cls:"num"}], turnsTotal:0, defeatedEnemies:0
  };
  const ov = $("transOverlay");
  ov.style.transition="opacity .3s"; ov.style.opacity="1"; ov.style.pointerEvents="all";
  setTimeout(() => {
    $("titleScreen").style.display    = "none";
    $("clearScreen").style.display    = "none";
    $("gameoverScreen").style.display = "none";
    $("gameScreen").style.display     = "flex";
    updatePowerDisplay();
    buildPanorama();
    renderCalcLog();
    $("towerPanorama").scrollLeft = 0;
    ov.style.opacity="0"; ov.style.pointerEvents="none";
  }, 360);
}
function restartGame(){ startGame(); }

// ======================================================
// TITLE STARS
// ======================================================
(function buildTitleStars(){
  const c = $("titleStars");
  for(let i=0;i<60;i++){
    const s = document.createElement("div");
    s.className = "star-p";
    const sz = 1+Math.random()*2;
    s.style.cssText = "width:"+sz+"px;height:"+sz+"px;top:"+(Math.random()*100)+"%;left:"+(Math.random()*100)+"%;animation-duration:"+(2+Math.random()*4)+"s;animation-delay:"+(-Math.random()*4)+"s;";
    c.appendChild(s);
  }
})();

$("startBtn").addEventListener("click",    startGame);
$("startBtn").addEventListener("touchend", e => { e.preventDefault(); startGame(); });
</script>
