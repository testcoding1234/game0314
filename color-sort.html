<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>カラーソート</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none;}
html,body{width:100%;height:100%;background:#0a0f1e;display:flex;align-items:center;justify-content:center;overflow:hidden;}
#app{position:relative;width:375px;height:667px;overflow:hidden;background:linear-gradient(180deg,#06111e 0%,#0a1829 55%,#101f30 100%);font-family:system-ui,-apple-system,sans-serif;color:#e2e8f0;display:flex;flex-direction:column;}

/* ===== Header ===== */
#header{height:54px;display:flex;align-items:center;justify-content:space-between;padding:0 14px;background:rgba(4,10,24,0.9);border-bottom:1px solid rgba(125,211,252,0.18);flex-shrink:0;}
#header-left{display:flex;flex-direction:column;gap:2px;}
#level-label{font-size:18px;font-weight:900;color:#7dd3fc;letter-spacing:.04em;}
#move-label{font-size:11px;color:#64748b;}
#header-right{display:flex;gap:8px;}
.hdr-btn{background:rgba(30,50,80,.8);border:1px solid rgba(125,211,252,.3);color:#7dd3fc;font-size:11px;font-weight:700;padding:5px 10px;border-radius:8px;cursor:pointer;}
.hdr-btn:active{opacity:.7;}

/* ===== Game area ===== */
#game-area{flex:1;display:flex;align-items:center;justify-content:center;padding:8px 10px 0;}
#tubes-wrap{display:flex;flex-wrap:wrap;align-items:flex-end;justify-content:center;gap:10px;width:100%;}

/* ===== Tube ===== */
.tube-outer{display:flex;flex-direction:column;align-items:center;cursor:pointer;gap:4px;}
.tube-label{font-size:10px;color:#475569;height:14px;}
.tube{
  width:44px;
  border:3px solid rgba(148,163,184,.35);
  border-top:none;
  border-radius:0 0 22px 22px;
  background:rgba(15,25,45,.6);
  display:flex;
  flex-direction:column-reverse;
  align-items:stretch;
  overflow:hidden;
  transition:border-color .15s, transform .15s, box-shadow .15s;
  position:relative;
  box-shadow:0 2px 12px rgba(0,0,0,.4);
}
.tube.selected{
  border-color:#7dd3fc;
  transform:translateY(-8px);
  box-shadow:0 0 16px rgba(125,211,252,.55);
}
.tube.can-receive{
  border-color:#4ade80;
  box-shadow:0 0 10px rgba(74,222,128,.4);
}
.tube.done{
  border-color:rgba(251,191,36,.7);
  box-shadow:0 0 14px rgba(251,191,36,.45);
}
.tube.shake{
  animation:shake .35s ease;
}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}

.color-cell{
  width:100%;
  transition:height .18s ease, background-color .2s;
  border-radius:0;
}
.color-cell:last-child{border-radius:0 0 18px 18px;}

/* ===== Bottom bar ===== */
#bottom-bar{height:58px;display:flex;align-items:center;justify-content:center;gap:14px;background:rgba(4,10,24,0.85);border-top:1px solid rgba(125,211,252,0.12);flex-shrink:0;padding:0 14px;}
#hint-btn{background:linear-gradient(135deg,#f59e0b,#d97706);color:#fff;font-size:13px;font-weight:800;padding:9px 22px;border-radius:20px;border:none;cursor:pointer;box-shadow:0 3px 10px rgba(245,158,11,.35);}
#hint-btn:active{transform:scale(.96);}
#hint-count{font-size:12px;color:#f59e0b;font-weight:700;}

/* ===== Overlay screens ===== */
.overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;background:rgba(4,10,24,.82);backdrop-filter:blur(4px);z-index:50;}
.overlay h2{font-size:28px;font-weight:900;color:#7dd3fc;text-align:center;line-height:1.3;}
.overlay p{font-size:14px;color:#94a3b8;text-align:center;max-width:260px;}
.big-btn{background:linear-gradient(135deg,#3b82f6,#1d4ed8);color:#fff;font-size:16px;font-weight:800;padding:14px 40px;border-radius:24px;border:none;cursor:pointer;box-shadow:0 4px 16px rgba(59,130,246,.45);}
.big-btn:active{transform:scale(.96);}
.big-btn.green{background:linear-gradient(135deg,#22c55e,#16a34a);box-shadow:0 4px 16px rgba(34,197,94,.45);}

/* ===== Clear animation stars ===== */
#star-burst{position:absolute;inset:0;pointer-events:none;z-index:48;}
.star-particle{position:absolute;font-size:22px;animation:star-fly .8s ease-out forwards;}
@keyframes star-fly{0%{opacity:1;transform:translate(0,0) scale(1) rotate(0deg);}100%{opacity:0;transform:translate(var(--dx),var(--dy)) scale(.3) rotate(720deg);}}

/* ===== Level clear banner ===== */
#clear-overlay .big-num{font-size:64px;line-height:1;}
#clear-overlay .stars-row{font-size:28px;letter-spacing:4px;}

/* ===== Floating top color preview ===== */
#float-color{
  position:absolute;
  width:36px;height:36px;
  border-radius:50%;
  border:3px solid rgba(255,255,255,.6);
  pointer-events:none;
  z-index:60;
  display:none;
  box-shadow:0 4px 14px rgba(0,0,0,.5);
  transition:none;
}

/* ===== Undo flash ===== */
@keyframes flash-border{0%,100%{border-color:rgba(148,163,184,.35);}50%{border-color:#facc15;}}
</style>
</head>
<body>
<div id="app">

  <!-- Header -->
  <div id="header">
    <div id="header-left">
      <div id="level-label">🧪 レベル <span id="lv-num">1</span></div>
      <div id="move-label">手数: <span id="move-num">0</span></div>
    </div>
    <div id="header-right">
      <div class="hdr-btn" id="undo-btn">↩ 戻す</div>
      <div class="hdr-btn" id="restart-btn">↺ リセット</div>
    </div>
  </div>

  <!-- Tubes area -->
  <div id="game-area">
    <div id="tubes-wrap"></div>
  </div>

  <!-- Bottom bar -->
  <div id="bottom-bar">
    <button id="hint-btn">💡 ヒント</button>
    <div id="hint-count">残り <span id="hint-left">3</span> 回</div>
  </div>

  <!-- Floating dragged color dot -->
  <div id="float-color"></div>

  <!-- Star burst layer -->
  <div id="star-burst"></div>

  <!-- Start overlay -->
  <div class="overlay" id="start-overlay">
    <div style="font-size:52px">🧪</div>
    <h2>カラーソート</h2>
    <p>試験管の色を揃えよう！<br>試験管をタップして<br>色を移動させてね。</p>
    <button class="big-btn green" onclick="startGame()">▶ スタート</button>
  </div>

  <!-- Clear overlay -->
  <div class="overlay" id="clear-overlay" style="display:none;">
    <div id="clear-overlay-inner"></div>
  </div>

</div>

<script>
'use strict';

/* ============================================================
   COLORS  (明確でハッキリした色を選ぶ)
   ============================================================ */
const COLORS = [
  { id:'R', hex:'#e74c3c', name:'赤'   },
  { id:'B', hex:'#3498db', name:'青'   },
  { id:'G', hex:'#2ecc71', name:'緑'   },
  { id:'Y', hex:'#f1c40f', name:'黄'   },
  { id:'P', hex:'#9b59b6', name:'紫'   },
  { id:'O', hex:'#e67e22', name:'橙'   },
  { id:'K', hex:'#e91e63', name:'ピンク'},
  { id:'C', hex:'#00bcd4', name:'水色' },
];
const COLOR_MAP = {};
COLORS.forEach(c => { COLOR_MAP[c.id] = c.hex; });

/* ============================================================
   LEVEL CONFIG
   ============================================================ */
// Each level: { colors: number of distinct colors, extras: number of empty tubes }
// Tube capacity is always TUBE_CAP
const TUBE_CAP = 4;
// Start with 2 colors; add 1 color every 2 levels
const COLORS_BASE = 2;
const COLORS_LEVEL_STEP = 2;
// Shuffle iterations = numColors * TUBE_CAP * SHUFFLE_FACTOR (ensures thorough mixing)
const SHUFFLE_FACTOR = 8;
// Maximum undo history entries
const MAX_UNDO_HISTORY = 30;
// Star rating: ≤ threshold * minMoves → 3 stars, ≤ threshold2 → 2 stars, else 1 star
const STAR3_MULTIPLIER = 2;
const STAR2_MULTIPLIER = 4;

function getLevelConfig(lv) {
  // lv starts at 1; 2 colors at lv1, +1 color every COLORS_LEVEL_STEP levels
  const colors = Math.min(COLORS_BASE + Math.floor((lv - 1) / COLORS_LEVEL_STEP), COLORS.length);
  const extras  = lv <= 3 ? 2 : 1;
  return { numColors: colors, extras };
}

/* ============================================================
   GAME STATE
   ============================================================ */
let gs = {
  level:    1,
  tubes:    [],   // array of arrays (bottom=index 0)
  selected: -1,   // index of selected tube (-1 = none)
  moves:    0,
  hints:    3,
  history:  [],   // for undo, each entry is snapshot of tubes
  initialTubes: [], // for restart
};

/* ============================================================
   LEVEL GENERATION
   ============================================================ */
function generateLevel(lv) {
  const { numColors, extras } = getLevelConfig(lv);
  const colorIds = COLORS.slice(0, numColors).map(c => c.id);

  // Build solved state: TUBE_CAP units of each color
  const solved = colorIds.map(c => Array(TUBE_CAP).fill(c));

  // Shuffle by doing many random valid reverse-moves
  const tubes = solved.map(t => [...t]);
  const allTubes = [...tubes, ...Array.from({length: extras}, () => [])];

  // Do many random shuffles (SHUFFLE_FACTOR iterations per color*cell unit)
  const SHUFFLE_MOVES = numColors * TUBE_CAP * SHUFFLE_FACTOR;
  for (let iter = 0; iter < SHUFFLE_MOVES; iter++) {
    // pick random non-empty tube as src
    const srcs = allTubes.map((t,i) => t.length > 0 ? i : -1).filter(i => i >= 0);
    if (!srcs.length) break;
    const si = srcs[Math.floor(Math.random() * srcs.length)];
    // pick random destination (not same, not full)
    const dsts = allTubes.map((t,i) => (i !== si && t.length < TUBE_CAP) ? i : -1).filter(i => i >= 0);
    if (!dsts.length) continue;
    const di = dsts[Math.floor(Math.random() * dsts.length)];
    allTubes[di].push(allTubes[si].pop());
  }

  // Avoid accidentally-solved state right after generation
  // (unlikely but just do a quick check)
  return allTubes;
}

/* ============================================================
   CHECK WIN
   ============================================================ */
function isTubeDone(tube) {
  if (tube.length === 0) return true;
  if (tube.length !== TUBE_CAP) return false;
  return tube.every(c => c === tube[0]);
}

function isWon() {
  return gs.tubes.every(isTubeDone);
}

/* ============================================================
   MOVE
   ============================================================ */
function canMoveTo(fromIdx, toIdx) {
  const from = gs.tubes[fromIdx];
  const to   = gs.tubes[toIdx];
  if (!from.length)       return false; // src empty
  if (to.length >= TUBE_CAP) return false; // dest full
  if (to.length === 0)    return true;  // dest empty
  return to[to.length - 1] === from[from.length - 1]; // top colors match
}

function doMove(fromIdx, toIdx) {
  if (!canMoveTo(fromIdx, toIdx)) return false;
  // Save history
  gs.history.push(gs.tubes.map(t => [...t]));
  if (gs.history.length > MAX_UNDO_HISTORY) gs.history.shift();

  const color = gs.tubes[fromIdx].pop();
  gs.tubes[toIdx].push(color);
  gs.moves++;
  return true;
}

function undoMove() {
  if (!gs.history.length) return;
  gs.tubes = gs.history.pop();
  gs.moves = Math.max(0, gs.moves - 1);
  gs.selected = -1;
  renderTubes();
  updateHeader();
}

/* ============================================================
   RENDER
   ============================================================ */
function tubeHeight(n) {
  // Total visual height for n of TUBE_CAP cells
  return n * cellHeight() + 4;
}
function cellHeight() { return 34; }
function tubeVisualHeight() { return TUBE_CAP * cellHeight() + 4; }

function renderTubes() {
  const wrap = document.getElementById('tubes-wrap');
  wrap.innerHTML = '';

  const n = gs.tubes.length;
  // Layout: if many tubes, split into 2 rows
  const perRow = n <= 5 ? n : Math.ceil(n / 2);

  for (let i = 0; i < n; i++) {
    const tube = gs.tubes[i];
    const outer = document.createElement('div');
    outer.className = 'tube-outer';
    outer.dataset.idx = i;

    const tubeEl = document.createElement('div');
    tubeEl.className = 'tube';
    tubeEl.dataset.idx = i;
    tubeEl.style.height = tubeVisualHeight() + 'px';

    if (i === gs.selected) tubeEl.classList.add('selected');
    if (gs.selected >= 0 && i !== gs.selected && canMoveTo(gs.selected, i)) tubeEl.classList.add('can-receive');
    if (isTubeDone(tube) && tube.length > 0) tubeEl.classList.add('done');

    // cells (bottom to top order — flex-direction:column-reverse renders top at visual-top)
    for (let j = 0; j < tube.length; j++) {
      const cell = document.createElement('div');
      cell.className = 'color-cell';
      cell.style.height = cellHeight() + 'px';
      cell.style.backgroundColor = COLOR_MAP[tube[j]];
      tubeEl.appendChild(cell);
    }

    outer.appendChild(tubeEl);
    outer.addEventListener('click', () => onTubeTap(i));
    wrap.appendChild(outer);
  }
}

function updateHeader() {
  document.getElementById('lv-num').textContent   = gs.level;
  document.getElementById('move-num').textContent = gs.moves;
  document.getElementById('hint-left').textContent = gs.hints;
}

/* ============================================================
   TAP HANDLER
   ============================================================ */
function onTubeTap(idx) {
  if (gs.selected === -1) {
    // select if non-empty
    if (!gs.tubes[idx].length) return;
    gs.selected = idx;
    renderTubes();
    return;
  }

  if (gs.selected === idx) {
    // deselect
    gs.selected = -1;
    renderTubes();
    return;
  }

  // Try to move
  if (canMoveTo(gs.selected, idx)) {
    const moved = doMove(gs.selected, idx);
    if (moved) {
      gs.selected = -1;
      renderTubes();
      updateHeader();
      if (isWon()) {
        setTimeout(showClear, 300);
      }
    }
  } else {
    // shake the target if can't receive
    const tubeEl = document.querySelector(`.tube[data-idx="${idx}"]`);
    if (tubeEl) {
      tubeEl.classList.add('shake');
      setTimeout(() => tubeEl.classList.remove('shake'), 400);
    }
    // re-select the tapped tube if it has content
    if (gs.tubes[idx].length > 0) {
      gs.selected = idx;
      renderTubes();
    } else {
      gs.selected = -1;
      renderTubes();
    }
  }
}

/* ============================================================
   HINT
   ============================================================ */
function giveHint() {
  if (gs.hints <= 0) return;
  // Find a valid move
  for (let i = 0; i < gs.tubes.length; i++) {
    for (let j = 0; j < gs.tubes.length; j++) {
      if (i !== j && canMoveTo(i, j)) {
        gs.hints--;
        gs.selected = i;
        renderTubes();
        updateHeader();
        // Flash the destination
        const destEl = document.querySelector(`.tube[data-idx="${j}"]`);
        if (destEl) {
          destEl.style.animation = 'flash-border .6s ease 2';
          setTimeout(() => { destEl.style.animation = ''; }, 1300);
        }
        return;
      }
    }
  }
}

/* ============================================================
   CLEAR
   ============================================================ */
function showClear() {
  spawnStars();
  const overlay = document.getElementById('clear-overlay');
  const inner   = document.getElementById('clear-overlay-inner');
  const minMoves = getLevelConfig(gs.level).numColors * TUBE_CAP;
  const stars = gs.moves <= minMoves * STAR3_MULTIPLIER ? '⭐⭐⭐' :
                gs.moves <= minMoves * STAR2_MULTIPLIER ? '⭐⭐' : '⭐';
  inner.innerHTML = `
    <div style="font-size:52px;text-align:center">🎉</div>
    <div style="font-size:26px;font-weight:900;color:#7dd3fc;text-align:center;margin:8px 0">レベル ${gs.level} クリア！</div>
    <div style="font-size:28px;text-align:center;margin-bottom:4px">${stars}</div>
    <div style="font-size:13px;color:#94a3b8;text-align:center;margin-bottom:18px">手数: ${gs.moves}</div>
    <div style="display:flex;gap:12px;justify-content:center">
      <button class="big-btn" onclick="restartLevel()">↺ もう一度</button>
      <button class="big-btn green" onclick="nextLevel()">次へ ▶</button>
    </div>
  `;
  overlay.style.display = 'flex';
}

function spawnStars() {
  const burst = document.getElementById('star-burst');
  burst.innerHTML = '';
  const cx = 187, cy = 333;
  const icons = ['⭐','✨','🌟','💛','💙','❤️','💚','💜'];
  for (let i = 0; i < 20; i++) {
    const s = document.createElement('div');
    s.className = 'star-particle';
    const angle = Math.random() * Math.PI * 2;
    const dist  = 80 + Math.random() * 160;
    s.style.setProperty('--dx', Math.cos(angle)*dist + 'px');
    s.style.setProperty('--dy', Math.sin(angle)*dist + 'px');
    s.style.left = cx + 'px';
    s.style.top  = cy + 'px';
    s.style.animationDelay = (Math.random() * .3) + 's';
    s.textContent = icons[Math.floor(Math.random() * icons.length)];
    burst.appendChild(s);
    setTimeout(() => s.remove(), 1200);
  }
}

/* ============================================================
   LEVEL CONTROL
   ============================================================ */
function startLevel(lv) {
  gs.level    = lv;
  gs.moves    = 0;
  gs.selected = -1;
  gs.history  = [];
  gs.tubes    = generateLevel(lv);
  gs.initialTubes = gs.tubes.map(t => [...t]);
  document.getElementById('clear-overlay').style.display = 'none';
  renderTubes();
  updateHeader();
}

function restartLevel() {
  gs.tubes    = gs.initialTubes.map(t => [...t]);
  gs.moves    = 0;
  gs.selected = -1;
  gs.history  = [];
  document.getElementById('clear-overlay').style.display = 'none';
  renderTubes();
  updateHeader();
}

function nextLevel() {
  startLevel(gs.level + 1);
}

function startGame() {
  document.getElementById('start-overlay').style.display = 'none';
  startLevel(1);
}

/* ============================================================
   BUTTON WIRING
   ============================================================ */
document.getElementById('undo-btn').addEventListener('click', undoMove);
document.getElementById('restart-btn').addEventListener('click', restartLevel);
document.getElementById('hint-btn').addEventListener('click', giveHint);

// Back to home (long press on header title area — optional)
// or just via header back button handled elsewhere
</script>
</body>
</html>
