<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Magic Potion bottle -->
  <!-- Cork/stopper -->
  <rect x="27" y="6" width="10" height="8" rx="2" fill="#8d6e63"/>
  <rect x="25" y="12" width="14" height="3" rx="1" fill="#6d4c41"/>
  <!-- Bottle neck -->
  <rect x="26" y="15" width="12" height="10" rx="3" fill="#29b6f6"/>
  <rect x="27" y="15" width="10" height="10" rx="2" fill="#4fc3f7"/>
  <!-- Bottle body -->
  <path d="M22,25 Q16,30 16,40 Q16,56 32,56 Q48,56 48,40 Q48,30 42,25 Z" fill="#29b6f6"/>
  <!-- Liquid color/fill -->
  <path d="M22,32 Q16,36 16,44 Q16,56 32,56 Q48,56 48,44 Q48,36 42,32 Z" fill="#e91e63"/>
  <!-- Bottle glass overlay -->
  <path d="M22,25 Q16,30 16,40 Q16,56 32,56 Q48,56 48,40 Q48,30 42,25 Z"
        fill="none" stroke="#0288d1" stroke-width="2"/>
  <!-- Shine on bottle -->
  <path d="M24,30 Q22,36 22,42" stroke="#fff" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.5"/>
  <ellipse cx="26" cy="28" rx="3" ry="2" fill="#fff" opacity="0.4"/>
  <!-- Bubbles in liquid -->
  <circle cx="30" cy="46" r="2.5" fill="#f06292" opacity="0.7"/>
  <circle cx="37" cy="40" r="1.8" fill="#f8bbd0" opacity="0.7"/>
  <circle cx="33" cy="50" r="1.5" fill="#f8bbd0" opacity="0.7"/>
  <!-- Sparkle -->
  <text x="38" y="22" font-size="10" fill="#ffd700">✦</text>
</svg>
