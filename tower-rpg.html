<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>勇者の塔</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none;}
html,body{width:100%;height:100%;background:#0a0010;display:flex;align-items:center;justify-content:center;overflow:hidden;touch-action:none;}
#app{position:relative;width:375px;height:667px;overflow:hidden;font-family:system-ui,-apple-system,sans-serif;color:#e2e8f0;}

/* ====== TITLE SCREEN ====== */
#titleScreen{position:absolute;inset:0;background:linear-gradient(180deg,#0a0020 0%,#1a0040 40%,#0a0020 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;gap:0;}
.title-bg-stars{position:absolute;inset:0;pointer-events:none;overflow:hidden;}
.star-p{position:absolute;border-radius:50%;background:#fff;animation:twinkle linear infinite;}
@keyframes twinkle{0%,100%{opacity:.2}50%{opacity:1}}
.title-logo{font-size:64px;margin-bottom:8px;animation:floatY 2.5s ease-in-out infinite;}
@keyframes floatY{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
.title-main{font-size:38px;font-weight:900;background:linear-gradient(135deg,#fde68a,#f59e0b,#fde68a);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:.08em;filter:drop-shadow(0 0 20px rgba(245,158,11,.6));}
.title-sub{font-size:13px;color:#a78bfa;letter-spacing:.12em;margin-top:4px;margin-bottom:24px;}
.title-hero{font-size:80px;margin:6px 0;animation:titleHeroFloat 1.4s ease-in-out infinite alternate;}
@keyframes titleHeroFloat{from{transform:translateY(0)}to{transform:translateY(-10px)}}
.title-desc{font-size:12px;color:#94a3b8;text-align:center;line-height:1.8;margin-bottom:28px;padding:0 24px;}
.title-start-btn{background:linear-gradient(135deg,#7c3aed,#9333ea,#c026d3);color:#fff;font-size:20px;font-weight:900;padding:16px 48px;border-radius:50px;border:none;cursor:pointer;box-shadow:0 0 30px rgba(147,51,234,.7),0 4px 16px rgba(0,0,0,.5);letter-spacing:.1em;animation:pulseShadow 1.5s ease-in-out infinite;}
@keyframes pulseShadow{0%,100%{box-shadow:0 0 20px rgba(147,51,234,.5),0 4px 16px rgba(0,0,0,.5)}50%{box-shadow:0 0 40px rgba(147,51,234,.9),0 4px 20px rgba(0,0,0,.6)}}
.title-start-btn:active{transform:scale(.95);}
.back-link{position:absolute;top:14px;left:14px;font-size:12px;color:#6b7280;cursor:pointer;padding:6px 10px;border-radius:8px;border:1px solid rgba(107,114,128,.3);}
.back-link:active{background:rgba(255,255,255,.05);}

/* ====== GAME SCREEN ====== */
#gameScreen{position:absolute;inset:0;background:linear-gradient(180deg,#05001a 0%,#0d0030 50%,#080015 100%);display:none;flex-direction:column;}
#gameHeader{height:50px;flex-shrink:0;display:flex;align-items:center;justify-content:space-between;padding:0 12px;background:rgba(0,0,18,.88);border-bottom:1px solid rgba(139,92,246,.3);}
#powerDisplay{display:flex;align-items:center;gap:6px;background:rgba(245,158,11,.12);border:1.5px solid rgba(245,158,11,.5);border-radius:20px;padding:4px 12px;}
#powerIcon{font-size:17px;}
#powerValue{font-size:21px;font-weight:900;color:#fbbf24;min-width:52px;text-align:right;}
.power-up{animation:powerBump .4s ease;}
@keyframes powerBump{0%,100%{transform:scale(1);color:#fbbf24}40%{transform:scale(1.5);color:#fde68a}}
#progressLabel{font-size:11px;color:#a78bfa;font-weight:700;letter-spacing:.04em;}

/* ====== TOWER ROW (game area) ====== */
#gameArea{
  flex:1;
  display:flex;
  flex-direction:row;
  align-items:flex-end;
  justify-content:center;
  gap:8px;
  padding:8px 8px 0 8px;
  position:relative;
  overflow:hidden;
  background:
    radial-gradient(ellipse at 50% 0%,rgba(80,0,160,.15) 0%,transparent 70%),
    linear-gradient(180deg,#06001e 0%,#0c0028 40%,#100030 75%,#090018 100%);
}

/* ground line */
#gameArea::after{
  content:"";
  position:absolute;
  bottom:0;left:0;right:0;
  height:3px;
  background:linear-gradient(90deg,transparent 2%,rgba(139,92,246,.6) 10%,rgba(139,92,246,.6) 90%,transparent 98%);
  pointer-events:none;
}

/* ====== TOWER COLUMN ====== */
.t-col{
  display:flex;
  flex-direction:column;
  align-items:center;
  width:80px;
  flex-shrink:0;
}
.t-label{
  font-size:7.5px;
  font-weight:800;
  color:#6d28d9;
  text-align:center;
  letter-spacing:.04em;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
  max-width:80px;
  height:16px;
  line-height:16px;
  margin-bottom:3px;
}
.t-col.t-active .t-label{color:#a78bfa;}
.t-col.t-locked  .t-label{color:#374151;}

/* stack holds the blocks */
.t-stack{
  display:flex;
  flex-direction:column;
  gap:3px;
  width:78px;
}

/* base / ground element */
.t-base{
  width:78px;
  height:10px;
  background:linear-gradient(90deg,rgba(139,92,246,.3),rgba(167,139,250,.5),rgba(139,92,246,.3));
  border-radius:0 0 4px 4px;
  box-shadow:0 3px 8px rgba(0,0,0,.5);
  flex-shrink:0;
}
.t-col.t-locked .t-base{background:linear-gradient(90deg,rgba(55,65,81,.3),rgba(75,85,99,.4),rgba(55,65,81,.3));}

/* active tower indicator */
.t-active-indicator{
  font-size:9px;
  color:#a78bfa;
  font-weight:900;
  text-align:center;
  height:14px;
  line-height:14px;
  animation:indicatorPulse 1s ease-in-out infinite alternate;
  margin-top:1px;
}
@keyframes indicatorPulse{from{opacity:.5}to{opacity:1}}

/* ====== BLOCK ====== */
.b{
  width:78px;
  height:52px;
  flex-shrink:0;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:1px;
  border-radius:5px 5px 3px 3px;
  cursor:pointer;
  position:relative;
  overflow:hidden;
  border:2px solid;
  /* 3-D raised look */
  box-shadow:0 4px 0 rgba(0,0,0,.55),0 5px 8px rgba(0,0,0,.35);
  transition:box-shadow .1s;
  max-height:56px; /* used by the collapse transition */
}
.b:active:not(.b-done):not(.b-locked):not(.b-removing){
  transform:translateY(3px);
  box-shadow:0 1px 0 rgba(0,0,0,.55);
}
/* top sheen line */
.b::before{
  content:"";
  position:absolute;
  top:0;left:0;right:0;
  height:2px;
  background:rgba(255,255,255,.14);
  border-radius:3px 3px 0 0;
}

/* enemy block */
.b.b-enemy{
  background:linear-gradient(160deg,#3d0a14 0%,#1e0509 100%);
  border-color:rgba(239,68,68,.55);
}
/* item block */
.b.b-item{
  background:linear-gradient(160deg,#07163a 0%,#040e28 100%);
  border-color:rgba(96,165,250,.55);
}
/* boss block */
.b.b-boss{
  background:linear-gradient(160deg,#5a0000 0%,#320000 100%);
  border-color:rgba(239,68,68,.95);
  box-shadow:0 4px 0 rgba(0,0,0,.6),0 0 22px rgba(239,68,68,.45),0 5px 10px rgba(0,0,0,.4);
  height:58px;
  max-height:62px;
}
.b.b-boss::after{
  content:"👑";
  position:absolute;
  top:2px;right:4px;
  font-size:9px;
  line-height:1;
}

/* locked (future tower) */
.b.b-locked{
  cursor:default;
  filter:grayscale(.7) brightness(.5);
  opacity:.45;
  pointer-events:none;
}
/* done (removed) */
.b.b-done{
  display:none;
}
/* block internals */
.b-emoji{font-size:22px;line-height:1;pointer-events:none;}
.b.b-boss .b-emoji{font-size:26px;}
.b-name{font-size:7px;color:#94a3b8;line-height:1;pointer-events:none;max-width:72px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-align:center;}
.b-val{font-size:12px;font-weight:900;color:#fbbf24;line-height:1;pointer-events:none;}
.b.b-item .b-val{color:#60a5fa;}
.b.b-boss .b-val{color:#f87171;font-size:11px;}

/* ====== ROCK CRUSH ANIMATION ====== */
/* Clone that shatters in place like a hard stone */
.b-clone{
  position:absolute;
  z-index:80;
  pointer-events:none;
  border-radius:5px 5px 3px 3px;
  border:2px solid;
  overflow:hidden;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:1px;
}
@keyframes rockShatter{
  0%  {transform:scale(1) rotate(0deg);opacity:1;filter:brightness(1);}
  18% {transform:scale(1.08) rotate(3deg);opacity:1;filter:brightness(3) saturate(0);}
  40% {transform:scale(.78) rotate(-6deg);opacity:.85;filter:brightness(1.4);}
  70% {transform:scale(.4) rotate(9deg);opacity:.45;}
  100%{transform:scale(0) rotate(14deg);opacity:0;}
}
.b-clone.shatter{animation:rockShatter .4s ease-in forwards;}

/* rock particle chips */
.rock-particle{
  position:absolute;
  z-index:90;
  pointer-events:none;
  border-radius:2px;
  animation:particleFly .5s ease-out forwards;
}
@keyframes particleFly{
  0%  {opacity:1;transform:translate(0,0) scale(1);}
  100%{opacity:0;transform:translate(var(--pdx),var(--pdy)) scale(0);}
}

/* hero character */
#hero{
  position:absolute;
  bottom:14px;
  font-size:28px;
  z-index:50;
  pointer-events:none;
  width:40px;
  text-align:center;
  margin-left:-20px;
  filter:drop-shadow(0 0 8px rgba(139,92,246,.9));
  transition:left .45s cubic-bezier(.22,.68,0,1.2);
}
@keyframes heroAttack{
  0%  {transform:scale(1) rotate(0deg);}
  25% {transform:scale(1.5) rotate(-20deg) translateX(10px);}
  55% {transform:scale(1.25) rotate(12deg) translateX(-4px);}
  100%{transform:scale(1) rotate(0deg);}
}
.hero-attacking{animation:heroAttack .38s ease-out;}
@keyframes heroStep{
  0%,100%{transform:translateY(0);}
  50%     {transform:translateY(-5px);}
}
.hero-stepping{animation:heroStep .22s steps(1) 4;}

/* height collapse — applied after clone is detached */
.b-collapsing{
  max-height:0 !important;
  overflow:hidden !important;
  padding-top:0 !important;
  padding-bottom:0 !important;
  border-top-width:0 !important;
  border-bottom-width:0 !important;
  box-shadow:none !important;
  gap:0 !important;
  transition:max-height .22s ease-out, padding .22s, border-width .22s, gap .22s !important;
}

/* settle/drop animation for blocks ABOVE the knocked-out one */
@keyframes darumaSettle{
  0%  {transform:translateY(0);}
  20% {transform:translateY(9px);}
  55% {transform:translateY(-3px);}
  80% {transform:translateY(1px);}
  100%{transform:translateY(0);}
}
.b-settling{animation:darumaSettle .3s ease-out forwards;}

/* item absorption animation */
@keyframes itemAbsorb{
  0%  {transform:scale(1);box-shadow:0 4px 0 rgba(0,0,0,.55);}
  30% {transform:scale(1.18);box-shadow:0 0 26px 10px rgba(96,165,250,.8);}
  60% {transform:scale(.55);opacity:.7;}
  100%{transform:scale(.04);opacity:0;}
}
.b-absorbing{animation:itemAbsorb .45s ease-in-out forwards;pointer-events:none;}

/* enemy fail shake */
@keyframes failShake{
  0%,100%{transform:translateX(0);}
  12%{transform:translateX(-8px);}
  25%{transform:translateX(8px);}
  37%{transform:translateX(-6px);box-shadow:0 0 20px rgba(239,68,68,.9);}
  50%{transform:translateX(6px);}
  62%{transform:translateX(-4px);}
  75%{transform:translateX(4px);}
  88%{transform:translateX(-2px);}
}
.b-failing{animation:failShake .52s ease-in-out forwards;pointer-events:none;}

/* clash effect */
.clash-effect{position:absolute;pointer-events:none;z-index:200;font-size:30px;animation:clashPop .5s ease-out forwards;}
@keyframes clashPop{
  0%  {transform:scale(0) rotate(-30deg);opacity:1;}
  40% {transform:scale(1.5) rotate(15deg);opacity:1;}
  70% {transform:scale(1) rotate(0deg);opacity:.8;}
  100%{transform:scale(.1) rotate(8deg);opacity:0;}
}
/* floating text */
.float-text{position:absolute;pointer-events:none;z-index:250;font-size:22px;font-weight:900;text-shadow:2px 2px 0 rgba(0,0,0,.8);animation:floatUp .9s ease-out forwards;}
@keyframes floatUp{0%{opacity:1;transform:translateY(0) scale(1)}55%{opacity:1;transform:translateY(-44px) scale(1.2)}100%{opacity:0;transform:translateY(-80px) scale(.5)}}

/* ====== CALC LOG ====== */
#calcLog{height:36px;flex-shrink:0;background:rgba(0,0,18,.82);border-top:1px solid rgba(139,92,246,.2);display:flex;align-items:center;padding:0 12px;overflow-x:auto;scrollbar-width:none;gap:4px;white-space:nowrap;}
#calcLog::-webkit-scrollbar{display:none;}
.calc-token{font-size:11px;font-weight:700;border-radius:6px;padding:2px 7px;}
.calc-token.op{color:#a78bfa;background:rgba(139,92,246,.15);}
.calc-token.num{color:#fbbf24;background:rgba(245,158,11,.12);}
.calc-token.result{color:#4ade80;background:rgba(74,222,128,.12);}
.calc-token.lose{color:#f87171;background:rgba(239,68,68,.12);}

/* ====== INSTRUCTION ====== */
#instruction{height:30px;flex-shrink:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,18,.62);}
#instruction p{font-size:10px;color:#6b7280;letter-spacing:.03em;}

/* ====== STAGE FLASH ====== */
.stage-badge{font-size:11px;font-weight:800;color:#fde68a;background:rgba(245,158,11,.18);border:1.5px solid rgba(245,158,11,.4);border-radius:12px;padding:2px 9px;letter-spacing:.06em;}

/* ====== RESULT SCREENS ====== */
#clearScreen,#gameoverScreen{position:absolute;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;z-index:200;gap:14px;}
#clearScreen{background:linear-gradient(180deg,#0f3020 0%,#1a4030 50%,#0f3020 100%);}
#gameoverScreen{background:linear-gradient(180deg,#300a0a 0%,#500d0d 50%,#300a0a 100%);}
.result-emoji{font-size:80px;animation:resultPop .6s cubic-bezier(.175,.885,.32,1.275) both;}
@keyframes resultPop{from{transform:scale(0) rotate(-20deg)}to{transform:scale(1) rotate(0deg)}}
.result-title{font-size:36px;font-weight:900;letter-spacing:.1em;}
.result-title.win{background:linear-gradient(135deg,#fde68a,#f59e0b);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.result-title.lose{color:#f87171;}
.result-desc{font-size:14px;color:#94a3b8;text-align:center;padding:0 24px;line-height:1.7;}
.result-stats{background:rgba(0,0,0,.3);border-radius:14px;padding:14px 24px;font-size:13px;color:#c4b5fd;text-align:center;line-height:2;}
.result-btn{background:linear-gradient(135deg,#7c3aed,#9333ea);color:#fff;font-size:16px;font-weight:900;padding:14px 40px;border-radius:40px;border:none;cursor:pointer;box-shadow:0 4px 20px rgba(147,51,234,.5);}
.result-btn:active{transform:scale(.95);}
.result-btn.retry{background:linear-gradient(135deg,#dc2626,#b91c1c);}
.result-home{font-size:12px;color:#6b7280;cursor:pointer;padding:6px;border-bottom:1px solid rgba(107,114,128,.3);}
#transOverlay{position:absolute;inset:0;background:#000;z-index:150;pointer-events:none;opacity:0;transition:opacity .3s;}
</style>
</head>
<body>
<div id="app">

  <!-- ===== TITLE SCREEN ===== -->
  <div id="titleScreen">
    <div class="title-bg-stars" id="titleStars"></div>
    <div class="back-link" onclick="location.href='index.html'">← ホーム</div>
    <div class="title-logo">🏰</div>
    <div class="title-main">勇者の塔</div>
    <div class="title-sub">HERO'S TOWER</div>
    <div class="title-hero">⚔️</div>
    <div class="title-desc">敵やアイテムを選んで石を砕け！<br>塔を攻略して魔王を倒せ！</div>
    <button class="title-start-btn" id="startBtn">ゲームスタート</button>
  </div>

  <!-- ===== GAME SCREEN ===== -->
  <div id="gameScreen">
    <div id="gameHeader">
      <div id="powerDisplay">
        <span id="powerIcon">⚔️</span>
        <span id="powerValue">10</span>
      </div>
      <span class="stage-badge" id="stageLabel">STAGE 1</span>
      <div id="progressLabel">0 / 0 撃破</div>
    </div>

    <!-- All 4 towers visible side-by-side, anchored to bottom -->
    <div id="gameArea">
      <!-- towers built by JS -->
      <div id="hero">🧙</div>
    </div>

    <div id="calcLog"><span class="calc-token num">10</span></div>
    <div id="instruction"><p>ブロックをタップして石を砕け！　アイテムで強化して敵を倒せ</p></div>
  </div>

  <!-- ===== CLEAR SCREEN ===== -->
  <div id="clearScreen">
    <div class="result-emoji">🏆</div>
    <div class="result-title win" id="clearTitle">VICTORY!</div>
    <div class="result-desc" id="clearDesc">魔王を倒した！<br>勇者の伝説が始まる…</div>
    <div class="result-stats" id="clearStats"></div>
    <button class="result-btn" id="clearNextBtn" onclick="restartGame()">もう一度挑戦</button>
    <div class="result-home" onclick="location.href='index.html'">← ホームへ戻る</div>
  </div>

  <!-- ===== GAMEOVER SCREEN ===== -->
  <div id="gameoverScreen">
    <div class="result-emoji">💀</div>
    <div class="result-title lose">GAME OVER</div>
    <div class="result-desc" id="gameoverDesc">選ぶ順番が鍵だ…<br>もう一度戦略を考えよう！</div>
    <div class="result-stats" id="gameoverStats"></div>
    <button class="result-btn retry" onclick="restartGame()">リベンジ！</button>
    <div class="result-home" onclick="location.href='index.html'">← ホームへ戻る</div>
  </div>

  <div id="transOverlay"></div>
</div>

<script>
// ======================================================
// GAME DATA — towers are generated per stage
// ======================================================
const BOSS_POWER_BASE = 3000;
const MAX_STAGES = 5;

const STAGE_TOWER_META = [
  ["入口の塔","🌲","森の砦","🏚️","暗黒の塔","🏰","魔王城","👑"],
  ["業火の塔","🔥","毒霧の砦","🌫️","虚空の城","🌑","大魔神城","💀"],
  ["奈落の塔","🕳️","混沌の砦","⚡","冥界の城","👁️","魔神皇城","☠️"],
  ["深淵の塔","🌊","業魔の砦","🌪️","天獄の城","🌌","神魔皇城","🔱"],
  ["虚無の塔","⚫","絶望の砦","💧","終焉の城","🌀","究極魔王城","💠"],
];

function makeTowers(stage) {
  const em = Math.pow(3, stage - 1);
  const m  = STAGE_TOWER_META[Math.min(stage - 1, STAGE_TOWER_META.length - 1)];
  return [
    {
      id:0, name:m[0], emoji:m[1],
      floors:[
        { id:0, type:"enemy", emoji:"🦁", name:"ライオン",     value:Math.floor(25*em) },
        { id:1, type:"item",  emoji:"🍄", name:"魔法のキノコ", op:"×", value:3 },
        { id:2, type:"enemy", emoji:"🐺", name:"ウルフ",       value:Math.floor(8*em) },
      ]
    },
    {
      id:1, name:m[2], emoji:m[3],
      floors:[
        { id:0, type:"enemy", emoji:"🐉", name:"小ドラゴン",   value:Math.floor(180*em) },
        { id:1, type:"item",  emoji:"🌟", name:"魔法の粉",     op:"×", value:Math.min(2+stage,6) },
        { id:2, type:"enemy", emoji:"👺", name:"ゴブリンB",    value:Math.floor(70*em) },
        { id:3, type:"item",  emoji:"🧪", name:"回復薬",       op:"+", value:Math.floor(100*em) },
        { id:4, type:"enemy", emoji:"👺", name:"ゴブリンA",    value:Math.floor(50*em) },
      ]
    },
    {
      id:2, name:m[4], emoji:m[5],
      floors:[
        { id:0, type:"enemy", emoji:"🌑", name:"暗黒竜",       value:Math.floor(1200*em) },
        { id:1, type:"item",  emoji:"💀", name:"呪いの偶像",   op:"÷", value:3 },
        { id:2, type:"enemy", emoji:"👿", name:"堕天使",       value:Math.floor(800*em) },
        { id:3, type:"item",  emoji:"💊", name:"上級回復薬",   op:"+", value:Math.floor(300*em) },
        { id:4, type:"enemy", emoji:"🧙", name:"大魔道士",     value:Math.floor(500*em) },
        { id:5, type:"item",  emoji:"💎", name:"魔法の結晶",   op:"×", value:Math.min(2+stage,6) },
        { id:6, type:"enemy", emoji:"🗡️",  name:"闇の騎士",    value:Math.floor(250*em) },
      ]
    },
    {
      id:3, name:m[6], emoji:m[7],
      floors:[
        { id:0, type:"enemy", emoji:"😈", name:"魔王",         value:Math.floor(BOSS_POWER_BASE*em), isBoss:true },
        { id:1, type:"item",  emoji:"🌟", name:"英雄の魂",     op:"×", value:Math.min(2+stage,6) },
        { id:2, type:"enemy", emoji:"🐲", name:"炎竜",         value:Math.floor(2000*em) },
        { id:3, type:"item",  emoji:"💎", name:"神秘の結晶",   op:"×", value:Math.min(2+stage,6) },
        { id:4, type:"enemy", emoji:"🦊", name:"九尾の狐",     value:Math.floor(1200*em) },
        { id:5, type:"item",  emoji:"🔮", name:"賢者の石",     op:"+", value:Math.floor(500*em) },
        { id:6, type:"enemy", emoji:"👹", name:"魔王の番人B",  value:Math.floor(600*em) },
        { id:7, type:"item",  emoji:"⚡", name:"聖剣の力",     op:"×", value:Math.min(3+stage,7) },
        { id:8, type:"enemy", emoji:"👹", name:"魔王の番人A",  value:Math.floor(400*em) },
      ]
    }
  ];
}

let TOWERS = makeTowers(1);
let TOTAL_ENEMIES = TOWERS.reduce((s,t) => s + t.floors.filter(f => f.type==="enemy").length, 0);

// ======================================================
// GAME STATE
// ======================================================
let gs = {
  phase:"TITLE",
  stage:1,
  power:10,
  towerIndex:0,
  floorsDone:[],   // "ti-fi" strings
  calcTokens:[],
  turnsTotal:0,
  defeatedEnemies:0,
  totalDefeated:0,
};

function $(id){ return document.getElementById(id); }

// ======================================================
// APPLY POWER
// ======================================================
function applyPower(floor){
  if(floor.type==="enemy"){
    if(gs.power > floor.value){
      gs.power = Math.floor(gs.power + floor.value);
      gs.defeatedEnemies++;
      return { ok:true, delta:"+"+floor.value };
    }
    return { ok:false };
  }
  if(floor.op==="×")      gs.power = Math.floor(gs.power * floor.value);
  else if(floor.op==="+") gs.power = Math.floor(gs.power + floor.value);
  else if(floor.op==="÷") gs.power = Math.floor(gs.power / floor.value);
  return { ok:true, delta:floor.op+floor.value };
}

// ======================================================
// BUILD ALL TOWERS
// ======================================================
function buildAllTowers(){
  const area = $("gameArea");
  area.innerHTML = "";

  TOWERS.forEach((tower, ti) => {
    const isActive = (ti === gs.towerIndex);
    const isLocked = (ti > gs.towerIndex);

    const col = document.createElement("div");
    col.className = "t-col " + (isActive ? "t-active" : isLocked ? "t-locked" : "t-done");
    col.id = "tcol-" + ti;

    // Tower label
    const lbl = document.createElement("div");
    lbl.className = "t-label";
    lbl.textContent = tower.emoji + " " + tower.name;
    col.appendChild(lbl);

    // Block stack
    const stack = document.createElement("div");
    stack.className = "t-stack";
    stack.id = "tstack-" + ti;

    tower.floors.forEach(floor => {
      const key  = ti + "-" + floor.id;
      const done = gs.floorsDone.includes(key);
      const b = document.createElement("div");
      b.id        = "b-" + ti + "-" + floor.id;
      b.className = [
        "b",
        floor.type === "enemy" ? "b-enemy" : "b-item",
        floor.isBoss ? "b-boss" : "",
        done       ? "b-done"   : "",
        isLocked   ? "b-locked" : "",
      ].filter(Boolean).join(" ");

      b.innerHTML =
        "<span class='b-emoji'>" + floor.emoji + "</span>" +
        "<span class='b-name'>"  + floor.name  + "</span>" +
        "<span class='b-val'>"   + (floor.type === "enemy" ? "⚔️" + floor.value : floor.op + floor.value) + "</span>";

      if(!done && !isLocked){
        const f  = floor;
        const t  = ti;
        b.addEventListener("click",    ()    => onBlockTap(t, f.id, b, f));
        b.addEventListener("touchend", (ev)  => { ev.preventDefault(); onBlockTap(t, f.id, b, f); });
      }
      stack.appendChild(b);
    });

    col.appendChild(stack);

    // Base
    const base = document.createElement("div");
    base.className = "t-base";
    col.appendChild(base);

    // Active indicator
    if(isActive){
      const ind = document.createElement("div");
      ind.className = "t-active-indicator";
      ind.textContent = "▲ NOW";
      col.appendChild(ind);
    }

    area.appendChild(col);
  });

  updateProgress();
  // Position hero under active tower (after DOM is built)
  setTimeout(() => updateHeroPosition(gs.towerIndex, false), 0);
}

// ======================================================
// BLOCK TAP
// ======================================================
function onBlockTap(ti, fi, el, floor){
  const key = ti + "-" + floor.id;
  if(gs.floorsDone.includes(key)) return;
  if(el.classList.contains("b-removing")) return;

  gs.turnsTotal++;
  const result = applyPower(floor);

  if(!result.ok){
    // FAIL — shake + float, then game over
    el.classList.add("b-failing");
    spawnFloat(el, "❌ 力不足!", "#f87171");
    el.addEventListener("animationend", () => showGameover(floor), { once:true });
    return;
  }

  // SUCCESS — record and mark as removing so double-taps are blocked
  gs.floorsDone.push(key);
  el.classList.add("b-removing");

  if(floor.type === "enemy"){
    spawnClash(el);
    spawnFloat(el, "+" + floor.value, "#4ade80");
    darumaKnockOut(el, ti, floor.id, () => afterRemove(ti, floor));
  } else {
    spawnFloat(el, result.delta, "#60a5fa");
    darumaAbsorb(el, ti, floor.id, () => afterRemove(ti, floor));
  }

  pushCalcToken(result.delta, floor.type === "item" ? "op" : "num");
  pushCalcToken("→", "op");
  pushCalcToken(String(gs.power), "result");
  updatePowerDisplay();
}

// ======================================================
// BLOCK CRUSH (enemy): hero attacks, stone shatters, original collapses
// ======================================================
function darumaKnockOut(blockEl, ti, fi, onDone){
  const stack = $("tstack-" + ti);
  const appEl = $("app");

  // Which blocks are ABOVE this one in the DOM?
  const stackChildren = [...stack.children];
  const myIdx    = stackChildren.indexOf(blockEl);
  const domAbove = stackChildren.filter((c,i) => i < myIdx && !c.classList.contains("b-done"));

  // 1. Hero attack animation
  animateHeroAttack();

  // 2. Spawn rock particles from block center
  spawnRockParticles(blockEl);

  // 3. Snapshot position for clone
  const rect    = blockEl.getBoundingClientRect();
  const appRect = appEl.getBoundingClientRect();

  // 4. Create shattering clone
  const clone = document.createElement("div");
  clone.className = "b-clone " + (blockEl.classList.contains("b-enemy") ? "b-enemy " : "b-item ") +
                    (blockEl.classList.contains("b-boss") ? "b-boss " : "") + "shatter";
  clone.style.cssText =
    "left:"   + (rect.left - appRect.left) + "px;" +
    "top:"    + (rect.top  - appRect.top)  + "px;" +
    "width:"  + rect.width  + "px;" +
    "height:" + rect.height + "px;" +
    "border-color:" + (blockEl.classList.contains("b-enemy") ? "rgba(239,68,68,.55)" : "rgba(96,165,250,.55)") + ";";
  clone.innerHTML = blockEl.innerHTML;
  appEl.appendChild(clone);
  clone.addEventListener("animationend", () => clone.remove());

  // 5. Collapse original
  blockEl.style.maxHeight = rect.height + "px";
  void blockEl.offsetHeight;
  blockEl.classList.add("b-collapsing");

  // 6. Settle blocks above
  setTimeout(() => {
    domAbove.forEach(b => {
      b.classList.add("b-settling");
      b.addEventListener("animationend", () => b.classList.remove("b-settling"), { once:true });
    });
  }, 100);

  // 7. Mark done
  setTimeout(() => {
    blockEl.classList.add("b-done");
    blockEl.classList.remove("b-collapsing", "b-removing");
    onDone();
  }, 480);
}

// ======================================================
// ROCK PARTICLES
// ======================================================
function spawnRockParticles(anchorEl){
  const rect    = anchorEl.getBoundingClientRect();
  const appRect = $("app").getBoundingClientRect();
  const cx = rect.left - appRect.left + rect.width  / 2;
  const cy = rect.top  - appRect.top  + rect.height / 2;
  const colors = ["#9ca3af","#6b7280","#d1d5db","#e5e7eb","#fbbf24"];
  for(let i = 0; i < 9; i++){
    const p = document.createElement("div");
    p.className = "rock-particle";
    const angle = (i / 9) * Math.PI * 2 + (Math.random() - .5) * .6;
    const dist  = 28 + Math.random() * 36;
    const size  = 4 + Math.random() * 5;
    p.style.cssText =
      "left:"       + (cx - size/2) + "px;" +
      "top:"        + (cy - size/2) + "px;" +
      "width:"      + size + "px;" +
      "height:"     + size + "px;" +
      "background:" + colors[Math.floor(Math.random()*colors.length)] + ";" +
      "--pdx:"      + (Math.cos(angle)*dist).toFixed(1) + "px;" +
      "--pdy:"      + (Math.sin(angle)*dist).toFixed(1) + "px;";
    $("app").appendChild(p);
    p.addEventListener("animationend", () => p.remove());
  }
}

// ======================================================
// HERO ANIMATIONS
// ======================================================
function animateHeroAttack(){
  const hero = $("hero");
  if(!hero) return;
  hero.classList.remove("hero-attacking");
  void hero.offsetWidth;
  hero.classList.add("hero-attacking");
  hero.addEventListener("animationend", () => hero.classList.remove("hero-attacking"), { once:true });
}

function updateHeroPosition(towerIdx, animate){
  const hero = $("hero");
  if(!hero) return;
  const col  = $("tcol-" + towerIdx);
  if(!col)  return;
  const colRect  = col.getBoundingClientRect();
  const areaRect = $("gameArea").getBoundingClientRect();
  const heroLeft = colRect.left - areaRect.left + colRect.width / 2;
  if(animate){
    hero.classList.remove("hero-stepping");
    void hero.offsetWidth;
    hero.classList.add("hero-stepping");
    hero.addEventListener("animationend", () => hero.classList.remove("hero-stepping"), { once:true });
  }
  hero.style.left = heroLeft + "px";
}

// ======================================================
// ITEM ABSORB: glow + shrink in place (crystal-style)
// ======================================================
function darumaAbsorb(blockEl, ti, fi, onDone){
  const stack    = $("tstack-" + ti);
  const myIdx    = [...stack.children].indexOf(blockEl);
  const domAbove = [...stack.children].filter((c,i) => i < myIdx && !c.classList.contains("b-done"));

  blockEl.classList.add("b-absorbing");

  setTimeout(() => {
    const rect = blockEl.getBoundingClientRect();
    blockEl.style.maxHeight = rect.height + "px";
    void blockEl.offsetHeight;
    blockEl.classList.add("b-collapsing");

    domAbove.forEach(b => {
      b.classList.add("b-settling");
      b.addEventListener("animationend", () => b.classList.remove("b-settling"), { once:true });
    });
  }, 380);

  setTimeout(() => {
    blockEl.classList.add("b-done");
    blockEl.classList.remove("b-absorbing", "b-collapsing", "b-removing");
    onDone();
  }, 660);
}

// ======================================================
// AFTER BLOCK REMOVED
// ======================================================
function afterRemove(ti, floor){
  updateProgress();
  if(floor.type === "enemy") gs.totalDefeated++;

  if(floor.isBoss){
    setTimeout(() => showClear(), 600);
    return;
  }

  // Check if all floors of THIS tower are done
  const tower   = TOWERS[ti];
  const allDone = tower.floors.every(f => gs.floorsDone.includes(ti + "-" + f.id));
  if(allDone){
    checkTowerAdvance();
  }
}

// ======================================================
// CHECK TOWER ADVANCE
// ======================================================
function checkTowerAdvance(){
  if(gs.towerIndex >= TOWERS.length - 1) return;
  gs.towerIndex++;

  // Update current col label style
  const prevCol = $("tcol-" + (gs.towerIndex - 1));
  if(prevCol){ prevCol.className = "t-col t-done"; }

  const nextCol = $("tcol-" + gs.towerIndex);
  if(nextCol){
    nextCol.className = "t-col t-active";
    // Update label color
    const lbl = nextCol.querySelector(".t-label");
    if(lbl) lbl.style.color = "";

    // Unlock blocks in this tower
    const stack = $("tstack-" + gs.towerIndex);
    if(stack){
      const tower = TOWERS[gs.towerIndex];
      [...stack.querySelectorAll(".b")].forEach((bEl, idx) => {
        const fl = tower.floors[idx];
        bEl.classList.remove("b-locked");
        const t = gs.towerIndex;
        const f = fl;
        bEl.addEventListener("click",    ()    => onBlockTap(t, f.id, bEl, f));
        bEl.addEventListener("touchend", (ev)  => { ev.preventDefault(); onBlockTap(t, f.id, bEl, f); });
      });
    }

    // Add active indicator
    const ind = document.createElement("div");
    ind.className = "t-active-indicator";
    ind.textContent = "▲ NOW";
    nextCol.appendChild(ind);
  }

  // Remove old active indicator from previous column
  const oldInd = document.querySelector("#tcol-" + (gs.towerIndex - 1) + " .t-active-indicator");
  if(oldInd) oldInd.remove();

  showTowerFlash(TOWERS[gs.towerIndex].name);
  updateHeroPosition(gs.towerIndex, true);
}

// ======================================================
// POWER DISPLAY
// ======================================================
function updatePowerDisplay(){
  const el = $("powerValue");
  el.textContent = gs.power;
  el.classList.remove("power-up");
  void el.offsetWidth;
  el.classList.add("power-up");
}

function updateProgress(){
  $("progressLabel").textContent = gs.defeatedEnemies + " / " + TOTAL_ENEMIES + " 撃破";
}

// ======================================================
// FLOATING TEXT + CLASH
// ======================================================
function spawnFloat(anchorEl, text, color){
  const rect    = anchorEl.getBoundingClientRect();
  const appRect = $("app").getBoundingClientRect();
  const ft = document.createElement("div");
  ft.className   = "float-text";
  ft.textContent = text;
  ft.style.color = color;
  ft.style.left  = (rect.left - appRect.left + rect.width  / 2 - 20) + "px";
  ft.style.top   = (rect.top  - appRect.top  + rect.height / 2 - 10) + "px";
  $("app").appendChild(ft);
  ft.addEventListener("animationend", () => ft.remove());
}

function spawnClash(anchorEl){
  const rect    = anchorEl.getBoundingClientRect();
  const appRect = $("app").getBoundingClientRect();
  const cl = document.createElement("div");
  cl.className   = "clash-effect";
  cl.textContent = "⚔️";
  cl.style.left  = (rect.left - appRect.left + rect.width  / 2 - 15) + "px";
  cl.style.top   = (rect.top  - appRect.top  + rect.height / 2 - 15) + "px";
  $("app").appendChild(cl);
  cl.addEventListener("animationend", () => cl.remove());
}

// ======================================================
// CALC LOG
// ======================================================
function pushCalcToken(label, cls){
  gs.calcTokens.push({ label, cls });
  renderCalcLog();
}
function renderCalcLog(){
  const log = $("calcLog");
  log.innerHTML = "";
  gs.calcTokens.forEach(t => {
    const span = document.createElement("span");
    span.className   = "calc-token " + t.cls;
    span.textContent = t.label;
    log.appendChild(span);
  });
  log.scrollLeft = log.scrollWidth;
}

// ======================================================
// TOWER ADVANCE FLASH
// ======================================================
function showTowerFlash(name){
  const el = document.createElement("div");
  el.style.cssText =
    "position:absolute;inset:0;display:flex;align-items:center;justify-content:center;" +
    "z-index:180;pointer-events:none;background:rgba(0,0,0,.35);flex-direction:column;gap:8px;";
  el.innerHTML =
    "<div style='font-size:13px;color:#a78bfa;letter-spacing:.14em;'>TOWER ADVANCE</div>" +
    "<div style='font-size:24px;font-weight:900;color:#fde68a;'>" + name + "</div>";
  $("app").appendChild(el);
  el.animate(
    [
      {opacity:0,transform:"scale(.8)"},
      {opacity:1,transform:"scale(1)"},
      {opacity:1,transform:"scale(1)"},
      {opacity:0,transform:"scale(1.08)"}
    ],
    {duration:1600, easing:"ease"}
  ).onfinish = () => el.remove();
}

// ======================================================
// GAME OVER / CLEAR
// ======================================================
function showGameover(floor){
  $("gameoverDesc").innerHTML =
    "<strong>" + floor.name + "</strong>（力：" + floor.value + "）に負けた！<br>" +
    "あなたの力 " + gs.power + " では届かなかった…<br>順番を変えれば勝てるかも！";
  $("gameoverStats").innerHTML =
    "現在の力：" + gs.power + "<br>倒した敵：" + gs.defeatedEnemies + "体<br>行動回数：" + gs.turnsTotal + "回";
  const ov = $("transOverlay");
  ov.style.transition = "opacity .4s";
  ov.style.opacity = "1";
  ov.style.pointerEvents = "all";
  setTimeout(() => {
    $("gameScreen").style.display    = "none";
    $("gameoverScreen").style.display = "flex";
    ov.style.opacity       = "0";
    ov.style.pointerEvents = "none";
  }, 430);
}

function showClear(){
  const bossVal = Math.floor(BOSS_POWER_BASE * Math.pow(3, gs.stage - 1));
  const diff    = gs.power - bossVal;
  const isLastStage = gs.stage >= MAX_STAGES;
  const nextStage   = gs.stage + 1;

  $("clearTitle").textContent    = isLastStage ? "🏆 ALL CLEAR!" : "STAGE " + gs.stage + " CLEAR!";
  $("clearDesc").innerHTML       = isLastStage
    ? "全ステージを制覇した！<br>真の勇者の称号を得た！"
    : "ステージ " + gs.stage + " の魔王を倒した！<br>次はさらなる強敵が待つ…";
  $("clearStats").innerHTML =
    "パワー：" + gs.power + "<br>ステージ：" + gs.stage + "<br>撃破数：" + gs.defeatedEnemies + "体（累計：" + gs.totalDefeated + "体）<br>行動回数：" + gs.turnsTotal + "回<br>" +
    "魔王の力：" + bossVal + "　vs　あなた：" + gs.power + "（差：" + (diff >= 0 ? "+" : "") + diff + "）";
  $("clearNextBtn").textContent  = isLastStage ? "もう一度挑戦" : "ステージ " + nextStage + " へ進む！";
  $("clearNextBtn").onclick      = isLastStage ? restartGame : () => advanceStage(nextStage);

  const ov = $("transOverlay");
  ov.style.transition = "opacity .4s";
  ov.style.opacity = "1";
  ov.style.pointerEvents = "all";
  setTimeout(() => {
    $("gameScreen").style.display  = "none";
    $("clearScreen").style.display = "flex";
    ov.style.opacity       = "0";
    ov.style.pointerEvents = "none";
  }, 430);
}

// ======================================================
// ADVANCE TO NEXT STAGE (carry power)
// ======================================================
function advanceStage(newStage){
  const carryPower = gs.power;
  const carryTotal = gs.totalDefeated;

  TOWERS       = makeTowers(newStage);
  TOTAL_ENEMIES = TOWERS.reduce((s,t) => s + t.floors.filter(f => f.type==="enemy").length, 0);

  gs = {
    phase:"PLAY",
    stage:newStage,
    power:carryPower,
    towerIndex:0,
    floorsDone:[],
    calcTokens:[{label:String(carryPower), cls:"num"}],
    turnsTotal:0,
    defeatedEnemies:0,
    totalDefeated:carryTotal,
  };

  const ov = $("transOverlay");
  ov.style.transition = "opacity .3s";
  ov.style.opacity = "1";
  ov.style.pointerEvents = "all";
  setTimeout(() => {
    $("clearScreen").style.display = "none";
    $("gameScreen").style.display  = "flex";
    $("stageLabel").textContent = "STAGE " + newStage;
    updatePowerDisplay();
    buildAllTowers();
    renderCalcLog();
    ov.style.opacity       = "0";
    ov.style.pointerEvents = "none";
  }, 360);
}

// ======================================================
// START / RESTART
// ======================================================
function startGame(){
  TOWERS       = makeTowers(1);
  TOTAL_ENEMIES = TOWERS.reduce((s,t) => s + t.floors.filter(f => f.type==="enemy").length, 0);
  gs = {
    phase:"PLAY", stage:1, power:10, towerIndex:0, floorsDone:[],
    calcTokens:[{label:"10", cls:"num"}], turnsTotal:0, defeatedEnemies:0, totalDefeated:0
  };
  const ov = $("transOverlay");
  ov.style.transition = "opacity .3s";
  ov.style.opacity = "1";
  ov.style.pointerEvents = "all";
  setTimeout(() => {
    $("titleScreen").style.display    = "none";
    $("clearScreen").style.display    = "none";
    $("gameoverScreen").style.display = "none";
    $("gameScreen").style.display     = "flex";
    $("stageLabel").textContent = "STAGE " + gs.stage;
    updatePowerDisplay();
    buildAllTowers();
    renderCalcLog();
    ov.style.opacity       = "0";
    ov.style.pointerEvents = "none";
  }, 360);
}
function restartGame(){ startGame(); }

// ======================================================
// TITLE STARS
// ======================================================
(function buildTitleStars(){
  const c = $("titleStars");
  for(let i = 0; i < 60; i++){
    const s  = document.createElement("div");
    s.className = "star-p";
    const sz = 1 + Math.random() * 2;
    s.style.cssText =
      "width:"  + sz + "px;" +
      "height:" + sz + "px;" +
      "top:"    + (Math.random() * 100) + "%;" +
      "left:"   + (Math.random() * 100) + "%;" +
      "animation-duration:" + (2 + Math.random() * 4) + "s;" +
      "animation-delay:"    + (-Math.random() * 4)    + "s;";
    c.appendChild(s);
  }
})();

$("startBtn").addEventListener("click",    startGame);
$("startBtn").addEventListener("touchend", e => { e.preventDefault(); startGame(); });
</script>
