<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Explosion / Impact effect -->
  <!-- Outer rays -->
  <g fill="#ff6f00" opacity="0.8">
    <polygon points="32,2 35,18 38,2 36,18"/>
    <polygon points="62,32 46,29 62,26 46,30"/>
    <polygon points="32,62 29,46 26,62 30,46"/>
    <polygon points="2,32 18,35 2,38 18,34"/>
    <polygon points="54,10 42,22 58,14 43,23"/>
    <polygon points="54,54 42,42 58,50 43,41"/>
    <polygon points="10,54 22,42 6,50 21,41"/>
    <polygon points="10,10 22,22 6,14 21,23"/>
  </g>
  <!-- Mid explosion -->
  <circle cx="32" cy="32" r="22" fill="#ff8f00"/>
  <!-- Inner explosion -->
  <circle cx="32" cy="32" r="16" fill="#ffc107"/>
  <!-- Core -->
  <circle cx="32" cy="32" r="10" fill="#fff9c4"/>
  <!-- Hot center -->
  <circle cx="32" cy="32" r="5" fill="#fff"/>
  <!-- Smoke wisps -->
  <circle cx="24" cy="16" r="4" fill="#616161" opacity="0.5"/>
  <circle cx="20" cy="12" r="3" fill="#757575" opacity="0.4"/>
  <circle cx="40" cy="14" r="3.5" fill="#616161" opacity="0.4"/>
  <circle cx="44" cy="10" r="2.5" fill="#757575" opacity="0.3"/>
</svg>
