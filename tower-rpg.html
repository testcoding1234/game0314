<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>勇者の塔</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none;}
html,body{width:100%;height:100%;background:#0a0010;display:flex;align-items:center;justify-content:center;overflow:hidden;touch-action:none;}
#app{position:relative;width:375px;height:667px;max-height:100vh;max-height:100svh;overflow:hidden;font-family:system-ui,-apple-system,sans-serif;color:#e2e8f0;}

/* ====== TITLE SCREEN ====== */
#titleScreen{position:absolute;inset:0;background:linear-gradient(180deg,#0a0020 0%,#1a0040 40%,#0a0020 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;gap:0;}
.title-bg-stars{position:absolute;inset:0;pointer-events:none;overflow:hidden;}
.star-p{position:absolute;border-radius:50%;background:#fff;animation:twinkle linear infinite;}
@keyframes twinkle{0%,100%{opacity:.2}50%{opacity:1}}
.title-logo{font-size:64px;margin-bottom:8px;animation:floatY 2.5s ease-in-out infinite;}
@keyframes floatY{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
.title-main{font-size:38px;font-weight:900;background:linear-gradient(135deg,#fde68a,#f59e0b,#fde68a);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:.08em;filter:drop-shadow(0 0 20px rgba(245,158,11,.6));}
.title-sub{font-size:13px;color:#a78bfa;letter-spacing:.12em;margin-top:4px;margin-bottom:24px;}
.title-hero{font-size:80px;margin:6px 0;animation:titleHeroFloat 1.4s ease-in-out infinite alternate;}
@keyframes titleHeroFloat{from{transform:translateY(0)}to{transform:translateY(-10px)}}
.title-desc{font-size:12px;color:#94a3b8;text-align:center;line-height:1.8;margin-bottom:28px;padding:0 24px;}
.title-start-btn{background:linear-gradient(135deg,#7c3aed,#9333ea,#c026d3);color:#fff;font-size:20px;font-weight:900;padding:16px 48px;border-radius:50px;border:none;cursor:pointer;box-shadow:0 0 30px rgba(147,51,234,.7),0 4px 16px rgba(0,0,0,.5);letter-spacing:.1em;animation:pulseShadow 1.5s ease-in-out infinite;}
@keyframes pulseShadow{0%,100%{box-shadow:0 0 20px rgba(147,51,234,.5),0 4px 16px rgba(0,0,0,.5)}50%{box-shadow:0 0 40px rgba(147,51,234,.9),0 4px 20px rgba(0,0,0,.6)}}
.title-start-btn:active{transform:scale(.95);}
.back-link{position:absolute;top:14px;left:14px;font-size:12px;color:#6b7280;cursor:pointer;padding:6px 10px;border-radius:8px;border:1px solid rgba(107,114,128,.3);}
.back-link:active{background:rgba(255,255,255,.05);}

/* ====== GAME SCREEN ====== */
#gameScreen{position:absolute;inset:0;background:linear-gradient(180deg,#05001a 0%,#0d0030 50%,#080015 100%);display:none;flex-direction:column;}
#gameHeader{height:50px;flex-shrink:0;display:flex;align-items:center;justify-content:space-between;padding:0 12px;background:rgba(0,0,18,.88);border-bottom:1px solid rgba(139,92,246,.3);}
#powerDisplay{display:flex;align-items:center;gap:6px;background:rgba(245,158,11,.12);border:1.5px solid rgba(245,158,11,.5);border-radius:20px;padding:4px 12px;}
#powerIcon{font-size:17px;}
#powerValue{font-size:21px;font-weight:900;color:#fbbf24;min-width:52px;max-width:140px;text-align:right;font-variant-numeric:tabular-nums;}
.power-up{animation:powerBump .4s ease;}
@keyframes powerBump{0%,100%{transform:scale(1);color:#fbbf24}40%{transform:scale(1.5);color:#fde68a}}
#progressLabel{font-size:11px;color:#a78bfa;font-weight:700;letter-spacing:.04em;}

/* ====== TOWER ROW (game area) ====== */
#gameArea{
  flex:1;
  display:flex;
  flex-direction:row;
  align-items:flex-end;
  justify-content:flex-start;
  gap:4px;
  padding:8px 4px 0 48px;
  position:relative;
  overflow:hidden;
  background:
    radial-gradient(ellipse at 50% 0%,rgba(80,0,160,.15) 0%,transparent 70%),
    linear-gradient(180deg,#06001e 0%,#0c0028 40%,#100030 75%,#090018 100%);
}

/* ground line */
#gameArea::after{
  content:"";
  position:absolute;
  bottom:0;left:0;right:0;
  height:3px;
  background:linear-gradient(90deg,transparent 2%,rgba(139,92,246,.6) 10%,rgba(139,92,246,.6) 90%,transparent 98%);
  pointer-events:none;
}

/* ====== TOWER COLUMN ====== */
.t-col{
  display:flex;
  flex-direction:column;
  align-items:center;
  width:80px;
  flex-shrink:0;
}
.t-label{
  font-size:7.5px;
  font-weight:800;
  color:#6d28d9;
  text-align:center;
  letter-spacing:.04em;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
  max-width:80px;
  height:16px;
  line-height:16px;
  margin-bottom:3px;
}
.t-col.t-active .t-label{color:#a78bfa;}
.t-col.t-locked  .t-label{color:#5a3d7a;}

/* stack holds the blocks */
.t-stack{
  display:flex;
  flex-direction:column;
  gap:3px;
  width:78px;
}

/* base / ground element */
.t-base{
  width:78px;
  height:10px;
  background:linear-gradient(90deg,rgba(139,92,246,.3),rgba(167,139,250,.5),rgba(139,92,246,.3));
  border-radius:0 0 4px 4px;
  box-shadow:0 3px 8px rgba(0,0,0,.5);
  flex-shrink:0;
}
.t-col.t-locked .t-base{background:linear-gradient(90deg,rgba(55,65,81,.3),rgba(75,85,99,.4),rgba(55,65,81,.3));}

/* active tower indicator */
.t-active-indicator{
  font-size:9px;
  color:#a78bfa;
  font-weight:900;
  text-align:center;
  height:14px;
  line-height:14px;
  animation:indicatorPulse 1s ease-in-out infinite alternate;
  margin-top:1px;
}
@keyframes indicatorPulse{from{opacity:.5}to{opacity:1}}

/* ====== BLOCK ====== */
.b{
  width:78px;
  height:52px;
  flex-shrink:0;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:1px;
  border-radius:5px 5px 3px 3px;
  cursor:pointer;
  position:relative;
  overflow:hidden;
  border:2px solid;
  /* 3-D raised look */
  box-shadow:0 4px 0 rgba(0,0,0,.55),0 5px 8px rgba(0,0,0,.35);
  transition:box-shadow .1s;
  max-height:80px; /* used by the collapse transition */
}
.b:active:not(.b-done):not(.b-locked):not(.b-removing){
  transform:translateY(3px);
  box-shadow:0 1px 0 rgba(0,0,0,.55);
}
/* top sheen line */
.b::before{
  content:"";
  position:absolute;
  top:0;left:0;right:0;
  height:2px;
  background:rgba(255,255,255,.14);
  border-radius:3px 3px 0 0;
}

/* enemy block */
.b.b-enemy{
  background:linear-gradient(160deg,#3d0a14 0%,#1e0509 100%);
  border-color:rgba(239,68,68,.55);
}
/* item block */
.b.b-item{
  background:linear-gradient(160deg,#07163a 0%,#040e28 100%);
  border-color:rgba(96,165,250,.55);
}
/* boss block */
.b.b-boss{
  background:linear-gradient(160deg,#5a0000 0%,#320000 100%);
  border-color:rgba(239,68,68,.95);
  box-shadow:0 4px 0 rgba(0,0,0,.6),0 0 22px rgba(239,68,68,.45),0 5px 10px rgba(0,0,0,.4);
  height:58px;
  max-height:62px;
}
.b.b-boss::after{
  content:"👑";
  position:absolute;
  top:2px;right:4px;
  font-size:9px;
  line-height:1;
}

/* locked (future tower) — content visible so player can plan ahead */
.b.b-locked{
  cursor:default;
  filter:brightness(.78) saturate(.5);
  opacity:.75;
  pointer-events:none;
}
/* done (removed) */
.b.b-done{
  display:none;
}
/* block internals */
.b-emoji{font-size:22px;line-height:1;pointer-events:none;}
.b.b-boss .b-emoji{font-size:26px;}
.b-name{font-size:7px;color:#94a3b8;line-height:1;pointer-events:none;max-width:72px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-align:center;}
.b-val{font-size:11px;font-weight:900;color:#fbbf24;line-height:1.2;pointer-events:none;text-align:center;word-break:break-all;}
.b.b-item .b-val{color:#60a5fa;}
.b.b-boss .b-val{color:#f87171;font-size:11px;}

/* ====== ROCK CRUSH ANIMATION ====== */
/* Clone that shatters in place like a hard stone */
.b-clone{
  position:absolute;
  z-index:80;
  pointer-events:none;
  border-radius:5px 5px 3px 3px;
  border:2px solid;
  overflow:hidden;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:1px;
}
@keyframes rockShatter{
  0%  {transform:scale(1) rotate(0deg);opacity:1;filter:brightness(1);}
  18% {transform:scale(1.08) rotate(3deg);opacity:1;filter:brightness(3) saturate(0);}
  40% {transform:scale(.78) rotate(-6deg);opacity:.85;filter:brightness(1.4);}
  70% {transform:scale(.4) rotate(9deg);opacity:.45;}
  100%{transform:scale(0) rotate(14deg);opacity:0;}
}
.b-clone.shatter{animation:rockShatter .4s ease-in forwards;}

/* rock particle chips */
.rock-particle{
  position:absolute;
  z-index:90;
  pointer-events:none;
  border-radius:2px;
  animation:particleFly .5s ease-out forwards;
}
@keyframes particleFly{
  0%  {opacity:1;transform:translate(0,0) scale(1);}
  100%{opacity:0;transform:translate(var(--pdx),var(--pdy)) scale(0);}
}

/* hero character */
#hero{
  position:absolute;
  bottom:14px;
  z-index:50;
  pointer-events:none;
  width:40px;
  height:40px;
  display:flex;
  align-items:center;
  justify-content:center;
  transform:scaleX(-1);
  filter:drop-shadow(0 0 8px rgba(139,92,246,.9));
  transition:left .45s cubic-bezier(.22,.68,0,1.2);
}
@keyframes heroAttack{
  0%  {transform:scaleX(-1) scaleY(1) rotate(0deg);}
  25% {transform:scaleX(-1.5) scaleY(1.5) rotate(20deg) translateX(-10px);}
  55% {transform:scaleX(-1.25) scaleY(1.25) rotate(-12deg) translateX(4px);}
  100%{transform:scaleX(-1) scaleY(1) rotate(0deg);}
}
.hero-attacking{animation:heroAttack .38s ease-out;}
@keyframes heroStep{
  0%,100%{transform:scaleX(-1) translateY(0);}
  50%     {transform:scaleX(-1) translateY(-5px);}
}
.hero-stepping{animation:heroStep .22s steps(1) 4;}

/* height collapse — applied after clone is detached */
.b-collapsing{
  max-height:0 !important;
  overflow:hidden !important;
  padding-top:0 !important;
  padding-bottom:0 !important;
  border-top-width:0 !important;
  border-bottom-width:0 !important;
  box-shadow:none !important;
  gap:0 !important;
  transition:max-height .22s ease-out, padding .22s, border-width .22s, gap .22s !important;
}

/* settle/drop animation for blocks ABOVE the knocked-out one */
@keyframes darumaSettle{
  0%  {transform:translateY(0);}
  20% {transform:translateY(9px);}
  55% {transform:translateY(-3px);}
  80% {transform:translateY(1px);}
  100%{transform:translateY(0);}
}
.b-settling{animation:darumaSettle .3s ease-out forwards;}

/* item absorption animation */
@keyframes itemAbsorb{
  0%  {transform:scale(1);box-shadow:0 4px 0 rgba(0,0,0,.55);}
  30% {transform:scale(1.18);box-shadow:0 0 26px 10px rgba(96,165,250,.8);}
  60% {transform:scale(.55);opacity:.7;}
  100%{transform:scale(.04);opacity:0;}
}
.b-absorbing{animation:itemAbsorb .45s ease-in-out forwards;pointer-events:none;}

/* enemy fail shake */
@keyframes failShake{
  0%,100%{transform:translateX(0);}
  12%{transform:translateX(-8px);}
  25%{transform:translateX(8px);}
  37%{transform:translateX(-6px);box-shadow:0 0 20px rgba(239,68,68,.9);}
  50%{transform:translateX(6px);}
  62%{transform:translateX(-4px);}
  75%{transform:translateX(4px);}
  88%{transform:translateX(-2px);}
}
.b-failing{animation:failShake .52s ease-in-out forwards;pointer-events:none;}

/* clash effect */
.clash-effect{position:absolute;pointer-events:none;z-index:200;font-size:30px;animation:clashPop .5s ease-out forwards;}
@keyframes clashPop{
  0%  {transform:scale(0) rotate(-30deg);opacity:1;}
  40% {transform:scale(1.5) rotate(15deg);opacity:1;}
  70% {transform:scale(1) rotate(0deg);opacity:.8;}
  100%{transform:scale(.1) rotate(8deg);opacity:0;}
}
/* floating text */
.float-text{position:absolute;pointer-events:none;z-index:250;font-size:22px;font-weight:900;text-shadow:2px 2px 0 rgba(0,0,0,.8);animation:floatUp .9s ease-out forwards;}
@keyframes floatUp{0%{opacity:1;transform:translateY(0) scale(1)}55%{opacity:1;transform:translateY(-44px) scale(1.2)}100%{opacity:0;transform:translateY(-80px) scale(.5)}}

/* ====== CALC LOG ====== */
#calcLog{height:36px;flex-shrink:0;background:rgba(0,0,18,.82);border-top:1px solid rgba(139,92,246,.2);display:flex;align-items:center;padding:0 12px;overflow:hidden;gap:4px;white-space:nowrap;}
#calcLog::-webkit-scrollbar{display:none;}
.calc-token{font-size:11px;font-weight:700;border-radius:6px;padding:2px 7px;}
.calc-token.op{color:#a78bfa;background:rgba(139,92,246,.15);}
.calc-token.num{color:#fbbf24;background:rgba(245,158,11,.12);}
.calc-token.result{color:#4ade80;background:rgba(74,222,128,.12);}
.calc-token.lose{color:#f87171;background:rgba(239,68,68,.12);}

/* ====== INSTRUCTION ====== */
#instruction{height:30px;flex-shrink:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,18,.62);}
#instruction p{font-size:10px;color:#6b7280;letter-spacing:.03em;}

/* ====== STAGE FLASH ====== */
.stage-badge{font-size:11px;font-weight:800;color:#fde68a;background:rgba(245,158,11,.18);border:1.5px solid rgba(245,158,11,.4);border-radius:12px;padding:2px 9px;letter-spacing:.06em;}

/* ====== COMBO / CRITICAL / JACKPOT ====== */
.combo-badge{
  position:absolute;
  z-index:210;
  pointer-events:none;
  font-size:20px;
  font-weight:900;
  color:#fff;
  text-shadow:0 0 12px rgba(250,204,21,1), 2px 2px 0 rgba(0,0,0,.9);
  animation:comboPop .55s cubic-bezier(.175,.885,.32,1.275) forwards;
}
@keyframes comboPop{
  0%  {transform:scale(0) translateY(0);opacity:1;}
  60% {transform:scale(1.4) translateY(-18px);opacity:1;}
  100%{transform:scale(1) translateY(-38px);opacity:0;}
}
.critical-overlay{
  position:absolute;inset:0;z-index:300;pointer-events:none;
  display:flex;align-items:center;justify-content:center;
  animation:criticalAnim .55s ease-out forwards;
}
@keyframes criticalAnim{
  0%  {background:rgba(250,200,10,.0);}
  18% {background:rgba(250,200,10,.32);}
  60% {background:rgba(250,200,10,.18);}
  100%{background:rgba(250,200,10,.0);}
}
.critical-text{
  font-size:38px;font-weight:900;letter-spacing:.08em;
  color:#fff;
  text-shadow:0 0 24px rgba(250,204,21,1),0 0 48px rgba(239,68,68,.8),3px 3px 0 rgba(0,0,0,.9);
  animation:critTextPop .55s cubic-bezier(.175,.885,.32,1.275) forwards;
}
@keyframes critTextPop{
  0%  {transform:scale(0) rotate(-8deg);opacity:1;}
  55% {transform:scale(1.3) rotate(4deg);opacity:1;}
  100%{transform:scale(1) rotate(0deg);opacity:0;}
}
.jackpot-overlay{
  position:absolute;inset:0;z-index:310;pointer-events:none;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;
  animation:jackpotBg .8s ease-out forwards;
}
@keyframes jackpotBg{
  0%  {background:rgba(220,170,0,.0);}
  20% {background:rgba(220,170,0,.42);}
  70% {background:rgba(220,170,0,.25);}
  100%{background:rgba(220,170,0,.0);}
}
.jackpot-text{
  font-size:44px;font-weight:900;letter-spacing:.1em;
  color:#fff100;
  text-shadow:0 0 30px rgba(255,240,0,1),0 0 60px rgba(245,158,11,.9),4px 4px 0 rgba(0,0,0,.9);
  animation:jackpotTextPop .8s cubic-bezier(.175,.885,.32,1.275) forwards;
}
.jackpot-sub{font-size:16px;font-weight:900;color:#fff;text-shadow:2px 2px 0 rgba(0,0,0,.9);opacity:0;animation:jackpotSubFade .8s .15s ease-out forwards;}
@keyframes jackpotTextPop{
  0%  {transform:scale(0) rotate(-12deg);opacity:1;}
  55% {transform:scale(1.4) rotate(5deg);opacity:1;}
  100%{transform:scale(1.1) rotate(0deg);opacity:0;}
}
@keyframes jackpotSubFade{0%{opacity:0;transform:translateY(8px)}40%{opacity:1;transform:translateY(-4px)}100%{opacity:0;transform:translateY(-16px)}}
.jackpot-particle{position:absolute;pointer-events:none;font-size:18px;animation:jpPartFly .7s ease-out forwards;}
@keyframes jpPartFly{0%{opacity:1;transform:translate(0,0) scale(1)}100%{opacity:0;transform:translate(var(--jdx),var(--jdy)) scale(.2)}}

/* ====== RESULT SCREENS ====== */
#clearScreen,#gameoverScreen{position:absolute;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;z-index:200;gap:14px;}
#clearScreen{background:linear-gradient(180deg,#0f3020 0%,#1a4030 50%,#0f3020 100%);}
#gameoverScreen{background:linear-gradient(180deg,#300a0a 0%,#500d0d 50%,#300a0a 100%);}
.result-emoji{font-size:80px;animation:resultPop .6s cubic-bezier(.175,.885,.32,1.275) both;}
@keyframes resultPop{from{transform:scale(0) rotate(-20deg)}to{transform:scale(1) rotate(0deg)}}
.result-title{font-size:36px;font-weight:900;letter-spacing:.1em;}
.result-title.win{background:linear-gradient(135deg,#fde68a,#f59e0b);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.result-title.lose{color:#f87171;}
.result-desc{font-size:14px;color:#94a3b8;text-align:center;padding:0 24px;line-height:1.7;}
.result-stats{background:rgba(0,0,0,.3);border-radius:14px;padding:14px 24px;font-size:13px;color:#c4b5fd;text-align:center;line-height:2;}
.result-btn{background:linear-gradient(135deg,#7c3aed,#9333ea);color:#fff;font-size:16px;font-weight:900;padding:14px 40px;border-radius:40px;border:none;cursor:pointer;box-shadow:0 4px 20px rgba(147,51,234,.5);}
.result-btn:active{transform:scale(.95);}
.result-btn.retry{background:linear-gradient(135deg,#dc2626,#b91c1c);}
.result-home{font-size:12px;color:#6b7280;cursor:pointer;padding:6px;border-bottom:1px solid rgba(107,114,128,.3);}
#transOverlay{position:absolute;inset:0;background:#000;z-index:150;pointer-events:none;opacity:0;transition:opacity .3s;}

/* ====== GAME HEADER HOME BUTTON ====== */
.game-back-btn{font-size:12px;color:#6b7280;cursor:pointer;padding:5px 8px;border-radius:8px;border:1px solid rgba(107,114,128,.3);flex-shrink:0;line-height:1;}
.game-back-btn:active{background:rgba(255,255,255,.07);}

/* ====== DIFFICULTY SELECTOR ====== */
.diff-row{display:flex;gap:12px;margin-bottom:10px;}
.diff-btn{padding:10px 22px;border-radius:28px;border:2px solid;font-size:13px;font-weight:800;cursor:pointer;letter-spacing:.05em;transition:all .2s;-webkit-tap-highlight-color:transparent;}
.diff-btn:active{transform:scale(.93);}
.diff-normal{background:rgba(59,130,246,.1);border-color:rgba(59,130,246,.35);color:#93c5fd;}
.diff-hard{background:rgba(220,38,38,.1);border-color:rgba(220,38,38,.35);color:#fca5a5;}
.diff-normal.diff-sel{background:rgba(59,130,246,.25);border-color:#3b82f6;color:#bfdbfe;box-shadow:0 0 18px rgba(59,130,246,.45);}
.diff-hard.diff-sel{background:rgba(220,38,38,.25);border-color:#ef4444;color:#fecaca;box-shadow:0 0 18px rgba(239,68,68,.55);}
.hard-badge{font-size:10px;font-weight:800;color:#fca5a5;background:rgba(220,38,38,.22);border:1.5px solid rgba(239,68,68,.5);border-radius:10px;padding:2px 7px;letter-spacing:.06em;margin-left:4px;}
</style>
</head>
<body>
<div id="app">

  <!-- ===== TITLE SCREEN ===== -->
  <div id="titleScreen">
    <div class="title-bg-stars" id="titleStars"></div>
    <div class="back-link" onclick="location.href='index.html'">← ホーム</div>
    <div class="title-logo">🏰</div>
    <div class="title-main">勇者の塔</div>
    <div class="title-sub">HERO'S TOWER</div>
    <div class="title-hero"><img src="assets/images/sword.svg" width="72" height="72" alt="⚔️" style="filter:drop-shadow(0 0 14px #a78bfa);"></div>
    <div class="title-desc">塔を攻略して魔王を倒せ！<br>アイテムを駆使して力をつけろ！</div>
    <div class="diff-row">
      <div class="diff-btn diff-normal" id="btnNormal" onclick="selectDiff('normal')">🌙 ノーマル</div>
      <div class="diff-btn diff-hard diff-sel" id="btnHard" onclick="selectDiff('hard')">⚡ ハード</div>
    </div>
    <button class="title-start-btn" id="startBtn">ゲームスタート</button>
  </div>

  <!-- ===== GAME SCREEN ===== -->
  <div id="gameScreen">

<script>
// ======================================================

// ======================================================
const BOSS_POWER_BASE = 3000;
const MAX_STAGES = 5;

// Scaling multiplier per stage: ×10 each stage keeps carry-over power meaningful
// while pushing enemy values into 4-5 digit territory on stage 2+.
// (Stage 2 boss = 30,000 ; Stage 3 = 300,000 ; Stage 4 = 3,000,000 …)
function stageEm(s){ return Math.pow(10, s - 1); }

const STAGE_TOWER_META = [

let TOWERS = makeTowers(1);
let TOTAL_ENEMIES = TOWERS.reduce((s,t) => s + t.floors.filter(f => f.type==="enemy").length, 0);

// ======================================================
// HARD MODE TOWERS — unique-solution design for every stage
// Each tower follows a strict "small enemy → item → big enemy" chain
// where the exact order is the ONLY path to victory.
// Power resets to 10 at each hard-mode stage start to preserve
// the per-stage puzzle balance.
// ======================================================
function makeHardTowers(stage) {
  const em = stageEm(stage);
  const m  = STAGE_TOWER_META[Math.min(stage - 1, STAGE_TOWER_META.length - 1)];
  // Tower-0 item multiplier grows with stage so the unique-solution
  // constraint holds even as enemy values scale by ×10 per stage.
  const k0 = stage <= 1 ? 5 : stage <= 2 ? 7 : 8;
  return [
    {
      id:0, name:m[0], emoji:m[1],
      floors:[
        { id:0, type:"enemy", emoji:"🦁", name:"ライオン",    value:Math.floor(60*em) },
        { id:1, type:"item",  emoji:"🌀", name:"魔法の渦",    op:"×", value:k0 },
        { id:2, type:"enemy", emoji:"🐺", name:"ウルフ",      value:Math.floor(8*em) },

    },
    {
      id:1, name:m[2], emoji:m[3],
      floors:[
        { id:0, type:"enemy", emoji:"🐉", name:"ドラゴン",    value:Math.floor(2000*em) },
        { id:1, type:"item",  emoji:"🌟", name:"勇者の証",    op:"×", value:8 },
        { id:2, type:"enemy", emoji:"👿", name:"魔人",        value:Math.floor(160*em) },
        { id:3, type:"enemy", emoji:"👺", name:"ゴブリン",    value:Math.floor(40*em) },

    },
    {
      id:2, name:m[4], emoji:m[5],
      floors:[
        { id:0, type:"enemy", emoji:"🌑", name:"暗黒神",      value:Math.floor(240000*em) },
        { id:1, type:"item",  emoji:"💎", name:"神の結晶",    op:"×", value:20 },
        { id:2, type:"enemy", emoji:"👿", name:"堕天使",      value:Math.floor(5200*em) },
        { id:3, type:"enemy", emoji:"🧙", name:"大魔道士",    value:Math.floor(5000*em) },
        { id:4, type:"enemy", emoji:"🗡️",  name:"暗黒騎士",   value:Math.floor(500*em) },
      ]
    },
    {
      id:3, name:m[6], emoji:m[7],
      floors:[
        { id:0, type:"enemy", emoji:"😈", name:"魔王",        value:Math.floor(20000000*em), isBoss:true },
        { id:1, type:"item",  emoji:"⚡", name:"聖剣の真髄",  op:"×", value:12 },
        { id:2, type:"enemy", emoji:"🐲", name:"炎竜王",      value:Math.floor(1100000*em) },
        { id:3, type:"enemy", emoji:"🦊", name:"九尾の狐神",  value:Math.floor(570000*em) },
        { id:4, type:"enemy", emoji:"👹", name:"魔王の衛兵",  value:Math.floor(25000*em) },
      ]
    }
  ];
}

// ======================================================
// GAME STATE
// ======================================================
let selectedDifficulty = 'hard'; // Default: hard mode

let gs = {
  phase:"TITLE",
  stage:1,
  combo:0,
  power:10,
  towerIndex:0,
  floorsDone:[],   // "ti-fi" strings
  calcTokens:[],
  turnsTotal:0,
  defeatedEnemies:0,
  totalDefeated:0,
  hardMode:true,
};

function $(id){ return document.getElementById(id); }

// ======================================================
// SOUND SYSTEM (Web Audio API)
// ======================================================
const _sfx = (() => {
  let ctx = null;
  const bufs = {};
  const SOUNDS = ['click','hit','coin','success','gameover','powerup','whoosh'];

  function getCtx(){
    if(!ctx){
      try { ctx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e){}
    }
    return ctx;
  }

  function load(name){
    if(bufs[name] !== undefined) return;
    bufs[name] = null;
    const c = getCtx();
    if(!c) return;
    fetch('assets/sounds/' + name + '.wav')
      .then(r => r.arrayBuffer())
      .then(ab => c.decodeAudioData(ab))
      .then(buf => { bufs[name] = buf; })
      .catch(() => {});
  }

  function play(name){
    const c = getCtx();
    if(!c) return;
    if(c.state === 'suspended') c.resume();
    if(!bufs[name]) { load(name); return; }
    try {
      const src = c.createBufferSource();
      src.buffer = bufs[name];
      src.connect(c.destination);
      src.start(0);
    } catch(e){}
  }

  // Preload on first user interaction
  function preload(){ SOUNDS.forEach(load); }
  document.addEventListener('click',    preload, { once:true });
  document.addEventListener('touchend', preload, { once:true });

  return { play };
})();

// ======================================================
// APPLY POWER
// ======================================================
function applyPower(floor){
  if(floor.type==="enemy"){
    if(gs.power > floor.value){
      // COMBO bonus: +20% at 3, +50% at 5, +80% at 7+ (normal mode only)
      let bonus = 0;
      if(!gs.hardMode){
        if(gs.combo >= 7) bonus = Math.floor(floor.value * .8);
        else if(gs.combo >= 5) bonus = Math.floor(floor.value * .5);
        else if(gs.combo >= 3) bonus = Math.floor(floor.value * .2);
      }
      gs.power = Math.floor(gs.power + floor.value + bonus);
      gs.defeatedEnemies++;
      gs.combo++;

      // JACKPOT: 5% chance for extra bonus burst (normal mode only)
      if(!gs.hardMode){
        const jpRoll = Math.random();
        if(jpRoll < .05){
          const jpBonus = Math.floor(floor.value * (1 + Math.random()));
          gs.power += jpBonus;
          return { ok:true, delta:"+"+(floor.value+bonus), jackpot:true, jackpotBonus:jpBonus };
        }
      }
      return { ok:true, delta:"+"+(floor.value+bonus), combo:gs.combo };
    }
    return { ok:false };
  }
  // ITEM — CRITICAL: 20% chance to double the effect (normal mode only)
  const isCrit = (!gs.hardMode && Math.random() < .20);
  let effVal = isCrit ? floor.value * 2 : floor.value;
  if(floor.op==="×")      gs.power = Math.floor(gs.power * effVal);
  else if(floor.op==="+") gs.power = Math.floor(gs.power + effVal);
  else if(floor.op==="÷") { gs.power = Math.floor(gs.power / floor.value); } // curse — no crit
  gs.combo = 0; // item use resets combo
  return { ok:true, delta:floor.op + effVal + (isCrit ? "!" : ""), critical:isCrit };
}

// ======================================================
// BLOCK HEIGHT — varies by enemy power / item / boss
// ======================================================
function getBlockHeight(floor){
  if(floor.isBoss)           return 72;
  if(floor.type === "item")  return 40;
  // Normalize value to stage-1 scale so thresholds are consistent across stages
  const em = stageEm(gs.stage);
  const v  = floor.value / em;
  if(v >= 400) return 66;
  if(v >= 60)  return 58;
  if(v >= 20)  return 50;
  return 44;
}

// ======================================================
// BUILD ALL TOWERS
// ======================================================
function buildAllTowers(){
  const area = $("gameArea");
  area.innerHTML = "";

  // Re-create hero (cleared by innerHTML reset above)
  const heroEl = document.createElement("div");
  heroEl.id = "hero";
  const heroImg = document.createElement("img");
  heroImg.src = "assets/images/hero.svg";
  heroImg.width = 36; heroImg.height = 36;
  heroImg.alt = "🧙";
  heroImg.style.display = "block";
  heroEl.appendChild(heroImg);
  area.appendChild(heroEl);

  TOWERS.forEach((tower, ti) => {
    const isActive = (ti === gs.towerIndex);
    const isLocked = (ti > gs.towerIndex);

    const col = document.createElement("div");
    col.className = "t-col " + (isActive ? "t-active" : isLocked ? "t-locked" : "t-done");
    col.id = "tcol-" + ti;

    // Tower label
    const lbl = document.createElement("div");
    lbl.className = "t-label";
    lbl.textContent = tower.emoji + " " + tower.name;
    col.appendChild(lbl);

    // Block stack
    const stack = document.createElement("div");
    stack.className = "t-stack";
    stack.id = "tstack-" + ti;

    tower.floors.forEach(floor => {
      const key  = ti + "-" + floor.id;
      const done = gs.floorsDone.includes(key);
      const b = document.createElement("div");
      b.id        = "b-" + ti + "-" + floor.id;
      b.className = [
        "b",
        floor.type === "enemy" ? "b-enemy" : "b-item",
        floor.isBoss ? "b-boss" : "",
        done       ? "b-done"   : "",
        isLocked   ? "b-locked" : "",
      ].filter(Boolean).join(" ");

      // Variable height based on enemy power / item / boss
      const bh = getBlockHeight(floor);
      b.style.height    = bh + "px";
      b.style.maxHeight = (bh + 4) + "px";

      b.innerHTML =
        "<span class='b-emoji'>" + floor.emoji + "</span>" +
        "<span class='b-name'>"  + floor.name  + "</span>" +
        "<span class='b-val'>"   + (floor.type === "enemy" ? "⚔️" + floor.value.toLocaleString() : floor.op + floor.value) + "</span>";

      if(!done && !isLocked){
        const f  = floor;
        const t  = ti;
        b.addEventListener("click",    ()    => onBlockTap(t, f.id, b, f));
        b.addEventListener("touchend", (ev)  => { ev.preventDefault(); onBlockTap(t, f.id, b, f); });
      }
      stack.appendChild(b);
    });

    col.appendChild(stack);

    // Base
    const base = document.createElement("div");
    base.className = "t-base";
    col.appendChild(base);

    // Active indicator
    if(isActive){
      const ind = document.createElement("div");
      ind.className = "t-active-indicator";
      ind.textContent = "▲ NOW";
      col.appendChild(ind);
    }

    area.appendChild(col);
  });

  updateProgress();
  // Position hero under active tower (after DOM is built)
  setTimeout(() => updateHeroPosition(gs.towerIndex, false), 0);
}

// ======================================================
// BLOCK TAP
// ======================================================
function onBlockTap(ti, fi, el, floor){
  // Guard: reject taps from inactive towers.
  // CSS pointer-events:none can be bypassed on some mobile browsers, so we
  // enforce the active-tower rule here in JS as the authoritative check.
  if(ti !== gs.towerIndex) return;
  const key = ti + "-" + floor.id;
  if(gs.floorsDone.includes(key)) return;
  if(el.classList.contains("b-removing")) return;

  gs.turnsTotal++;
  const result = applyPower(floor);

  if(!result.ok){
    // FAIL — shake + float, then game over
    el.classList.add("b-failing");
    spawnFloat(el, "❌ 力不足!", "#f87171");
    el.addEventListener("animationend", () => showGameover(floor), { once:true });
    return;
  }

  // SUCCESS — record and mark as removing so double-taps are blocked
  gs.floorsDone.push(key);
  el.classList.add("b-removing");

  if(floor.type === "enemy"){
    spawnClash(el);
    spawnFloat(el, "+" + result.delta.replace("+",""), "#4ade80");
    darumaKnockOut(el, ti, floor.id, () => afterRemove(ti, floor));
    if(result.jackpot){
      _sfx.play('coin');
      setTimeout(() => showJackpot(result.jackpotBonus), 80);
    } else if(result.combo >= 3){
      showComboBadge(el, result.combo);
    }
  } else {
    _sfx.play('powerup');
    spawnFloat(el, result.delta, "#60a5fa");
    darumaAbsorb(el, ti, floor.id, () => afterRemove(ti, floor));
    if(result.critical){ setTimeout(() => showCritical(), 60); }
  }

  pushCalcToken(result.delta, floor.type === "item" ? "op" : "num");
  pushCalcToken("→", "op");
  pushCalcToken(gs.power.toLocaleString(), "result");
  updatePowerDisplay();
}

// ======================================================
// BLOCK CRUSH (enemy): hero attacks, stone shatters, original collapses
// ======================================================
function darumaKnockOut(blockEl, ti, fi, onDone){
  const stack = $("tstack-" + ti);
  const appEl = $("app");

  // Which blocks are ABOVE this one in the DOM?
  const stackChildren = [...stack.children];
  const myIdx    = stackChildren.indexOf(blockEl);
  const domAbove = stackChildren.filter((c,i) => i < myIdx && !c.classList.contains("b-done"));

  // 1. Hero attack animation
  animateHeroAttack();

  // 2. Spawn rock particles from block center
  spawnRockParticles(blockEl);

  // 3. Snapshot position for clone
  const rect    = blockEl.getBoundingClientRect();
  const appRect = appEl.getBoundingClientRect();

  // 4. Create shattering clone
  const clone = document.createElement("div");
  clone.className = "b-clone " + (blockEl.classList.contains("b-enemy") ? "b-enemy " : "b-item ") +
                    (blockEl.classList.contains("b-boss") ? "b-boss " : "") + "shatter";
  clone.style.cssText =
    "left:"   + (rect.left - appRect.left) + "px;" +
    "top:"    + (rect.top  - appRect.top)  + "px;" +
    "width:"  + rect.width  + "px;" +
    "height:" + rect.height + "px;" +
    "border-color:" + (blockEl.classList.contains("b-enemy") ? "rgba(239,68,68,.55)" : "rgba(96,165,250,.55)") + ";";
  clone.innerHTML = blockEl.innerHTML;
  appEl.appendChild(clone);
  clone.addEventListener("animationend", () => clone.remove());

  // 5. Collapse original
  blockEl.style.maxHeight = rect.height + "px";
  void blockEl.offsetHeight;
  blockEl.classList.add("b-collapsing");

  // 6. Settle blocks above
  setTimeout(() => {
    domAbove.forEach(b => {
      b.classList.add("b-settling");
      b.addEventListener("animationend", () => b.classList.remove("b-settling"), { once:true });
    });
  }, 100);

  // 7. Mark done
  setTimeout(() => {
    blockEl.classList.add("b-done");
    blockEl.classList.remove("b-collapsing", "b-removing");
    onDone();
  }, 480);
}

// ======================================================
// ROCK PARTICLES
// ======================================================
function spawnRockParticles(anchorEl){
  const rect    = anchorEl.getBoundingClientRect();
  const appRect = $("app").getBoundingClientRect();
  const cx = rect.left - appRect.left + rect.width  / 2;
  const cy = rect.top  - appRect.top  + rect.height / 2;
  const colors = ["#9ca3af","#6b7280","#d1d5db","#e5e7eb","#fbbf24"];
  for(let i = 0; i < 9; i++){
    const p = document.createElement("div");
    p.className = "rock-particle";
    const angle = (i / 9) * Math.PI * 2 + (Math.random() - .5) * .6;
    const dist  = 28 + Math.random() * 36;
    const size  = 4 + Math.random() * 5;
    p.style.cssText =
      "left:"       + (cx - size/2) + "px;" +
      "top:"        + (cy - size/2) + "px;" +
      "width:"      + size + "px;" +
      "height:"     + size + "px;" +
      "background:" + colors[Math.floor(Math.random()*colors.length)] + ";" +
      "--pdx:"      + (Math.cos(angle)*dist).toFixed(1) + "px;" +
      "--pdy:"      + (Math.sin(angle)*dist).toFixed(1) + "px;";
    $("app").appendChild(p);
    p.addEventListener("animationend", () => p.remove());
  }
}

// ======================================================
// HERO ANIMATIONS
// ======================================================
function animateHeroAttack(){
  _sfx.play('whoosh');
  const hero = $("hero");
  if(!hero) return;
  hero.classList.remove("hero-attacking");
  void hero.offsetWidth;
  hero.classList.add("hero-attacking");
  hero.addEventListener("animationend", () => hero.classList.remove("hero-attacking"), { once:true });
}

function updateHeroPosition(towerIdx, animate){
  const hero = $("hero");
  if(!hero) return;
  // Stand to the left of the current active tower (moves right as towers are cleared)
  const col = $("tcol-" + towerIdx);
  if(!col) return;
  const colRect  = col.getBoundingClientRect();
  const areaRect = $("gameArea").getBoundingClientRect();
  // Position hero so its right edge is ~4px from the active tower's left edge
  // 44px: hero is 40px wide + 4px gap before the tower's left edge
  const heroLeft = colRect.left - areaRect.left - 44;
  // 2px: minimum left offset to keep hero just inside the visible game area
  hero.style.left = Math.max(2, heroLeft) + "px";
  if(animate){
    hero.classList.remove("hero-stepping");
    void hero.offsetWidth;
    hero.classList.add("hero-stepping");
    hero.addEventListener("animationend", () => hero.classList.remove("hero-stepping"), { once:true });
  }
}

// ======================================================
// ITEM ABSORB: glow + shrink in place (crystal-style)
// ======================================================
function darumaAbsorb(blockEl, ti, fi, onDone){
  const stack    = $("tstack-" + ti);
  const myIdx    = [...stack.children].indexOf(blockEl);
  const domAbove = [...stack.children].filter((c,i) => i < myIdx && !c.classList.contains("b-done"));

  blockEl.classList.add("b-absorbing");

  setTimeout(() => {
    const rect = blockEl.getBoundingClientRect();
    blockEl.style.maxHeight = rect.height + "px";
    void blockEl.offsetHeight;
    blockEl.classList.add("b-collapsing");

    domAbove.forEach(b => {
      b.classList.add("b-settling");
      b.addEventListener("animationend", () => b.classList.remove("b-settling"), { once:true });
    });
  }, 380);

  setTimeout(() => {
    blockEl.classList.add("b-done");
    blockEl.classList.remove("b-absorbing", "b-collapsing", "b-removing");
    onDone();
  }, 660);
}

// ======================================================
// AFTER BLOCK REMOVED
// ======================================================
function afterRemove(ti, floor){
  updateProgress();
  if(floor.type === "enemy") { gs.totalDefeated++; _sfx.play('hit'); }

  if(floor.isBoss){
    _sfx.play('success');
    setTimeout(() => showClear(), 600);
    return;
  }

  // Check if all floors of THIS tower are done
  const tower   = TOWERS[ti];
  const allDone = tower.floors.every(f => gs.floorsDone.includes(ti + "-" + f.id));
  if(allDone){
    checkTowerAdvance();
  }
}

// ======================================================
// CHECK TOWER ADVANCE
// ======================================================
function checkTowerAdvance(){
  if(gs.towerIndex >= TOWERS.length - 1) return;
  gs.towerIndex++;

  // Update current col label style
  const prevCol = $("tcol-" + (gs.towerIndex - 1));
  if(prevCol){ prevCol.className = "t-col t-done"; }

  const nextCol = $("tcol-" + gs.towerIndex);
  if(nextCol){
    nextCol.className = "t-col t-active";
    // Update label color
    const lbl = nextCol.querySelector(".t-label");
    if(lbl) lbl.style.color = "";

    // Unlock blocks in this tower
    const stack = $("tstack-" + gs.towerIndex);
    if(stack){
      const tower = TOWERS[gs.towerIndex];
      [...stack.querySelectorAll(".b")].forEach((bEl, idx) => {
        const fl = tower.floors[idx];
        bEl.classList.remove("b-locked");
        const t = gs.towerIndex;
        const f = fl;
        bEl.addEventListener("click",    ()    => onBlockTap(t, f.id, bEl, f));
        bEl.addEventListener("touchend", (ev)  => { ev.preventDefault(); onBlockTap(t, f.id, bEl, f); });
      });
    }

    // Add active indicator
    const ind = document.createElement("div");
    ind.className = "t-active-indicator";
    ind.textContent = "▲ NOW";
    nextCol.appendChild(ind);
  }

  // Remove old active indicator from previous column
  const oldInd = document.querySelector("#tcol-" + (gs.towerIndex - 1) + " .t-active-indicator");
  if(oldInd) oldInd.remove();

  gs.combo = 0;
  showTowerFlash(TOWERS[gs.towerIndex].name);
  updateHeroPosition(gs.towerIndex, true);
}

// ======================================================
// POWER DISPLAY
// ======================================================
function updatePowerDisplay(){
  const el = $("powerValue");
  el.textContent = gs.power.toLocaleString();
  el.classList.remove("power-up");
  void el.offsetWidth;
  el.classList.add("power-up");
}

function updateProgress(){
  $("progressLabel").textContent = gs.defeatedEnemies + " / " + TOTAL_ENEMIES + " 撃破";
}

// ======================================================
// FLOATING TEXT + CLASH
// ======================================================
function spawnFloat(anchorEl, text, color){
  const rect    = anchorEl.getBoundingClientRect();
  const appRect = $("app").getBoundingClientRect();
  const ft = document.createElement("div");
  ft.className   = "float-text";
  ft.textContent = text;
  ft.style.color = color;
  ft.style.left  = (rect.left - appRect.left + rect.width  / 2 - 20) + "px";
  ft.style.top   = (rect.top  - appRect.top  + rect.height / 2 - 10) + "px";
  $("app").appendChild(ft);
  ft.addEventListener("animationend", () => ft.remove());
}

function spawnClash(anchorEl){
  const rect    = anchorEl.getBoundingClientRect();
  const appRect = $("app").getBoundingClientRect();
  const cl = document.createElement("div");
  cl.className   = "clash-effect";
  cl.textContent = "⚔️";
  cl.style.left  = (rect.left - appRect.left + rect.width  / 2 - 15) + "px";
  cl.style.top   = (rect.top  - appRect.top  + rect.height / 2 - 15) + "px";
  $("app").appendChild(cl);
  cl.addEventListener("animationend", () => cl.remove());
}

// ======================================================
// COMBO BADGE
// ======================================================
function showComboBadge(anchorEl, count){
  const rect    = anchorEl.getBoundingClientRect();
  const appRect = $("app").getBoundingClientRect();
  const badge   = document.createElement("div");
  badge.className = "combo-badge";
  let label = count + " COMBO!";
  if(count >= 7) label = "🔥 " + count + " FEVER!!";
  else if(count >= 5) label = "⚡ " + count + " GREAT!";
  else if(count >= 3) label = "✨ " + count + " COMBO!";
  badge.textContent = label;
  badge.style.left = (rect.left - appRect.left + rect.width / 2 - 40) + "px";
  badge.style.top  = (rect.top  - appRect.top  - 10) + "px";
  $("app").appendChild(badge);
  badge.addEventListener("animationend", () => badge.remove());
}

// CRITICAL FLASH
// ======================================================
function showCritical(){

  ov.className = "critical-overlay";
  const txt = document.createElement("div");
  txt.className = "critical-text";

// ======================================================
// JACKPOT BURST
// ======================================================
function showJackpot(bonus){
  const ov  = document.createElement("div");
  ov.className = "jackpot-overlay";
  const txt = document.createElement("div");
  txt.className = "jackpot-text";
  txt.textContent = "JACKPOT!!";
  const sub = document.createElement("div");
  sub.className = "jackpot-sub";
  sub.textContent = "ボーナス +" + bonus + " パワー獲得！";
  ov.appendChild(txt);
  ov.appendChild(sub);
  // rain particles
  const emojis = ["⭐","💫","✨","🌟","💎","🪙"];
  const appRect = $("app").getBoundingClientRect();
  for(let i = 0; i < 14; i++){
    const p = document.createElement("div");
    p.className = "jackpot-particle";
    const angle = (i / 14) * Math.PI * 2;
    const dist  = 80 + Math.random() * 100;
    p.style.cssText =
      "left:" + (375/2 + Math.cos(angle)*30) + "px;" +
      "top:"  + (667/2 + Math.sin(angle)*30) + "px;" +
      "--jdx:" + (Math.cos(angle)*dist).toFixed(0)+"px;" +
      "--jdy:" + (Math.sin(angle)*dist).toFixed(0)+"px;" +
      "animation-delay:" + (Math.random()*.2).toFixed(2) + "s;";
    p.textContent = emojis[Math.floor(Math.random()*emojis.length)];
    ov.appendChild(p);
  }
  $("app").appendChild(ov);
  ov.addEventListener("animationend", () => { if(ov.parentNode) ov.remove(); }, { once:true });
}

// ======================================================
// CALC LOG
// ======================================================
function pushCalcToken(label, cls){
  gs.calcTokens.push({ label, cls });
  renderCalcLog();
}
function renderCalcLog(){
  const log = $("calcLog");
  log.innerHTML = "";
  gs.calcTokens.forEach(t => {
    const span = document.createElement("span");
    span.className   = "calc-token " + t.cls;
    span.textContent = t.label;
    log.appendChild(span);
  });
  // If content overflows the container, reset to show only the last result on the left
  if(log.scrollWidth > log.clientWidth){
    const lastResult = [...gs.calcTokens].reverse().find(t => t.cls === "result");
    gs.calcTokens = lastResult ? [lastResult] : [];
    log.innerHTML = "";
    if(lastResult){
      const span = document.createElement("span");
      span.className   = "calc-token " + lastResult.cls;
      span.textContent = lastResult.label;
      log.appendChild(span);
    }
  }
}

// ======================================================
// TOWER ADVANCE FLASH
// ======================================================
function showTowerFlash(name){
  const el = document.createElement("div");
  el.style.cssText =
    "position:absolute;inset:0;display:flex;align-items:center;justify-content:center;" +
    "z-index:180;pointer-events:none;background:rgba(0,0,0,.35);flex-direction:column;gap:8px;";
  el.innerHTML =
    "<div style='font-size:13px;color:#a78bfa;letter-spacing:.14em;'>TOWER ADVANCE</div>" +
    "<div style='font-size:24px;font-weight:900;color:#fde68a;'>" + name + "</div>";
  $("app").appendChild(el);
  el.animate(
    [
      {opacity:0,transform:"scale(.8)"},
      {opacity:1,transform:"scale(1)"},
      {opacity:1,transform:"scale(1)"},
      {opacity:0,transform:"scale(1.08)"}
    ],
    {duration:1600, easing:"ease"}
  ).onfinish = () => el.remove();
}

// ======================================================
// GAME OVER / CLEAR
// ======================================================
function showGameover(floor){
  _sfx.play('gameover');
  $("gameoverDesc").innerHTML =
    "<strong>" + floor.name + "</strong>（力：" + floor.value.toLocaleString() + "）に負けた！<br>" +
    "あなたの力 " + gs.power.toLocaleString() + " では届かなかった…<br>順番を変えれば勝てるかも！";
  $("gameoverStats").innerHTML =
    "現在の力：" + gs.power.toLocaleString() + "<br>倒した敵：" + gs.defeatedEnemies + "体<br>行動回数：" + gs.turnsTotal + "回";
  const ov = $("transOverlay");
  ov.style.transition = "opacity .4s";
  ov.style.opacity = "1";
  ov.style.pointerEvents = "all";
  setTimeout(() => {
    $("gameScreen").style.display    = "none";
    $("gameoverScreen").style.display = "flex";
    ov.style.opacity       = "0";
    ov.style.pointerEvents = "none";
  }, 430);
}

function showClear(){
  // Read actual boss value using the isBoss flag (robust against floor reordering)
  const bossTower = TOWERS[TOWERS.length - 1];
  const bossFloor = bossTower.floors.find(f => f.isBoss);
  const bossVal   = bossFloor ? bossFloor.value : 0;
  const diff    = gs.power - bossVal;
  const isLastStage = gs.stage >= MAX_STAGES;
  const nextStage   = gs.stage + 1;
  // Preview next stage boss using the correct tower factory
  let nextBossVal = 0;
  if(!isLastStage){
    const nextTowers   = gs.hardMode ? makeHardTowers(nextStage) : makeTowers(nextStage);
    const nextBossFlr  = nextTowers[nextTowers.length - 1].floors.find(f => f.isBoss);
    nextBossVal        = nextBossFlr ? nextBossFlr.value : 0;
  }

  $("clearTitle").textContent    = isLastStage ? "🏆 ALL CLEAR!" : "STAGE " + gs.stage + " CLEAR!";
  $("clearDesc").innerHTML       = isLastStage
    ? "全ステージを制覇した！<br>真の勇者の称号を得た！"
    : "ステージ " + gs.stage + " の魔王を倒した！<br>" +
      (gs.hardMode
        ? "次の魔王の力は <strong style='color:#f87171'>" + nextBossVal.toLocaleString() + "</strong>！<br><span style='color:#fca5a5;font-size:12px'>⚡ ハードモード：次ステージは力10でスタート！</span>"
        : "次の魔王の力は <strong style='color:#f87171'>" + nextBossVal.toLocaleString() + "</strong>！<br>引き継いだ力で挑め！");
  $("clearStats").innerHTML =
    "パワー：" + gs.power.toLocaleString() + "<br>ステージ：" + gs.stage + "<br>撃破数：" + gs.defeatedEnemies + "体（累計：" + gs.totalDefeated + "体）<br>行動回数：" + gs.turnsTotal + "回<br>" +
    "魔王の力：" + bossVal.toLocaleString() + "　vs　あなた：" + gs.power.toLocaleString() + "（差：" + (diff >= 0 ? "+" : "") + diff.toLocaleString() + "）";
  $("clearNextBtn").textContent  = isLastStage ? "もう一度挑戦" : "ステージ " + nextStage + " へ進む！";
  $("clearNextBtn").onclick      = isLastStage ? restartGame : () => advanceStage(nextStage);

  const ov = $("transOverlay");
  ov.style.transition = "opacity .4s";
  ov.style.opacity = "1";
  ov.style.pointerEvents = "all";
  setTimeout(() => {
    $("gameScreen").style.display  = "none";
    $("clearScreen").style.display = "flex";
    ov.style.opacity       = "0";
    ov.style.pointerEvents = "none";
  }, 430);
}

// ======================================================
// ADVANCE TO NEXT STAGE
// Hard mode: reset power to 10 (each stage is an independent puzzle).
// Normal mode: carry power forward.
// ======================================================
function advanceStage(newStage){
  const hardMode   = gs.hardMode;
  const carryPower = hardMode ? 10 : gs.power;
  const carryTotal = gs.totalDefeated;

  TOWERS        = hardMode ? makeHardTowers(newStage) : makeTowers(newStage);
  TOTAL_ENEMIES = TOWERS.reduce((s,t) => s + t.floors.filter(f => f.type==="enemy").length, 0);

  gs = {
    phase:"PLAY",
    stage:newStage,
    power:carryPower,
    towerIndex:0,
    floorsDone:[],
    calcTokens:[{label:carryPower.toLocaleString(), cls:"num"}],
    turnsTotal:0,
    defeatedEnemies:0,
    totalDefeated:carryTotal,
    combo:0,
    hardMode,
  };

  const ov = $("transOverlay");
  ov.style.transition = "opacity .3s";
  ov.style.opacity = "1";
  ov.style.pointerEvents = "all";
  setTimeout(() => {
    $("clearScreen").style.display = "none";
    $("gameScreen").style.display  = "flex";
    setStageLabel(newStage, hardMode);
    updatePowerDisplay();
    buildAllTowers();
    renderCalcLog();
    ov.style.opacity       = "0";
    ov.style.pointerEvents = "none";
  }, 360);
}

// ======================================================
// SET STAGE LABEL (safe DOM, no innerHTML with variables)
// ======================================================
function setStageLabel(stageNum, hardMode){
  const el = $("stageLabel");
  el.textContent = "STAGE " + stageNum;
  if(hardMode){
    const badge = document.createElement("span");
    badge.className = "hard-badge";
    badge.textContent = "HARD";
    el.appendChild(badge);
  }
}

// ======================================================
// START / RESTART
// ======================================================
function startGame(){
  _sfx.play('click');
  const hardMode = (selectedDifficulty === 'hard');
  TOWERS        = hardMode ? makeHardTowers(1) : makeTowers(1);
  TOTAL_ENEMIES = TOWERS.reduce((s,t) => s + t.floors.filter(f => f.type==="enemy").length, 0);
  gs = {
    phase:"PLAY", stage:1, power:10, towerIndex:0, floorsDone:[],
    calcTokens:[{label:"10", cls:"num"}], turnsTotal:0, defeatedEnemies:0, totalDefeated:0, combo:0,
    hardMode,
  };
  const ov = $("transOverlay");
  ov.style.transition = "opacity .3s";
  ov.style.opacity = "1";
  ov.style.pointerEvents = "all";
  setTimeout(() => {
    $("titleScreen").style.display    = "none";
    $("clearScreen").style.display    = "none";
    $("gameoverScreen").style.display = "none";
    $("gameScreen").style.display     = "flex";
    setStageLabel(1, hardMode);
    updatePowerDisplay();
    buildAllTowers();
    renderCalcLog();
    ov.style.opacity       = "0";
    ov.style.pointerEvents = "none";
  }, 360);
}
function restartGame(){ startGame(); }
