<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Treasure chest -->
  <!-- Shadow -->
  <rect x="8" y="37" width="48" height="22" rx="4" fill="#3e2723" transform="translate(1,2)"/>
  <!-- Bottom body -->
  <rect x="8" y="36" width="48" height="22" rx="4" fill="#5d4037"/>
  <!-- Bottom face -->
  <rect x="10" y="38" width="44" height="18" rx="3" fill="#795548"/>
  <!-- Metal bands on bottom -->
  <rect x="8" y="38" width="48" height="4" fill="#ffa726"/>
  <rect x="8" y="52" width="48" height="4" fill="#ffa726"/>
  <!-- Lid -->
  <rect x="8" y="24" width="48" height="16" rx="4" fill="#6d4c41"/>
  <path d="M8,28 Q8,16 32,16 Q56,16 56,28 L56,40 L8,40 Z" fill="#8d6e63"/>
  <!-- Lid face -->
  <path d="M10,29 Q10,19 32,19 Q54,19 54,29 L54,38 L10,38 Z" fill="#a1887f"/>
  <!-- Metal band on lid -->
  <rect x="8" y="36" width="48" height="4" fill="#ffa726"/>
  <!-- Metal corners -->
  <rect x="8" y="36" width="10" height="10" rx="2" fill="#ff8f00"/>
  <rect x="46" y="36" width="10" height="10" rx="2" fill="#ff8f00"/>
  <rect x="8" y="20" width="10" height="20" rx="2" fill="#ff8f00" opacity="0.5"/>
  <rect x="46" y="20" width="10" height="20" rx="2" fill="#ff8f00" opacity="0.5"/>
  <!-- Keyhole -->
  <circle cx="32" cy="40" r="5" fill="#ffa726"/>
  <circle cx="32" cy="39" r="3.5" fill="#37474f"/>
  <rect x="30" y="41" width="4" height="5" rx="1" fill="#37474f"/>
  <!-- Gold coins spilling out -->
  <ellipse cx="22" cy="59" rx="5" ry="3" fill="#fdd835"/>
  <ellipse cx="32" cy="60" rx="5" ry="3" fill="#fdd835"/>
  <ellipse cx="42" cy="59" rx="5" ry="3" fill="#fdd835"/>
  <!-- Shine on lid -->
  <path d="M16,22 Q18,18 26,17" stroke="#fff" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.4"/>
</svg>
