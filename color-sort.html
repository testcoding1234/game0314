<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>カラーソート</title>
<style>
/* === RESET & BASE === */
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none;}
html,body{width:100%;height:100%;background:#040e1a;display:flex;align-items:center;justify-content:center;overflow:hidden;}
#app{position:relative;width:375px;height:667px;overflow:hidden;background:linear-gradient(180deg,#050f1c 0%,#091823 55%,#0d1f2e 100%);font-family:system-ui,-apple-system,sans-serif;color:#e2e8f0;display:flex;flex-direction:column;}

/* === HEADER === */
#header{height:52px;display:flex;align-items:center;justify-content:space-between;padding:0 12px;background:rgba(2,8,18,.92);border-bottom:1px solid rgba(100,200,255,.18);flex-shrink:0;}
#header-left{display:flex;flex-direction:column;gap:2px;}
#level-label{font-size:16px;font-weight:900;color:#7dd3fc;letter-spacing:.04em;}
#move-label{font-size:10px;color:#3d6070;}
#header-right{display:flex;gap:6px;align-items:center;}
.hdr-btn{background:rgba(8,24,44,.85);border:1px solid rgba(100,180,255,.22);color:#7dd3fc;font-size:10px;font-weight:700;padding:4px 8px;border-radius:6px;cursor:pointer;}
.hdr-btn:active{opacity:.7;}
#home-btn{font-size:14px;padding:4px 7px;}

/* === GAME AREA === */
#game-area{flex:1;display:flex;align-items:center;justify-content:center;padding:4px 6px 0;}
#tubes-wrap{
  display:grid;
  gap:9px 7px;
  justify-content:center;
  align-items:end;
}

/* === TUBE (glass bottle) === */
.tube-outer{display:flex;flex-direction:column;align-items:center;cursor:pointer;}
.tube{
  width:40px;
  border:2px solid rgba(160,220,255,.38);
  border-top:none;
  border-radius:0 0 20px 20px;
  /* glass-tinted interior */
  background:linear-gradient(180deg,rgba(4,16,32,.15) 0%,rgba(4,16,32,.35) 100%);
  display:flex;
  flex-direction:column-reverse;
  align-items:stretch;
  overflow:hidden;
  position:relative;
  transition:border-color .15s, transform .2s cubic-bezier(.34,1.56,.64,1), box-shadow .15s;
  box-shadow:
    inset -3px 0 5px rgba(255,255,255,.04),
    inset  2px 0 3px rgba(0,0,0,.22),
    0 4px 16px rgba(0,0,0,.55);
}
/* Left-wall glass shine */
.tube::before{
  content:'';
  position:absolute;
  top:0;left:3px;bottom:0;width:3px;
  background:linear-gradient(180deg,rgba(255,255,255,.2) 0%,rgba(255,255,255,.03) 100%);
  pointer-events:none;z-index:20;
}
/* Right-wall subtle shadow */
.tube::after{
  content:'';
  position:absolute;
  top:0;right:3px;bottom:0;width:3px;
  background:linear-gradient(180deg,rgba(0,0,0,.12) 0%,rgba(0,0,0,.04) 100%);
  pointer-events:none;z-index:20;
}
.tube.selected{
  border-color:rgba(110,215,255,.95);
  transform:translateY(-10px);
  box-shadow:0 0 22px rgba(90,200,255,.55),inset -3px 0 5px rgba(255,255,255,.06);
}
.tube.can-receive{
  border-color:rgba(70,220,130,.95);
  box-shadow:0 0 14px rgba(60,210,120,.45);
}
.tube.done{
  border-color:rgba(255,205,50,.9);
  box-shadow:0 0 18px rgba(255,195,40,.55);
}
.tube.shake{animation:shake .35s ease;}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}

/* === LIQUID CELLS === */
.color-cell{
  width:100%;
  position:relative;
  overflow:hidden;
  /* background gradient set via JS */
}
/* Bottom cell rounded corners */
.color-cell.liquid-bottom{border-radius:0 0 16px 16px;}

/* === BOTTOM BAR === */
#bottom-bar{height:54px;display:flex;align-items:center;justify-content:center;gap:12px;background:rgba(2,8,18,.9);border-top:1px solid rgba(100,200,255,.1);flex-shrink:0;padding:0 12px;}
#hint-btn{background:linear-gradient(135deg,#f59e0b,#d97706);color:#fff;font-size:12px;font-weight:800;padding:8px 18px;border-radius:16px;border:none;cursor:pointer;box-shadow:0 3px 10px rgba(245,158,11,.3);}
#hint-btn:active{transform:scale(.96);}
#hint-count{font-size:11px;color:#c07010;font-weight:700;}

/* === OVERLAYS === */
.overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;background:rgba(2,8,20,.86);backdrop-filter:blur(5px);z-index:50;}
.overlay h2{font-size:25px;font-weight:900;color:#7dd3fc;text-align:center;line-height:1.3;}
.overlay p{font-size:13px;color:#5a8298;text-align:center;max-width:260px;line-height:1.7;}
.big-btn{background:linear-gradient(135deg,#3b82f6,#1d4ed8);color:#fff;font-size:14px;font-weight:800;padding:11px 32px;border-radius:20px;border:none;cursor:pointer;box-shadow:0 4px 14px rgba(59,130,246,.4);}
.big-btn:active{transform:scale(.96);}
.big-btn.green{background:linear-gradient(135deg,#22c55e,#16a34a);box-shadow:0 4px 14px rgba(34,197,94,.4);}

/* === WATER DROP (flying liquid) === */
.water-drop{
  position:absolute;
  border-radius:50%;
  pointer-events:none;
  z-index:200;
  /* background set via JS */
  box-shadow:
    inset  3px  3px 6px rgba(255,255,255,.38),
    inset -2px -2px 4px rgba(0,0,0,.28),
    0 3px 12px rgba(0,0,0,.45);
}
/* === WATER SPLASH RING === */
.water-splash{
  position:absolute;
  pointer-events:none;
  z-index:199;
  border-radius:50%;
  transform:translate(-50%,-50%) scale(0);
  opacity:.7;
  animation:splash-ring .42s ease-out forwards;
}
@keyframes splash-ring{
  0%  {transform:translate(-50%,-50%) scale(.15);opacity:.85;}
  55% {transform:translate(-50%,-50%) scale(1.7); opacity:.3;}
  100%{transform:translate(-50%,-50%) scale(2.3); opacity:0;}
}

/* === CLEAR PARTICLES === */
#star-burst{position:absolute;inset:0;pointer-events:none;z-index:48;}
.star-particle{position:absolute;font-size:20px;animation:star-fly .9s ease-out forwards;}
@keyframes star-fly{0%{opacity:1;transform:translate(0,0) scale(1);}100%{opacity:0;transform:translate(var(--dx),var(--dy)) scale(.15);}}

/* === HINT FLASH === */
@keyframes flash-border{0%,100%{border-color:rgba(160,220,255,.38);}50%{border-color:#facc15;}}

/* === TUBE COMPLETE ANIMATION === */
@keyframes tube-complete-bounce{
  0%  {transform:translateY(0) scale(1);}
  20% {transform:translateY(-14px) scale(1.08);}
  45% {transform:translateY(-4px)  scale(1.03);}
  65% {transform:translateY(-9px)  scale(1.06);}
  82% {transform:translateY(-2px)  scale(1.01);}
  100%{transform:translateY(0) scale(1);}
}
.tube.tube-complete-anim{
  animation:tube-complete-bounce .7s ease forwards !important;
  border-color:rgba(255,215,0,.95) !important;
  box-shadow:0 0 28px rgba(255,215,0,.75),0 0 55px rgba(255,215,0,.35) !important;
}
</style>
</head>
<body>
<div id="app">

  <!-- Header -->
  <div id="header">
    <div id="header-left">
      <div id="level-label"><img src="assets/images/tube.svg" width="16" height="16" alt="🧪" style="vertical-align:middle;margin-right:3px;"> レベル <span id="lv-num">1</span></div>
      <div id="move-label">手数: <span id="move-num">0</span></div>
    </div>
    <div id="header-right">
      <div class="hdr-btn" id="undo-btn">↩ 戻す</div>
      <div class="hdr-btn" id="restart-btn">↺ リセット</div>
      <div class="hdr-btn" id="home-btn" onclick="location.href='index.html'">🏠</div>
    </div>
  </div>

  <!-- Tubes area -->
  <div id="game-area">
    <div id="tubes-wrap"></div>
  </div>

  <!-- Bottom bar -->
  <div id="bottom-bar">
    <button id="hint-btn">💡 ヒント</button>
    <div id="hint-count">残り <span id="hint-left">3</span> 回</div>
  </div>

  <!-- Clear particles -->
  <div id="star-burst"></div>

  <!-- Start overlay -->
  <div class="overlay" id="start-overlay">
    <div style="font-size:50px"><img src="assets/images/tube.svg" width="50" height="50" alt="🧪"></div>
    <h2>カラーソート</h2>
    <p>試験管の液体を揃えよう！<br>試験管をタップして<br>液体を移動させてね。</p>
    <button class="big-btn green" onclick="startGame()">▶ スタート</button>
  </div>

  <!-- Clear overlay -->
  <div class="overlay" id="clear-overlay" style="display:none;">
    <div id="clear-overlay-inner"></div>
  </div>

</div>
<script>
'use strict';

/* ============================================================
   COLORS — 10 water-like entries (light / hex / dark)
   ============================================================ */
const COLORS = [
  { id:'R', hex:'#ef4444', light:'#fca5a5', dark:'#991b1b', name:'赤'    },
  { id:'B', hex:'#3b82f6', light:'#93c5fd', dark:'#1e3a8a', name:'青'    },
  { id:'G', hex:'#22c55e', light:'#86efac', dark:'#14532d', name:'緑'    },
  { id:'Y', hex:'#eab308', light:'#fde047', dark:'#713f12', name:'黄'    },
  { id:'P', hex:'#a855f7', light:'#d8b4fe', dark:'#581c87', name:'紫'    },
  { id:'O', hex:'#f97316', light:'#fdba74', dark:'#7c2d12', name:'橙'    },
  { id:'K', hex:'#ec4899', light:'#f9a8d4', dark:'#831843', name:'ピンク'},
  { id:'C', hex:'#06b6d4', light:'#67e8f9', dark:'#164e63', name:'水色'  },
  { id:'L', hex:'#84cc16', light:'#bef264', dark:'#365314', name:'黄緑'  },
  { id:'N', hex:'#6366f1', light:'#a5b4fc', dark:'#312e81', name:'藍'    },
];

const COLOR_BY_ID = {};
COLORS.forEach(c => { COLOR_BY_ID[c.id] = c; });

/* hex (#rrggbb) + alpha (0–1) → rgba string */
function hexToRgba(hex, a) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}

/* Flat matte color for a liquid layer (no gradient) */
function liquidGrad(c) {
  return hexToRgba(c.hex, .92);
}

/* Radial gradient for the flying water drop */
function dropGrad(c) {
  return `radial-gradient(circle at 34% 28%,
    ${hexToRgba(c.light, .96)},
    ${hexToRgba(c.hex,   .90)},
    ${hexToRgba(c.dark,  .84)})`;
}

/* ============================================================
   CONSTANTS
   ============================================================ */
const TUBE_CAP          = 4;   // cells per tube
const CELL_H            = 30;  // px per liquid cell
const NUM_COLORS        = 10;  // always use all 10 colors
const EXTRA_TUBES       = 2;   // empty tubes → 12 total
const SHUFFLE_FACTOR    = 10;  // shuffle iterations multiplier
const MAX_UNDO          = 30;
const STAR3_MULT        = 2;
const STAR2_MULT        = 4;
// Tube has +4 px of empty space at top (above the liquid area) due to tubeVisH rounding
const TUBE_TOP_OFFSET   = 4;
// Water-drop animation thresholds
const DROP_SPLASH_START = 0.82; // t value when pulsation switches to splash expansion
const DROP_PULSE_AMP    = 0.07; // amplitude of in-flight pulsation
const DROP_PULSE_FREQ   = 3.5;  // frequency (in π units) of in-flight pulsation
const DROP_SPLASH_SCALE = 2.8;  // scale growth rate during splash

/* ============================================================
   LEVEL CONFIG
   ============================================================ */
function getLevelConfig(lv) {
  // Always 10 colors + 2 empty = 12 tubes.
  // Difficulty increases via more shuffle iterations.
  return { numColors: NUM_COLORS, extras: EXTRA_TUBES };
}

/* ============================================================
   GAME STATE
   ============================================================ */
let gs = {
  level:       1,
  tubes:       [],
  selected:    -1,
  moves:       0,
  hints:       3,
  history:     [],
  initialTubes:[],
  animating:   false,
  doneTubes:   new Set(),
};

/* ============================================================
   LEVEL GENERATION
   ============================================================ */
function generateLevel(lv) {
  const { numColors, extras } = getLevelConfig(lv);
  const ids = COLORS.slice(0, numColors).map(c => c.id);
  const all = [
    ...ids.map(id => Array(TUBE_CAP).fill(id)),
    ...Array.from({length: extras}, () => []),
  ];
  // More iterations for higher levels
  const iters = numColors * TUBE_CAP * (SHUFFLE_FACTOR + Math.floor(lv / 2));
  for (let i = 0; i < iters; i++) {
    const srcs = all.map((t,i) => t.length > 0 ? i : -1).filter(x => x >= 0);
    if (!srcs.length) break;
    const si = srcs[Math.floor(Math.random() * srcs.length)];
    const dsts = all.map((t,j) => (j !== si && t.length < TUBE_CAP) ? j : -1).filter(x => x >= 0);
    if (!dsts.length) continue;
    const di = dsts[Math.floor(Math.random() * dsts.length)];
    all[di].push(all[si].pop());
  }
  return all;
}

/* ============================================================
   WIN CHECK
   ============================================================ */
function isTubeDone(tube) {
  if (tube.length === 0)          return true;
  if (tube.length !== TUBE_CAP)   return false;
  return tube.every(c => c === tube[0]);
}
function isWon() { return gs.tubes.every(isTubeDone); }

/* ============================================================
   MOVE LOGIC
   ============================================================ */
/* How many consecutive same-color cells sit at the top of a tube */
function topRunLength(tube) {
  if (!tube.length) return 0;
  const top = tube[tube.length - 1];
  let n = 0;
  for (let i = tube.length - 1; i >= 0 && tube[i] === top; i--) n++;
  return n;
}

function canMoveTo(from, to) {
  const f = gs.tubes[from], t = gs.tubes[to];
  if (!f.length)          return false; // src empty
  const count = topRunLength(f);
  return t.length + count <= TUBE_CAP;  // any color welcome, just needs space
}

function undoMove() {
  if (!gs.history.length || gs.animating) return;
  gs.tubes    = gs.history.pop();
  gs.moves    = Math.max(0, gs.moves - 1);
  gs.selected = -1;
  // Recalculate which tubes are already done so we don't re-celebrate them
  gs.doneTubes = new Set();
  gs.tubes.forEach((tube, i) => { if (isTubeDone(tube) && tube.length > 0) gs.doneTubes.add(i); });
  renderTubes();
  updateHeader();
}

/* ============================================================
   RENDER
   ============================================================ */
function tubeVisH() { return TUBE_CAP * CELL_H + 4; }

function renderTubes() {
  const wrap = document.getElementById('tubes-wrap');
  wrap.innerHTML = '';

  const n    = gs.tubes.length;
  const cols = n <= 6 ? n : Math.ceil(n / 2);
  wrap.style.gridTemplateColumns = `repeat(${cols}, 40px)`;

  for (let i = 0; i < n; i++) {
    const tube  = gs.tubes[i];
    const outer = document.createElement('div');
    outer.className   = 'tube-outer';
    outer.dataset.idx = i;

    const tubeEl = document.createElement('div');
    tubeEl.className   = 'tube';
    tubeEl.dataset.idx = i;
    tubeEl.style.height = tubeVisH() + 'px';

    if (i === gs.selected)                                    tubeEl.classList.add('selected');
    if (gs.selected >= 0 && i !== gs.selected && canMoveTo(gs.selected, i))
                                                              tubeEl.classList.add('can-receive');
    if (isTubeDone(tube) && tube.length > 0)                 tubeEl.classList.add('done');

    for (let j = 0; j < tube.length; j++) {
      const c    = COLOR_BY_ID[tube[j]];
      const cell = document.createElement('div');
      cell.className  = 'color-cell';
      cell.style.height     = CELL_H + 'px';
      cell.style.background = liquidGrad(c);
      if (j === tube.length - 1) cell.classList.add('liquid-top');
      if (j === 0)               cell.classList.add('liquid-bottom');
      tubeEl.appendChild(cell);
    }

    outer.appendChild(tubeEl);
    outer.addEventListener('click', () => onTubeTap(i));
    wrap.appendChild(outer);
  }
}

function updateHeader() {
  document.getElementById('lv-num').textContent    = gs.level;
  document.getElementById('move-num').textContent  = gs.moves;
  document.getElementById('hint-left').textContent = gs.hints;
}

/* ============================================================
   WATER DROP ANIMATION
   ============================================================ */
function playWaterDrop(colorId, sx, sy, ex, ey, count, onDone) {
  const c        = COLOR_BY_ID[colorId];
  const dropSize = Math.min(26 + (count - 1) * 9, 52);
  const drop = document.createElement('div');
  drop.className    = 'water-drop';
  drop.style.width  = dropSize + 'px';
  drop.style.height = dropSize + 'px';
  drop.style.background = dropGrad(c);
  drop.style.left = sx + 'px';
  drop.style.top  = sy + 'px';
  drop.style.transform = 'translate(-50%,-50%)';
  if (count > 1) {
    drop.style.display        = 'flex';
    drop.style.alignItems     = 'center';
    drop.style.justifyContent = 'center';
    drop.style.fontSize       = '13px';
    drop.style.fontWeight     = '900';
    drop.style.color          = 'rgba(255,255,255,.92)';
    drop.textContent = count;
  }
  document.getElementById('app').appendChild(drop);

  const DURATION = 400; // ms
  const t0 = performance.now();

  // Bezier control point: arc peak above both end-points
  const cpX = (sx + ex) / 2;
  const cpY = Math.min(sy, ey) - 68;

  function easeInOut(t) { return t < .5 ? 2*t*t : -1+(4-2*t)*t; }

  function frame(now) {
    const t = Math.min((now - t0) / DURATION, 1);
    const e = easeInOut(t);

    // Quadratic Bézier position
    const x = (1-e)*(1-e)*sx + 2*(1-e)*e*cpX + e*e*ex;
    const y = (1-e)*(1-e)*sy + 2*(1-e)*e*cpY + e*e*ey;

    // Pulsate in-flight → splash expansion at end
    const scale   = t < DROP_SPLASH_START
                    ? (1 + DROP_PULSE_AMP * Math.sin(t * Math.PI * DROP_PULSE_FREQ))
                    : 1 + (t - DROP_SPLASH_START) * DROP_SPLASH_SCALE;
    const opacity = t > .86 ? 1 - (t - .86) / .14 : 1;

    drop.style.left    = x + 'px';
    drop.style.top     = y + 'px';
    drop.style.transform = `translate(-50%,-50%) scale(${scale.toFixed(3)})`;
    drop.style.opacity   = opacity.toFixed(3);

    if (t < 1) {
      requestAnimationFrame(frame);
    } else {
      drop.remove();
      spawnSplash(ex, ey, c);
      onDone();
    }
  }
  requestAnimationFrame(frame);
}

function spawnSplash(x, y, c) {
  const el = document.createElement('div');
  el.className = 'water-splash';
  el.style.left       = x + 'px';
  el.style.top        = y + 'px';
  el.style.width      = '30px';
  el.style.height     = '30px';
  el.style.background = hexToRgba(c.hex, .55);
  document.getElementById('app').appendChild(el);
  setTimeout(() => el.remove(), 500);
}

/* ============================================================
   PER-TUBE COMPLETION
   ============================================================ */
function checkNewlyDone() {
  for (let i = 0; i < gs.tubes.length; i++) {
    const tube = gs.tubes[i];
    if (isTubeDone(tube) && tube.length > 0 && !gs.doneTubes.has(i)) {
      gs.doneTubes.add(i);
      celebrateTube(i);
    }
  }
}

function celebrateTube(idx) {
  _sfx.play('powerup');
  const tubeEl = document.querySelector(`.tube[data-idx="${idx}"]`);
  if (!tubeEl) return;
  tubeEl.classList.add('tube-complete-anim');
  setTimeout(() => tubeEl.classList.remove('tube-complete-anim'), 750);
  spawnTubeParticles(idx);
}

function spawnTubeParticles(idx) {
  const appEl  = document.getElementById('app');
  const appRect = appEl.getBoundingClientRect();
  const tubeEl = document.querySelector(`.tube[data-idx="${idx}"]`);
  if (!tubeEl) return;
  const rect = tubeEl.getBoundingClientRect();
  const cx   = rect.left - appRect.left + rect.width  / 2;
  const cy   = rect.top  - appRect.top  + rect.height / 2;
  const burst = document.getElementById('star-burst');
  const icons = ['✨','⭐','💫','🌟','🎉'];
  for (let i = 0; i < 10; i++) {
    const s = document.createElement('div');
    s.className = 'star-particle';
    const angle = Math.random() * Math.PI * 2;
    const dist  = 28 + Math.random() * 65;
    s.style.setProperty('--dx', Math.cos(angle) * dist + 'px');
    s.style.setProperty('--dy', Math.sin(angle) * dist + 'px');
    s.style.left           = cx + 'px';
    s.style.top            = cy + 'px';
    s.style.animationDelay = (Math.random() * .25) + 's';
    s.textContent = icons[Math.floor(Math.random() * icons.length)];
    burst.appendChild(s);
    setTimeout(() => s.remove(), 1300);
  }
}

/* ============================================================
   TAP HANDLER
   ============================================================ */
function onTubeTap(idx) {
  if (gs.animating) return;

  // ── Phase 1: nothing selected ─────────────────────────────
  if (gs.selected === -1) {
    if (!gs.tubes[idx].length) return;
    _sfx.play('click');
    gs.selected = idx;
    renderTubes();
    return;
  }

  // ── Phase 2: tapped same tube → deselect ─────────────────
  if (gs.selected === idx) {
    gs.selected = -1;
    renderTubes();
    return;
  }

  // ── Phase 3: valid move ───────────────────────────────────
  if (canMoveTo(gs.selected, idx)) {
    const fromIdx = gs.selected;
    const toIdx   = idx;

    // Capture DOM rects BEFORE any state change
    const appEl   = document.getElementById('app');
    const appRect = appEl.getBoundingClientRect();
    const srcEl   = document.querySelector(`.tube[data-idx="${fromIdx}"]`);
    const dstEl   = document.querySelector(`.tube[data-idx="${toIdx}"]`);
    const srcRect = srcEl.getBoundingClientRect();
    const dstRect = dstEl.getBoundingClientRect();

    const count   = topRunLength(gs.tubes[fromIdx]);
    const colorId = gs.tubes[fromIdx][gs.tubes[fromIdx].length - 1];
    const srcLen  = gs.tubes[fromIdx].length;
    const dstLen  = gs.tubes[toIdx].length;

    // Animation positions
    const sx = srcRect.left - appRect.left + srcRect.width / 2;
    const sy = srcRect.top  - appRect.top  + (TUBE_CAP - srcLen) * CELL_H + TUBE_TOP_OFFSET;
    const ex = dstRect.left - appRect.left + dstRect.width / 2;
    const ey = dstRect.top  - appRect.top  + (TUBE_CAP - dstLen - count) * CELL_H + TUBE_TOP_OFFSET;

    // Save history; remove group from source NOW
    gs.history.push(gs.tubes.map(t => [...t]));
    if (gs.history.length > MAX_UNDO) gs.history.shift();
    gs.tubes[fromIdx].splice(gs.tubes[fromIdx].length - count, count);
    gs.moves++;
    gs.selected = -1;

    // Re-render: source updated, destination NOT yet (ball still in flight)
    renderTubes();
    updateHeader();

    // Play water animation; destination updates only when animation ends
    gs.animating = true;
    playWaterDrop(colorId, sx, sy, ex, ey, count, () => {
      // Add group to destination after animation completes
      for (let i = 0; i < count; i++) gs.tubes[toIdx].push(colorId);
      gs.animating = false;
      renderTubes();
      checkNewlyDone();
      if (isWon()) setTimeout(showClear, 150);
    });

  // ── Phase 4: invalid move ─────────────────────────────────
  } else {
    const tubeEl = document.querySelector(`.tube[data-idx="${idx}"]`);
    if (tubeEl) {
      tubeEl.classList.add('shake');
      setTimeout(() => tubeEl.classList.remove('shake'), 400);
    }
    gs.selected = gs.tubes[idx].length > 0 ? idx : -1;
    renderTubes();
  }
}

/* ============================================================
   HINT
   ============================================================ */
function giveHint() {
  if (gs.hints <= 0 || gs.animating) return;
  for (let i = 0; i < gs.tubes.length; i++) {
    for (let j = 0; j < gs.tubes.length; j++) {
      if (i !== j && canMoveTo(i, j)) {
        gs.hints--;
        gs.selected = i;
        renderTubes();
        updateHeader();
        const destEl = document.querySelector(`.tube[data-idx="${j}"]`);
        if (destEl) {
          destEl.style.animation = 'flash-border .6s ease 2';
          setTimeout(() => { destEl.style.animation = ''; }, 1400);
        }
        return;
      }
    }
  }
}

/* ============================================================
   CLEAR
   ============================================================ */
function showClear() {
  _sfx.play('success');
  spawnWaterParticles();
  const overlay = document.getElementById('clear-overlay');
  const inner   = document.getElementById('clear-overlay-inner');
  const min     = getLevelConfig(gs.level).numColors * TUBE_CAP;
  const stars   = gs.moves <= min * STAR3_MULT ? '⭐⭐⭐' :
                  gs.moves <= min * STAR2_MULT ? '⭐⭐' : '⭐';
  inner.innerHTML = `
    <div style="font-size:50px;text-align:center">🎉</div>
    <div style="font-size:22px;font-weight:900;color:#7dd3fc;text-align:center;margin:8px 0">レベル ${gs.level} クリア！</div>
    <div style="font-size:26px;text-align:center;margin-bottom:4px">${stars}</div>
    <div style="font-size:11px;color:#5a8298;text-align:center;margin-bottom:16px">手数: ${gs.moves}</div>
    <div style="display:flex;gap:10px;justify-content:center">
      <button class="big-btn" onclick="restartLevel()">↺ もう一度</button>
      <button class="big-btn green" onclick="nextLevel()">次へ ▶</button>
    </div>
  `;
  overlay.style.display = 'flex';
}

function spawnWaterParticles() {
  const burst  = document.getElementById('star-burst');
  burst.innerHTML = '';
  const icons = ['💧','🔵','🟢','🟡','🟣','🟠','💜','💙','💚','💛'];
  for (let i = 0; i < 24; i++) {
    const s = document.createElement('div');
    s.className = 'star-particle';
    const angle = Math.random() * Math.PI * 2;
    const dist  = 70 + Math.random() * 170;
    s.style.setProperty('--dx', Math.cos(angle)*dist + 'px');
    s.style.setProperty('--dy', Math.sin(angle)*dist + 'px');
    s.style.left = '187px';
    s.style.top  = '300px';
    s.style.animationDelay = (Math.random() * .45) + 's';
    s.textContent = icons[Math.floor(Math.random() * icons.length)];
    burst.appendChild(s);
    setTimeout(() => s.remove(), 1600);
  }
}

/* ============================================================
   LEVEL CONTROL
   ============================================================ */
function startLevel(lv) {
  gs.level        = lv;
  gs.moves        = 0;
  gs.selected     = -1;
  gs.history      = [];
  gs.animating    = false;
  gs.hints        = 3;
  gs.doneTubes    = new Set();
  gs.tubes        = generateLevel(lv);
  gs.initialTubes = gs.tubes.map(t => [...t]);
  document.getElementById('clear-overlay').style.display = 'none';
  renderTubes();
  updateHeader();
}

function restartLevel() {
  if (gs.animating) return;
  gs.tubes    = gs.initialTubes.map(t => [...t]);
  gs.moves    = 0;
  gs.selected = -1;
  gs.history  = [];
  gs.doneTubes = new Set();
  document.getElementById('clear-overlay').style.display = 'none';
  renderTubes();
  updateHeader();
}

function nextLevel() { startLevel(gs.level + 1); }

function startGame() {
  document.getElementById('start-overlay').style.display = 'none';
  startLevel(1);
}

/* ============================================================
   BUTTON WIRING
   ============================================================ */
document.getElementById('undo-btn').addEventListener('click', undoMove);
document.getElementById('restart-btn').addEventListener('click', restartLevel);
document.getElementById('hint-btn').addEventListener('click', giveHint);

// ============================================================
// SOUND SYSTEM (Web Audio API)
// ============================================================
const _sfx = (() => {
  let ctx = null;
  const bufs = {};
  const SOUNDS = ['click','success','powerup'];

  function getCtx(){
    if(!ctx){
      try { ctx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e){}
    }
    return ctx;
  }

  function load(name){
    if(bufs[name] !== undefined) return;
    bufs[name] = null;
    const c = getCtx();
    if(!c) return;
    fetch('assets/sounds/' + name + '.wav')
      .then(r => r.arrayBuffer())
      .then(ab => c.decodeAudioData(ab))
      .then(buf => { bufs[name] = buf; })
      .catch(() => {});
  }

  function play(name){
    const c = getCtx();
    if(!c) return;
    if(c.state === 'suspended') c.resume();
    if(!bufs[name]) { load(name); return; }
    try {
      const src = c.createBufferSource();
      src.buffer = bufs[name];
      src.connect(c.destination);
      src.start(0);
    } catch(e){}
  }

  function preload(){ SOUNDS.forEach(load); }
  document.addEventListener('click',    preload, { once:true });
  document.addEventListener('touchend', preload, { once:true });

  return { play };
})();
</script>
