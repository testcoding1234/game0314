<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Sword pointing up-right -->
  <g transform="translate(32,32) rotate(-45) translate(-32,-32)">
    <!-- Blade -->
    <polygon points="32,4 36,42 32,46 28,42" fill="#cfd8dc"/>
    <polygon points="32,4 36,42 32,46" fill="#eceff1"/>
    <!-- Blade edge line -->
    <line x1="32" y1="5" x2="32" y2="42" stroke="#b0bec5" stroke-width="0.8"/>
    <!-- Crossguard -->
    <rect x="20" y="42" width="24" height="6" rx="3" fill="#f9a825"/>
    <circle cx="20" cy="45" r="3.5" fill="#f9a825"/>
    <circle cx="44" cy="45" r="3.5" fill="#f9a825"/>
    <circle cx="20" cy="45" r="2" fill="#fdd835"/>
    <circle cx="44" cy="45" r="2" fill="#fdd835"/>
    <!-- Handle/Grip -->
    <rect x="29" y="48" width="6" height="11" rx="2" fill="#6d4c41"/>
    <!-- Grip wrap lines -->
    <line x1="29" y1="51" x2="35" y2="51" stroke="#8d6e63" stroke-width="1"/>
    <line x1="29" y1="54" x2="35" y2="54" stroke="#8d6e63" stroke-width="1"/>
    <line x1="29" y1="57" x2="35" y2="57" stroke="#8d6e63" stroke-width="1"/>
    <!-- Pommel -->
    <circle cx="32" cy="61" r="4" fill="#f9a825"/>
    <circle cx="32" cy="61" r="2.5" fill="#fdd835"/>
    <!-- Shine on blade -->
    <line x1="30" y1="10" x2="30" y2="38" stroke="#fff" stroke-width="1.5" opacity="0.6"/>
  </g>
</svg>
