<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Test tube / color sort tube -->
  <!-- Tube body (glass) -->
  <rect x="22" y="6" width="20" height="44" rx="2" fill="#e3f2fd" stroke="#90caf9" stroke-width="2"/>
  <!-- Liquid (colorful fill - multiple layers) -->
  <rect x="23" y="32" width="18" height="10" rx="0" fill="#ef4444"/>
  <rect x="23" y="22" width="18" height="10" rx="0" fill="#3b82f6"/>
  <rect x="23" y="40" width="18" height="9" rx="0" fill="#ffd700"/>
  <!-- Bottom cap (rounded) -->
  <path d="M22,50 Q22,58 32,58 Q42,58 42,50 Z" fill="#ffd700"/>
  <path d="M22,50 Q22,58 32,58 Q42,58 42,50 Z" fill="none" stroke="#90caf9" stroke-width="2"/>
  <!-- Glass shine -->
  <rect x="25" y="8" width="4" height="40" rx="2" fill="#fff" opacity="0.4"/>
  <!-- Top opening -->
  <rect x="20" y="4" width="24" height="5" rx="2" fill="#bbdefb" stroke="#90caf9" stroke-width="1.5"/>
  <!-- Tube cap -->
  <rect x="24" y="2" width="16" height="5" rx="2.5" fill="#b0bec5"/>
  <!-- Meniscus effect (liquid surface curve) -->
  <path d="M23,32 Q32,29 41,32" stroke="#2962ff" stroke-width="1.5" fill="none" opacity="0.6"/>
  <path d="M23,22 Q32,19 41,22" stroke="#c62828" stroke-width="1.5" fill="none" opacity="0.6"/>
</svg>
